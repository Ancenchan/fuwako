<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Fuwari Language - 萌动日语分析 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        :root {
            --sakura-pink: #ffc2d1;
            --soft-pink: #ffe5ec;
            --deep-pink: #fb6f92;
            --mint-green: #c1fba4;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-color: #7251b5; /* 优雅的紫色调文字 */
        }

        body {
            font-family: 'Noto Sans JP', 'ZCOOL KuaiLe', sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #c1fba4 100%);
            background-attachment: fixed;
            margin: 0;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 增加飘落感背景装饰 */
        body::before {
            content: "🌸";
            position: fixed;
            top: -5%;
            left: 10%;
            font-size: 24px;
            opacity: 0.3;
            animation: drift 10s infinite linear;
        }

        @keyframes drift {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
        }

        header {
            display: flex;
            align-items: center;
            padding: 15px 40px;
            gap: 25px;
            margin: 20px;
        }

        #config-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid white;
            background: white;
        }

        #config-btn:hover {
            transform: scale(1.2) rotate(15deg);
            box-shadow: 0 0 20px var(--deep-pink);
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: var(--deep-pink);
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .tab-btn.active {
            background: var(--deep-pink);
            color: white;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.4);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 320px;
            padding: 0 20px 40px;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 编辑器美化 */
        textarea {
            width: 100%;
            height: 180px;
            padding: 25px;
            box-sizing: border-box;
            border: 2px dashed var(--sakura-pink);
            background: rgba(255, 255, 255, 0.7);
            border-radius: 25px;
            outline: none;
            font-size: 18px;
            color: #555;
            transition: all 0.3s;
        }

        textarea:focus {
            background: white;
            border-style: solid;
            box-shadow: 0 0 15px rgba(255, 194, 209, 0.6);
        }

        .action-btn {
            background: linear-gradient(45deg, var(--deep-pink), #ffb3c1);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(251, 111, 146, 0.3);
            transition: 0.3s;
        }

        .action-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(251, 111, 146, 0.5);
        }

        /* 结果展示区 */
        .token {
            display: inline-block;
            margin: 4px;
            padding: 2px 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 20px;
        }
        .token:hover { background: white; transform: scale(1.1); }
        .pos-名词 { background: #ffe5ec; border-bottom: 3px solid #fb6f92; }
        .pos-助词 { background: #f0fff0; border-bottom: 3px solid #70e000; }
        .pos-动词 { background: #e0f2fe; border-bottom: 3px solid #00b4d8; }

        .ai-section {
            background: rgba(255, 255, 255, 0.5);
            margin: 15px 0;
            padding: 20px;
            border-radius: 20px;
            border-left: 6px solid var(--sakura-pink);
        }

        .ai-section h4 { margin: 0 0 10px; color: var(--deep-pink); font-size: 18px; }

        /* 右侧便签 */
        aside h3 { color: var(--deep-pink); text-align: center; font-size: 22px; }
        #word-details { line-height: 1.8; }

        /* Wiki 特殊颜色 */
        .wiki-card h3 { color: #ff4d6d; border-bottom: 2px solid #ffb3c1; }
        .wiki-example { color: #4a4e69; font-size: 14px; margin-bottom: 8px; border-left: 3px solid var(--mint-green); padding-left: 8px; }

        .loading-text {
            color: var(--deep-pink);
            font-weight: bold;
            display: none;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <header class="glass">
        <img src="7.png" alt="🌸" id="config-btn" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=7&backgroundColor=ffc2d1'">
        <nav>
            <button class="tab-btn active" onclick="switchTab('editor')">✨ 魔法分析</button>
            <button class="tab-btn" onclick="switchTab('library')">📚 回忆书架</button>
            <button class="tab-btn" onclick="switchTab('wiki')">📖 禁咒百科</button>
        </nav>
    </header>

    <div class="container">
        <main>
            <section id="editor" class="tab-content active">
                <div class="glass" style="padding: 25px;">
                    <textarea id="lyrics-input" placeholder="输入日语歌词，AI 老师会为你咏唱深度解析..."></textarea>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <button id="analyze-btn" class="action-btn" onclick="processLyrics()" disabled>正在初始化法阵...</button>
                        <span id="loading-indicator" class="loading-text">🎀 正在连接星辰灵气 (AI 分析中)...</span>
                    </div>
                </div>
                
                <div id="kuromoji-result" class="glass result-box" style="display:none; margin-top: 20px; padding: 25px;"></div>
                <div id="ai-result" class="glass result-box" style="display:none; margin-top: 20px; padding: 25px;"></div>
            </section>

            <section id="library" class="tab-content" style="display:none;"></section>
            <section id="wiki" class="tab-content" style="display:none;">
                <div id="wiki-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            </section>
        </main>

        <aside class="glass" style="padding: 20px; height: fit-content;">
            <h3>🎀 单词便签</h3>
            <div id="word-details">
                <p style="text-align:center; opacity:0.6;">点击单词，查看隐藏的奥秘</p>
            </div>
        </aside>
    </div>

<script>
    // ================= 配置区 =================
    const GEMINI_API_KEY = "AIzaSyBd99vT-P-IkpRifkKvXy4G86ZmPS8_9cs"; 
    const DICT_PATH = "dict/"; // 指向你 GitHub 仓库中的 dict 文件夹
    let tokenizer = null;

    // 初始化分词器
    kuromoji.builder({ dicPath: DICT_PATH }).build(function (err, _tokenizer) {
        if (err) {
            console.error("词典加载失败:", err);
            document.getElementById('analyze-btn').innerText = "法阵损坏(词典错误)";
            return;
        }
        tokenizer = _tokenizer;
        document.getElementById('analyze-btn').innerText = "✨ 启动分析魔法";
        document.getElementById('analyze-btn').disabled = false;
    });

    // ================= 逻辑区 =================
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.target.classList.add('active');
        if(id === 'library') renderLibrary();
    }

    async function processLyrics() {
        const text = document.getElementById('lyrics-input').value.trim();
        if(!text) return;

        const btn = document.getElementById('analyze-btn');
        const loader = document.getElementById('loading-indicator');
        btn.disabled = true;
        loader.style.display = "inline";

        try {
            const tokens = tokenizer.tokenize(text);
            renderTokens(tokens);

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `你是一位专业且可爱的中二病日语老师。请分析这段歌词：${text}。必须以 JSON 格式返回：{"sentence_structure":"","grammar":"","core_vocabulary":[],"translation":""}。保持中二且粉嫩的语气。` }] }]
                })
            });

            const result = await response.json();
            let rawJson = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            const aiData = JSON.parse(rawJson);
            renderAI(aiData);
            saveHistory(text, aiData, tokens);
        } catch (e) {
            alert("魔法咒语念错了: " + e.message);
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    function renderTokens(tokens) {
        const box = document.getElementById('kuromoji-result');
        box.style.display = "block";
        box.innerHTML = "<h4>🔍 语法透视镜</h4>";
        let html = "";
        tokens.forEach(t => {
            let cls = t.pos === "名詞" ? "pos-名词" : (t.pos === "助詞" ? "pos-助词" : (t.pos === "動詞" ? "pos-动词" : ""));
            html += `<span class="token ${cls}" onclick="showDetail('${t.surface_form}','${t.pos}','${t.pos_detail_1}','${t.basic_form}')">${t.surface_form}</span>`;
        });
        box.innerHTML += `<div>${html}</div>`;
    }

    function showDetail(s, p, p1, b) {
        document.getElementById('word-details').innerHTML = `
            <div style="background:white; padding:15px; border-radius:15px;">
                <p><b>本体:</b> ${s}</p>
                <p><b>真名:</b> ${b}</p>
                <p><b>属性:</b> <span style="color:#fb6f92">${p}</span></p>
                <p><b>阶级:</b> ${p1}</p>
            </div>
        `;
    }

    function renderAI(data) {
        const box = document.getElementById('ai-result');
        box.style.display = "block";
        box.innerHTML = `
            <h3>🔮 AI 老师的启示录</h3>
            <div class="ai-section"><h4>🌟 结构脉络</h4><p>${data.sentence_structure}</p></div>
            <div class="ai-section"><h4>📜 禁咒解读</h4><p>${data.grammar}</p></div>
            <div class="ai-section"><h4>💎 核心灵石</h4><p>${data.core_vocabulary.join(' | ')}</p></div>
            <div class="ai-section"><h4>🏮 命运意译</h4><p>${data.translation}</p></div>
        `;
    }

    function saveHistory(t, ai, tk) {
        let history = JSON.parse(localStorage.getItem('fuwari_history') || '[]');
        history.unshift({t: t.slice(0,15), full: t, ai: ai, tk: tk});
        localStorage.setItem('fuwari_history', JSON.stringify(history.slice(0,10)));
    }

    function renderLibrary() {
        const history = JSON.parse(localStorage.getItem('fuwari_history') || '[]');
        const lib = document.getElementById('library');
        lib.innerHTML = history.map((item, i) => `
            <div class="glass" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <span>${item.t}...</span>
                <button class="tab-btn" onclick="restoreHistory(${i})">召唤</button>
            </div>
        `).join('') || '<p style="text-align:center;">这里还没有任何契约...</p>';
    }

    function restoreHistory(index) {
        const history = JSON.parse(localStorage.getItem('fuwari_history') || '[]');
        const item = history[index];
        switchTab('editor');
        document.getElementById('lyrics-input').value = item.full;
        renderTokens(item.tk);
        renderAI(item.ai);
    }

    // Wiki 内容
    const wikiData = [
        { "t": "人称代词", "c": "私/ 僕/ 俺/ あなた/ 彼/ 彼女。例：俺はこの世界の神になる！" },
        { "t": "格助词", "c": "は（主题）\nを（宾语）\nが（主语）\nの（所属）" },
        { "t": "动词变形", "c": "て形（连接）\nた形（过去）\nない形（否定）" },
        { "t": "终助词", "c": "ぞ（强调）\nな（禁止/感叹）\nよ（告知）" }
    ];

    function initWiki() {
        const grid = document.getElementById('wiki-grid');
        grid.innerHTML = wikiData.map(d => `
            <div class="glass wiki-card" style="padding:15px;">
                <h3>${d.t}</h3>
                ${d.c.split('\n').map(l => `<div class="wiki-example">${l}</div>`).join('')}
            </div>
        `).join('');
    }

    window.onload = initWiki;
</script>
</body>
</html>
