<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 日本語学習</title>
    <link rel="shortcut icon" href="7.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        :root {
            --fuwari-pink: #ffe4e9;
            --fuwari-purple: #f3e5f5;
            --fuwari-accent: #ff85a2;
            --fuwari-bg: #fff9fb;
        }
        body {
            font-family: "Helvetica Neue", "Helvetica", "Heiti SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, var(--fuwari-pink) 0%, var(--fuwari-purple) 100%);
            min-height: 100vh;
            color: #4a4a4a;
            margin: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
        }
        .hover-scale { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hover-scale:hover { transform: scale(1.02); }
        .pos-noun { color: #5c7cfa; font-weight: 500; }
        .pos-verb { color: #f06595; font-weight: 500; }
        .pos-particle { color: #845ef7; }
        .pos-adj { color: #fcc419; }
        #loading-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fuwari-bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .tab-btn-active { background-color: var(--fuwari-accent) !important; color: white !important; }
        input, textarea { border: none !important; outline: none !important; }
    </style>
</head>
<body>

    <div id="loading-mask">
        <div class="text-4xl mb-4">🌸</div>
        <div id="loading-text" class="text-xs text-pink-400 font-light">正在加载词典... 0%</div>
        <div class="w-48 h-1 bg-pink-100 rounded-full mt-4 overflow-hidden">
            <div id="loading-bar" class="h-full bg-pink-400 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <header class="fixed top-4 left-0 right-0 z-50 px-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center glass p-3 shadow-sm">
            <div class="flex items-center space-x-4">
                <span class="text-lg font-bold tracking-tighter text-pink-500">Fuwako</span>
                <nav class="flex space-x-1">
                    <button onclick="switchTab('grammar')" id="tab-grammar" class="tab-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all hover:bg-white/50 tab-btn-active">语法库</button>
                    <button onclick="switchTab('lyrics')" id="tab-lyrics" class="tab-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all hover:bg-white/50">歌词解析</button>
                </nav>
            </div>
            <button onclick="toggleConfig()" class="hover-scale">
                <img src="7.png" class="w-8 h-8 rounded-full border-2 border-white shadow-sm" onerror="this.src='https://api.iconify.design/fluent-emoji-flat:cherry-blossom.svg'">
            </button>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 max-w-4xl mx-auto">
        <section id="view-grammar" class="view-section">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="grammar-list"></div>
        </section>

        <section id="view-lyrics" class="view-section hidden">
            <div id="admin-add-area" class="glass p-5 mb-6 hidden">
                <h3 class="text-[10px] font-bold mb-3 opacity-40 uppercase tracking-widest">新增歌词数据</h3>
                <input id="new-lyric-title" type="text" placeholder="歌曲标题..." class="w-full mb-3 p-3 rounded-xl bg-white/40 text-sm">
                <textarea id="new-lyric-text" rows="3" placeholder="输入日语歌词（可包含翻译行）..." class="w-full p-3 rounded-xl bg-white/40 text-sm"></textarea>
                <button type="button" onclick="addLyrics()" class="mt-2 w-full py-2 bg-pink-400 text-white rounded-xl text-xs font-bold hover:bg-pink-500 transition-all shadow-sm">确认存入云端</button>
            </div>
            <div id="lyrics-container" class="space-y-3"></div>
        </section>

        <section id="view-detail" class="view-section hidden">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 glass p-6">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center space-x-3">
                            <button onclick="switchTab('lyrics')" class="text-[10px] text-pink-400 font-bold hover:underline">← 返回列表</button>
                            <button id="edit-btn" class="text-[10px] text-gray-400 font-bold hover:text-pink-500 transition-colors hidden">编辑内容</button>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div id="ai-progress-wrap" class="hidden w-20 h-1 bg-pink-100 rounded-full overflow-hidden">
                                <div id="ai-progress-bar" class="h-full bg-pink-400" style="width: 0%"></div>
                            </div>
                            <button onclick="triggerAI()" class="px-3 py-1 bg-pink-500 text-white rounded-full text-[10px] font-bold hover:bg-pink-600 transition-all">AI 语法解析</button>
                        </div>
                    </div>
                    <h2 id="detail-title" class="text-lg font-bold mb-4 text-gray-700"></h2>
                    <div id="detail-content" class="space-y-4 text-sm leading-relaxed"></div>
                </div>
                <aside class="w-full md:w-60">
                    <div class="glass p-5 sticky top-24 space-y-6">
                        <div>
                            <h4 class="text-[10px] font-bold text-pink-400 mb-2 uppercase tracking-widest">单词释义</h4>
                            <div id="dict-result" class="text-xs text-gray-500 italic">点击词块查看...</div>
                        </div>
                        <div class="pt-4 border-t border-white/40">
                            <h4 class="text-[10px] font-bold text-pink-400 mb-2 uppercase tracking-widest">AI 解析内容</h4>
                            <div id="ai-result" class="text-[11px] leading-5 text-gray-600">点击行旁“解析”获取</div>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <div id="config-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-white/20 backdrop-blur-md" onclick="toggleConfig()"></div>
        <div class="glass p-8 w-72 relative shadow-2xl">
            <h3 class="font-bold mb-5 text-center text-pink-500">GitHub 设置</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold opacity-40 ml-1">ACCESS TOKEN</label>
                    <input id="cfg-token" type="password" class="w-full mt-1 p-2 rounded-lg bg-white/80 text-xs shadow-inner">
                </div>
                <button onclick="saveConfig()" class="w-full py-2.5 bg-pink-400 text-white rounded-xl font-bold text-xs shadow-md hover:bg-pink-500 transition-all">保存并连接</button>
                <div id="conn-status" class="text-center text-[10px] text-green-500 hidden font-bold">● 已成功连接</div>
            </div>
        </div>
    </div>

    <div id="ai-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-white/20 backdrop-blur-md" onclick="this.parentElement.classList.add('hidden')"></div>
        <div class="glass p-8 w-72 relative shadow-2xl">
            <h3 class="font-bold mb-2 text-center text-pink-500">API 配置</h3>
            <p class="text-[9px] text-center mb-4 text-gray-400">请输入 SiliconFlow / OpenRouter Key</p>
            <input id="cfg-ai-key" type="password" class="w-full p-2 rounded-lg bg-white/80 text-xs shadow-inner mb-4">
            <button onclick="startAIProcess()" class="w-full py-2.5 bg-pink-500 text-white rounded-xl font-bold text-xs shadow-md">保存并开始解析</button>
        </div>
    </div>

    <script>
        let tokenizer = null;
        let lyricsData = [];
        let dictionary = {};
        let currentId = null;

        async function init() {
            kuromoji.builder({ dicPath: "dict" }).build((err, _tokenizer) => {
                if (err) return;
                tokenizer = _tokenizer;
                document.getElementById('loading-bar').style.width = '100%';
                document.getElementById('loading-text').innerText = '词典加载完成！';
                setTimeout(() => {
                    document.getElementById('loading-mask').style.display = 'none';
                }, 500);
            });

            loadConfig();
            loadGrammar();
            loadLyrics();
            loadDict();
        }

        function utoa(str) { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1))); }
        function atou(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

        async function loadGrammar() {
            try {
                const r = await fetch('grammar.json');
                const data = await r.json();
                const list = document.getElementById('grammar-list');
                list.innerHTML = data.map(i => `
                    <div class="glass p-4 hover-scale cursor-default">
                        <div class="text-pink-500 font-bold text-sm">${i.t}</div>
                        <div class="text-[9px] text-pink-300 mb-2 font-bold opacity-70">${i.c || 'Common'}</div>
                        <div class="text-[11px] text-gray-500 whitespace-pre-line">${i.l}</div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        async function loadLyrics() {
            // 1. 获取本地缓存
            const local = JSON.parse(localStorage.getItem('fuwako_lyrics') || '[]');
            lyricsData = Array.isArray(local) ? local : [];
            
            const cfg = getCfg();

            try {
                // 2. 核心修改：优先尝试直接 fetch 公开文件（访客模式）
                const rPublic = await fetch('lyrics_data.json', { cache: 'no-cache' });
                if (rPublic.ok) {
                    const cloudData = await rPublic.json();
                    const combined = [...lyricsData, ...cloudData];
                    lyricsData = Array.from(new Map(combined.map(item => [item.id, item])).values())
                                      .sort((a,b) => b.timestamp - a.timestamp);
                } else if (cfg.token && cfg.repo) {
                    // 3. 如果公开 fetch 失败且有 Token，尝试 API（备选方案）
                    const rApi = await fetch(`https://api.github.com/repos/${cfg.repo}/lyrics_data.json`, {
                        headers: { 'Authorization': `token ${cfg.token}` }
                    });
                    if (rApi.ok) {
                        const json = await rApi.api.json();
                        const cloudData = JSON.parse(atou(json.content));
                        const combined = [...lyricsData, ...cloudData];
                        lyricsData = Array.from(new Map(combined.map(item => [item.id, item])).values())
                                          .sort((a,b) => b.timestamp - a.timestamp);
                    }
                }
            } catch(e) { console.warn("Load lyrics failed:", e); }
            
            localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
            renderLyricsList();
        }

        function renderLyricsList() {
            const cfg = getCfg();
            const container = document.getElementById('lyrics-container');
            
            // 如果有 Token，显示新增区域
            document.getElementById('admin-add-area').classList.toggle('hidden', !cfg.token);

            container.innerHTML = lyricsData.map(l => `
                <div onclick="showDetail(${l.id})" class="glass p-4 flex justify-between items-center cursor-pointer hover-scale transition-all active:scale-95 group">
                    <div class="flex-1">
                        <div class="font-bold text-[13px] text-gray-700">${l.title}</div>
                        <div class="text-[9px] opacity-30 mt-1 font-mono">${new Date(l.timestamp).toLocaleString()}</div>
                    </div>
                    <div class="flex items-center space-x-3">
                        ${cfg.token ? `<button onclick="event.stopPropagation(); deleteLyrics(${l.id})" class="opacity-0 group-hover:opacity-100 text-[10px] text-red-300 hover:text-red-500 transition-all font-bold">删除</button>` : ''}
                        <div class="text-pink-200">❯</div>
                    </div>
                </div>
            `).join('');
        }

        async function deleteLyrics(id) {
            const cfg = getCfg();
            if (!cfg.token) return alert("只有管理员可以删除哦~");
            if (!confirm("确定要删除这首歌吗？云端也会同步哦。")) return;
            lyricsData = lyricsData.filter(l => l.id !== id);
            localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
            renderLyricsList();
            await pushToCloud();
        }

        async function addLyrics() {
            const cfg = getCfg();
            if (!cfg.token) return alert("❌ 请先配置 GitHub Token 以开启编辑权限");
            
            const title = document.getElementById('new-lyric-title').value.trim();
            const textRaw = document.getElementById('new-lyric-text').value.trim();
            if (!title || !textRaw) return alert("请输入标题和内容");

            const newItem = {
                id: Date.now(),
                title: title,
                text: textRaw.split('\n').filter(s => s.trim()),
                timestamp: Date.now(),
                analysis: []
            };

            const btn = event.target;
            btn.innerText = "正在存入云端...";
            btn.disabled = true;

            try {
                lyricsData = [newItem, ...lyricsData];
                localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
                await pushToCloud();
                renderLyricsList();
                document.getElementById('new-lyric-title').value = "";
                document.getElementById('new-lyric-text').value = "";
                alert("✅ 成功存入云端！");
            } catch(e) { alert("❌ 同步失败: " + e.message); }
            finally { btn.innerText = "确认存入云端"; btn.disabled = false; }
        }

        async function pushToCloud() {
            const cfg = getCfg();
            if (!cfg.token || !cfg.repo) return;
            try {
                let sha = null;
                const r = await fetch(`https://api.github.com/repos/${cfg.repo}/lyrics_data.json`, {
                    headers: { 'Authorization': `token ${cfg.token}` }
                });
                if (r.ok) { const json = await r.json(); sha = json.sha; }
                const body = {
                    message: "Sync Fuwako Lyrics",
                    content: utoa(JSON.stringify(lyricsData, null, 2)),
                    sha: sha
                };
                await fetch(`https://api.github.com/repos/${cfg.repo}/lyrics_data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${cfg.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            } catch(e) { console.error("Cloud push failed:", e); }
        }

        function showDetail(id) {
            currentId = id;
            const cfg = getCfg();
            const item = lyricsData.find(l => l.id === id);
            document.getElementById('detail-title').innerText = item.title;
            const content = document.getElementById('detail-content');
            content.innerHTML = "";

            // 根据权限显示/隐藏编辑按钮
            const eb = document.getElementById('edit-btn');
            eb.classList.toggle('hidden', !cfg.token);
            eb.onclick = () => enterEditMode(id);

            item.text.forEach((line, idx) => {
                const isJP = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(line);
                const row = document.createElement('div');
                row.className = "flex justify-between items-start group py-1 border-b border-white/30";
                let html = `<div class="flex-1">`;
                if (isJP && tokenizer) {
                    tokenizer.tokenize(line).forEach(t => {
                        let c = (t.pos === '名詞') ? "pos-noun" : (t.pos === '動詞') ? "pos-verb" : (t.pos === '助詞') ? "pos-particle" : (t.pos === '形容詞') ? "pos-adj" : "";
                        html += `<span class="cursor-help hover:bg-white/60 px-0.5 rounded ${c}" onclick="lookupDict('${t.surface_form}')">${t.surface_form}</span>`;
                    });
                } else { html += `<span class="opacity-40 italic font-light">${line}</span>`; }
                html += `</div>`;
                if (isJP) html += `<button onclick="showAnalysis(${idx})" class="opacity-0 group-hover:opacity-100 text-[9px] bg-pink-100 text-pink-400 px-2 py-0.5 rounded transition-all">解析</button>`;
                row.innerHTML = html;
                content.appendChild(row);
            });
            switchTab('detail');
        }

        function enterEditMode(id) {
            const item = lyricsData.find(l => l.id === id);
            const titleArea = document.getElementById('detail-title');
            const contentArea = document.getElementById('detail-content');
            titleArea.innerHTML = `<input id="edit-title" type="text" class="w-full bg-white/50 p-1 rounded border border-pink-200 text-lg font-bold" value="${item.title}">`;
            contentArea.innerHTML = `
                <textarea id="edit-text" rows="12" class="w-full p-4 rounded-xl bg-white/50 text-sm leading-relaxed">${item.text.join('\n')}</textarea>
                <div class="flex space-x-2 mt-4">
                    <button onclick="saveEdit(${id})" class="flex-1 py-2 bg-pink-400 text-white rounded-xl text-xs font-bold shadow-sm">保存修改</button>
                    <button onclick="showDetail(${id})" class="px-4 py-2 bg-gray-100 text-gray-400 rounded-xl text-xs">取消</button>
                </div>
            `;
        }

        async function saveEdit(id) {
            const newTitle = document.getElementById('edit-title').value.trim();
            const newText = document.getElementById('edit-text').value.trim();
            if (!newTitle || !newText) return alert("内容不能为空");
            const idx = lyricsData.findIndex(l => l.id === id);
            lyricsData[idx].title = newTitle;
            lyricsData[idx].text = newText.split('\n').filter(s => s.trim());
            lyricsData[idx].analysis = [];
            localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
            renderLyricsList();
            showDetail(id);
            await pushToCloud();
            alert("✅ 修改成功并已同步！");
        }

        // 其他功能模块保持不变
        async function loadDict() { try { const r = await fetch('dict.json'); dictionary = await r.json(); } catch(e) {} }
        function lookupDict(word) {
            const res = dictionary[word] || "词典暂未收录此词";
            document.getElementById('dict-result').innerHTML = `<b class="text-pink-500">${word}</b><br>${res}`;
        }
        function showAnalysis(idx) {
            const item = lyricsData.find(l => l.id === currentId);
            const ana = item.analysis && item.analysis[idx];
            document.getElementById('ai-result').innerHTML = (ana && typeof ana === 'object') ? `<div class="text-pink-500 font-bold mb-1">译：${ana.translation || '（无翻译）'}</div><div class="text-[11px] leading-5 text-gray-600">${ana.grammar || '（无语法解析）'}</div>` : `<div class="text-gray-400 italic text-[10px]">该行无需解析或暂无数据</div>`;
        }
        function triggerAI() { const key = localStorage.getItem('fuwako_ai_key'); if (!key) document.getElementById('ai-modal').classList.remove('hidden'); else startAIProcess(); }
        async function startAIProcess() {
            const key = document.getElementById('cfg-ai-key').value || localStorage.getItem('fuwako_ai_key');
            if (!key) { document.getElementById('ai-modal').classList.remove('hidden'); return; }
            localStorage.setItem('fuwako_ai_key', key);
            document.getElementById('ai-modal').classList.add('hidden');
            const item = lyricsData.find(l => l.id === currentId);
            const barWrap = document.getElementById('ai-progress-wrap'), bar = document.getElementById('ai-progress-bar');
            const jpLines = item.text.filter(l => /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(l));
            barWrap.classList.remove('hidden'); bar.style.width = '10%';
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "nvidia/nemotron-nano-9b-v2:free",
  messages: [{
                    role: "system",
                    content: `你是一个中国的专业的日语老师，请用中文回答不要包含英文。请解析我提供的日语歌词，并严格按照以下规则执行：
1. 任务：提供单句翻译和深度语法解析。；    
2. 语法点要求：日语歌词常常将一句完整的话分成多行展示。你需要根据语法逻辑（助词连接、谓语在句尾等）判断哪些连续的行属于同一个句子。对行内的每个词（或最小单位）给出原形/词性。例输出为：「新しい」形容词连体形，意为 '新的'，修饰「ミライ」；「ミライ」名词，片假名写法，意为'未来'；「を」格助词，提示「思い描く新しいミライ」整个名词短语为后面一行的「探してた」的宾语。该行是宾语的核心名词。
3. 格式规范：
   - 必须仅输出一个纯 JSON 数组。
   - 严禁包含任何 Markdown 代码块标签、换行符或说明文字。
   - 属性名和字符串必须使用双引号。
   - 严禁在“translation”和“grammar”的内容中使用双引号（可用单引号或括号代替），以防解析失败。
   - 最后提交时检查“translation”和“grammar”，如果内容是英文，需要翻译为中文。
4. 异常处理：若输入非日语歌词，请仅返回 null。

示例格式（严格遵守）：
[{"translation": "这里的翻译不含双引号", "grammar": "语法点"},null]`
                }, {
                    role: "user",
                    content: item.text.join('\n')
                }],
                stream: true // 必须开启流式传输，否则进度条会卡死
            })
        });
                const reader = response.body.getReader(), decoder = new TextDecoder("utf-8");
                let fullText = "";
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    const chunk = decoder.decode(value, { stream: true }), lines = chunk.split('\n');
                    for (const line of lines) { if (line.startsWith("data: ")) { try { const json = JSON.parse(line.slice(6)); fullText += json.choices[0]?.delta?.content || ""; const matches = fullText.match(/\}/g); if (matches) bar.style.width = `${Math.min(95, (matches.length / jpLines.length) * 100)}%`; } catch (e) {} } }
                }
                console.log("AI 原始输出内容:", fullText); 

try {
    const finalJsonString = fullText.replace(/```json|```/g, '').trim();
    
    // 【关键位置】：看看清理掉 Markdown 标签后，准备交给 JSON.parse 的字符串长啥样
    console.log("清理后的 JSON 字符串:", finalJsonString); 

    const parsedData = JSON.parse(finalJsonString);
    console.log("解析后的对象结构:", parsedData); // 看看这里是不是出现了嵌套对象
                item.analysis = JSON.parse(fullText.replace(/```json|```/g, '').trim());
                bar.style.width = '100%'; localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
                await pushToCloud(); setTimeout(() => { barWrap.classList.add('hidden'); showDetail(currentId); }, 800);
            } catch(e) { alert("解析失败"); barWrap.classList.add('hidden'); 
                       }
            }
        function switchTab(tab) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-btn-active'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab === 'detail' ? 'lyrics' : tab}`).classList.add('tab-btn-active');
        }
        function toggleConfig() { document.getElementById('config-modal').classList.toggle('hidden'); }
        function getCfg() { return { token: localStorage.getItem('fuwako_github_token'), repo: 'Ancenchan/fuwako' }; }
        function saveConfig() { localStorage.setItem('fuwako_github_token', document.getElementById('cfg-token').value); document.getElementById('conn-status').classList.remove('hidden'); setTimeout(toggleConfig, 800); loadLyrics(); }
        function loadConfig() { document.getElementById('cfg-token').value = localStorage.getItem('fuwako_github_token') || ''; }
        init();
    </script>
