<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 日语歌词语法助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    
    <style>
        :root {
            --f-pink: #fff1f2;
            --f-blue: #f0f9ff;
            --f-accent: #fb7185;
            --glass: rgba(255, 255, 255, 0.65);
        }

        body {
            background: linear-gradient(135deg, var(--f-pink) 0%, var(--f-blue) 100%);
            min-height: 100vh;
            color: #4b5563;
            font-family: 'Hiragino Sans', 'PingFang SC', sans-serif;
            transition: all 0.3s;
        }

        /* Fuwari 磨砂玻璃 */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        /* 词性颜色 */
        .pos-verb { color: #db2777; font-weight: 600; border-bottom: 2px solid #fbcfe8; } /* 动词 */
        .pos-particle { color: #2563eb; background: #dbeafe; border-radius: 4px; padding: 0 2px; } /* 助词 */
        .pos-noun { color: #059669; } /* 名词 */
        .pos-adj { color: #d97706; } /* 形容词 */

        .token-block {
            display: inline-block;
            margin: 0 1px;
            padding: 2px 2px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .token-block:hover { transform: scale(1.1); background: white; border-radius: 4px; }

        /* 左上角配置按钮 */
        #config-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            z-index: 100;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #config-btn:hover { transform: rotate(20deg) scale(1.1); }

        /* AI 进度条 */
        #ai-progress {
            position: fixed;
            top: 0; left: 0; width: 0%; height: 4px;
            background: linear-gradient(90deg, #fda4af, #60a5fa);
            z-index: 1000;
            transition: width 0.4s;
        }

        /* 加载遮罩 */
        #mask {
            position: fixed;
            inset: 0; background: #fff; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="ai-progress"></div>

    <div id="mask">
        <div class="w-12 h-12 border-4 border-pink-100 border-t-pink-400 rounded-full animate-spin"></div>
        <p class="mt-4 text-pink-400 font-medium tracking-widest">辞書読み込み中...</p>
    </div>

    <img src="7.png" id="config-btn" onclick="openModal('modal-settings')" alt="Settings">

    <div class="container mx-auto px-4 pt-24 pb-12 max-w-5xl">
        
        <section class="mb-10">
            <h2 class="text-pink-500 font-bold mb-4 flex items-center px-2">
                <span class="text-xl mr-2">✨</span> 常用语法变形
            </h2>
            <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar">
                <div class="glass flex-shrink-0 p-5 w-48 text-center">
                    <p class="text-xs text-gray-400 mb-1">使役形 (CAUS)</p>
                    <p class="font-bold text-gray-700 italic">行かせる</p>
                </div>
                <div class="glass flex-shrink-0 p-5 w-48 text-center">
                    <p class="text-xs text-gray-400 mb-1">受身形 (PASS)</p>
                    <p class="font-bold text-gray-700 italic">書かれる</p>
                </div>
                <div class="glass flex-shrink-0 p-5 w-48 text-center">
                    <p class="text-xs text-gray-400 mb-1">使役受身</p>
                    <p class="font-bold text-gray-700 italic">待たされる</p>
                </div>
                <div class="glass flex-shrink-0 p-5 w-48 text-center">
                    <p class="text-xs text-gray-400 mb-1">禁止形</p>
                    <p class="font-bold text-gray-700 italic">食べるな</p>
                </div>
            </div>
        </section>

        <div id="main-view">
            <div id="view-shelf" class="space-y-6">
                <div class="flex justify-between items-center px-2">
                    <h1 class="text-2xl font-bold text-gray-600">歌词书架</h1>
                    <button onclick="openModal('modal-add')" class="bg-white/80 px-6 py-2 rounded-full shadow-sm hover:bg-pink-400 hover:text-white transition-all font-bold text-pink-400">+ 添加歌词</button>
                </div>
                <div id="shelf-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>

            <div id="view-detail" class="hidden">
                <div class="flex items-center mb-6 space-x-4">
                    <button onclick="switchView('shelf')" class="glass px-4 py-2 text-sm">← 返回</button>
                    <h2 id="current-title" class="text-xl font-bold text-gray-700 truncate">歌词详情</h2>
                </div>
                <div class="flex flex-col lg:flex-row gap-8">
                    <div id="lyrics-container" class="glass flex-1 p-8 text-2xl leading-[4rem]">
                        </div>
                    <div class="w-full lg:w-80 space-y-4">
                        <div class="glass p-6 sticky top-10">
                            <h3 class="font-bold text-pink-400 border-b border-pink-50/50 pb-2 mb-4">解析详情</h3>
                            <div id="side-info" class="text-sm leading-relaxed text-gray-500">
                                点击词语查看本地词库释义，点击右侧“讲解”获取 Gemini 分析。
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-black/10 backdrop-blur-sm hidden z-[200] flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full p-8">
            <h3 class="text-xl font-bold mb-6 text-center text-gray-600">系统配置</h3>
            <div class="space-y-4">
                <input type="password" id="cfg-token" placeholder="GitHub Token" class="w-full p-3 rounded-2xl bg-white/50 border-none outline-none focus:ring-2 focus:ring-pink-300">
                <input type="password" id="cfg-gemini" placeholder="Gemini 2.5 API Key" class="w-full p-3 rounded-2xl bg-white/50 border-none outline-none focus:ring-2 focus:ring-blue-300">
                <input type="text" id="cfg-repo" placeholder="用户名/仓库名" class="w-full p-3 rounded-2xl bg-white/50 border-none outline-none focus:ring-2 focus:ring-gray-300">
            </div>
            <div class="mt-8 flex space-x-4">
                <button onclick="closeModal('modal-settings')" class="flex-1 text-gray-400">取消</button>
                <button onclick="saveConfigs()" class="flex-1 bg-pink-400 text-white py-3 rounded-2xl font-bold shadow-lg">保存</button>
            </div>
        </div>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/10 backdrop-blur-sm hidden z-[200] flex items-center justify-center p-4">
        <div class="glass max-w-lg w-full p-8">
            <input type="text" id="new-title" placeholder="歌曲标题" class="w-full p-3 mb-4 rounded-xl bg-white border-none outline-none">
            <textarea id="new-content" rows="10" placeholder="粘贴日语歌词..." class="w-full p-3 rounded-xl bg-white border-none outline-none resize-none"></textarea>
            <div class="mt-6 flex space-x-4">
                <button onclick="closeModal('modal-add')" class="flex-1 text-gray-400">取消</button>
                <button onclick="handleAddLyric()" class="flex-1 bg-blue-400 text-white py-3 rounded-2xl font-bold shadow-lg">确认并同步</button>
            </div>
        </div>
    </div>

    <script type="module">
        // 核心方案：使用 esm.sh 避开 CORS 限制
        import { Octokit } from "https://esm.sh/@octokit/core";

        let tokenizer = null;
        let lyricsDB = [];
        let localDict = {}; // dict.json

        const APP = {
            token: localStorage.getItem('fuwari_token'),
            gemini: localStorage.getItem('fuwari_gemini'),
            repoInfo: localStorage.getItem('fuwari_repo') || "", 
            get owner() { return this.repoInfo.split('/')[0] },
            get repo() { return this.repoInfo.split('/')[1] }
        };

        // --- 初始化 ---
        async function init() {
            // 1. 加载词典 (./dict/ 路径)
            kuromoji.builder({ dicPath: "./dict/" }).build((err, _tokenizer) => {
                if (err) { alert("词典加载失败，请检查 /dict 文件夹"); return; }
                tokenizer = _tokenizer;
                document.getElementById('mask').style.opacity = '0';
                setTimeout(() => document.getElementById('mask').style.display = 'none', 600);
            });

            // 2. 加载本地 5000 词库
            try {
                const dRes = await fetch('./dict.json');
                localDict = await dRes.json();
            } catch(e) { console.warn("未找到 dict.json"); }

            // 3. 数据同步
            await syncData();
            renderShelf();
        }

        // --- GitHub 持久化逻辑 ---
        async function syncData() {
            if (!APP.token || !APP.repoInfo) return;
            const octokit = new Octokit({ auth: APP.token });
            try {
                const res = await octokit.request('GET /repos/{owner}/{repo}/contents/{path}', {
                    owner: APP.owner, repo: APP.repo, path: 'lyrics_data.json'
                });
                const cloudData = JSON.parse(decodeURIComponent(escape(atob(res.data.content))));
                
                // 合并本地数据
                const local = JSON.parse(localStorage.getItem('fuwari_cache') || '[]');
                const combined = [...cloudData, ...local];
                // 按 ID 去重并保留最新 timestamp
                const map = new Map();
                combined.forEach(item => {
                    if (!map.has(item.id) || item.timestamp > map.get(item.id).timestamp) map.set(item.id, item);
                });
                lyricsDB = Array.from(map.values()).sort((a,b) => b.timestamp - a.timestamp);
                localStorage.setItem('fuwari_cache', JSON.stringify(lyricsDB));
            } catch (e) { console.error("同步失败:", e); }
        }

        async function pushData() {
            if (!APP.token) return;
            const octokit = new Octokit({ auth: APP.token });
            try {
                const getFile = await octokit.request('GET /repos/{owner}/{repo}/contents/{path}', {
                    owner: APP.owner, repo: APP.repo, path: 'lyrics_data.json'
                });
                await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
                    owner: APP.owner, repo: APP.repo, path: 'lyrics_data.json',
                    message: "Update lyrics",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(lyricsDB)))),
                    sha: getFile.data.sha
                });
            } catch(e) { console.error("推送失败"); }
        }

        // --- Gemini 2.5 处理 ---
        async function fetchGemini(song) {
            if (!APP.gemini) return alert("请配置 Gemini API Key");
            document.getElementById('ai-progress').style.width = '30%';

            const prompt = `你是一个日语老师。请分析以下歌词，返回一个严格的JSON数组，格式：[{"t":"中文翻译", "e":"重点语法"}]。数组长度必须和歌词行数(${song.content.split('\n').length})一致。不要返回任何Markdown标记，只返回纯JSON内容：\n${song.content}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${APP.gemini}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const analysis = JSON.parse(jsonText);

                // 将解析结果保存为独立文件
                const octokit = new Octokit({ auth: APP.token });
                await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
                    owner: APP.owner, repo: APP.repo, path: `analysis_${song.id}.json`,
                    message: `AI Analysis for ${song.title}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(analysis))))
                });

                document.getElementById('ai-progress').style.width = '100%';
                setTimeout(() => document.getElementById('ai-progress').style.width = '0', 1000);
                return analysis;
            } catch(e) {
                console.error(e);
                document.getElementById('ai-progress').style.width = '0';
                return null;
            }
        }

        // --- 界面渲染 ---
        window.renderShelf = () => {
            const list = document.getElementById('shelf-list');
            list.innerHTML = lyricsDB.map(s => `
                <div onclick="enterDetail('${s.id}')" class="glass p-6 cursor-pointer hover:bg-white transition-all group">
                    <h3 class="text-lg font-bold text-gray-600 truncate">${s.title}</h3>
                    <p class="text-xs text-gray-400 mt-2">更新于: ${new Date(s.timestamp).toLocaleDateString()}</p>
                </div>
            `).join('');
        };

        window.enterDetail = async (id) => {
            const song = lyricsDB.find(s => s.id === id);
            document.getElementById('current-title').innerText = song.title;
            const container = document.getElementById('lyrics-container');
            container.innerHTML = '';

            // 预加载 AI 缓存
            let analysis = [];
            try {
                const aRes = await fetch(`https://raw.githubusercontent.com/${APP.owner}/${APP.repo}/main/analysis_${id}.json`);
                if (aRes.ok) analysis = await aRes.json();
                else analysis = await fetchGemini(song); // 如果没有则即时生成
            } catch(e) {}

            song.content.split('\n').forEach((line, idx) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = "flex items-start mb-2 group";
                
                const textWrap = document.createElement('div');
                textWrap.className = "flex-1";
                tokenizer.tokenize(line).forEach(t => {
                    const span = document.createElement('span');
                    span.className = `token-block ${getPosClass(t.pos)}`;
                    span.innerText = t.surface_form;
                    span.onclick = () => {
                        const info = localDict[t.surface_form] || "词库中未找到详细释义。";
                        document.getElementById('side-info').innerHTML = `<b class="text-lg text-pink-400">${t.surface_form}</b><br><br>${info}`;
                    };
                    textWrap.appendChild(span);
                });

                const btn = document.createElement('button');
                btn.className = "opacity-0 group-hover:opacity-100 ml-4 text-[10px] bg-pink-100 text-pink-500 px-3 py-1 rounded-full shadow-sm";
                btn.innerText = "講解";
                btn.onclick = () => {
                    const entry = analysis[idx] || {t:"加载中...", e:"..."};
                    document.getElementById('side-info').innerHTML = `<div class="animate-in fade-in"><p class="font-bold text-blue-500 mb-2">翻译：</p>${entry.t}<hr class="my-4"/><p class="font-bold text-pink-500 mb-2">语法点：</p>${entry.e}</div>`;
                };

                lineDiv.appendChild(textWrap);
                lineDiv.appendChild(btn);
                container.appendChild(lineDiv);
            });
            switchView('detail');
        };

        function getPosClass(pos) {
            if (pos === '動詞') return 'pos-verb';
            if (pos === '助詞') return 'pos-particle';
            if (pos === '名詞') return 'pos-noun';
            if (pos === '形容詞') return 'pos-adj';
            return '';
        }

        // --- 全局操作 ---
        window.saveConfigs = () => {
            const t = document.getElementById('cfg-token').value;
            const g = document.getElementById('cfg-gemini').value;
            const r = document.getElementById('cfg-repo').value;
            localStorage.setItem('fuwari_token', t);
            localStorage.setItem('fuwari_gemini', g);
            localStorage.setItem('fuwari_repo', r);
            location.reload();
        };

        window.handleAddLyric = async () => {
            const title = document.getElementById('new-title').value;
            const content = document.getElementById('new-content').value;
            if (!title || !content) return;

            const newItem = {
                id: 'id' + Date.now(),
                title, content,
                timestamp: Date.now()
            };

            lyricsDB.unshift(newItem);
            localStorage.setItem('fuwari_cache', JSON.stringify(lyricsDB));
            closeModal('modal-add');
            renderShelf();
            await pushData(); // 静默同步
        };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.switchView = (v) => {
            document.getElementById('view-shelf').classList.toggle('hidden', v !== 'shelf');
            document.getElementById('view-detail').classList.toggle('hidden', v !== 'detail');
        };

        window.onload = init;
    </script>
</body>
</html>
