<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Lyrics Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 优化振假名显示 */
        ruby { ruby-align: center; }
        rt { font-size: 0.65em; color: #6b7280; user-select: none; }
        .lyric-line { line-height: 3.5rem; }
        .word-hover:hover { background-color: #f3f4f6; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-indigo-600 tracking-tight">J-Lyrics Hub</h1>
            <div class="space-x-4">
                <button class="text-sm text-gray-600 hover:text-indigo-600">我的词库</button>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">GitHub 登录</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 lg:p-8 flex flex-col lg:flex-row gap-8">
        
        <div class="flex-1 space-y-6">
            <section class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="text-lg font-semibold mb-4 flex items-center">
                    <span class="mr-2">📝</span> 输入日语歌词
                </h2>
                <textarea id="inputArea" class="w-full h-40 p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition" placeholder="在此粘贴日语歌词..."></textarea>
                <div class="mt-4 flex gap-2">
                    <button onclick="parseLyrics()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:shadow-lg transition transform active:scale-95">开始智能解析</button>
                    <button class="px-4 py-3 border border-gray-200 rounded-xl hover:bg-gray-50">清空</button>
                </div>
            </section>

            <section id="resultSection" class="bg-white p-6 rounded-2xl shadow-sm border hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold">解析结果</h2>
                    <div class="flex gap-2">
                        <button class="text-xs px-2 py-1 border rounded hover:bg-gray-50">显示假名</button>
                        <button class="text-xs px-2 py-1 border rounded hover:bg-gray-50">词性高亮</button>
                    </div>
                </div>
                
                <div id="lyricDisplay" class="lyric-line text-xl tracking-wide space-y-4">
                    </div>
            </section>
        </div>

        <aside class="w-full lg:w-80 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border sticky top-24">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">单词详情</h3>
                <div id="wordDetail">
                    <p class="text-gray-500 italic">点击歌词中的单词查看详情</p>
                </div>
                
                <hr class="my-6">
                
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">今日生词本 (3)</h3>
                <ul class="space-y-3">
                    <li class="flex justify-between items-center p-2 hover:bg-indigo-50 rounded-lg transition group">
                        <span class="font-medium text-indigo-900">煌めく</span>
                        <button class="text-gray-300 group-hover:text-red-500 transition">✕</button>
                    </li>
                    <li class="flex justify-between items-center p-2 hover:bg-indigo-50 rounded-lg transition group">
                        <span class="font-medium text-indigo-900">刹那</span>
                        <button class="text-gray-300 group-hover:text-red-500 transition">✕</button>
                    </li>
                </ul>
            </div>
        </aside>
    </main>

    <script>
        function parseLyrics() {
            const input = document.getElementById('inputArea').value;
            if(!input) return;

            // 模拟解析逻辑（实际开发时这里会调用 kuroshiro 或 MeCab）
            const display = document.getElementById('lyricDisplay');
            document.getElementById('resultSection').classList.remove('hidden');
            
            // 这里做一个简单的模拟演示
            display.innerHTML = `
                <div class="p-2 border-b border-dashed border-gray-100">
                    <span class="word-hover px-1" onclick="showDetail('明日', 'あした', '名词', '明天')"><ruby>明日<rt>あした</rt></ruby></span>
                    <span class="text-gray-400">の</span>
                    <span class="word-hover px-1" onclick="showDetail('空', 'そら', '名词', '天空')"><ruby>空<rt>そら</rt></ruby></span>
                    <span class="text-gray-400">は</span>
                    <span class="word-hover px-1 text-blue-600" onclick="showDetail('晴れる', 'はれる', '动词', '放晴')"><ruby>晴<rt>は</rt></ruby>れる</span>
                </div>
                <p class="text-sm text-gray-400 mt-1 italic">（明天的天空将会放晴）</p>
            `;
        }

        function showDetail(word, kana, type, mean) {
            const detail = document.getElementById('wordDetail');
            detail.innerHTML = `
                <div class="animate-fade-in">
                    <div class="text-3xl font-bold text-indigo-600">${word}</div>
                    <div class="text-gray-500 mt-1">【${kana}】</div>
                    <div class="mt-4 flex gap-2">
                        <span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded">${type}</span>
                        <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded">JLPT N5</span>
                    </div>
                    <p class="mt-4 text-gray-700">${mean}</p>
                    <button class="w-full mt-6 py-2 bg-gray-100 hover:bg-indigo-600 hover:text-white rounded-xl transition font-medium">加入生词本</button>
                </div>
            `;
        }
    </script>
</body>
</html>
