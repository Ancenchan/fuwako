<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako 日语学园 | Gemini 2.5 驱动</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    
    <style>
        :root {
            --sakura-pink: #ffc2d1;
            --sakura-deep: #ff85a1;
            --mint-green: #b9fbc0;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #4a4a4a;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #fceef5 0%, #e0f7fa 100%);
            color: var(--text-main);
            height: 100vh; overflow: hidden;
        }

        /* 玻璃拟态基础 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* 布局 */
        #app {
            display: grid;
            grid-template-columns: 80px 1fr 380px;
            grid-template-rows: 100vh;
            gap: 15px;
            padding: 15px;
        }

        /* 配置入口 (7.png) */
        #config-trigger {
            position: fixed;
            top: 15px; left: 15px;
            width: 50px; height: 50px;
            background-image: url('7.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #config-trigger:hover { transform: scale(1.1) rotate(5deg); }

        /* 导航 */
        nav { display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 20px; }
        .nav-item {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border-radius: 15px; font-size: 22px;
        }
        .nav-item.active { background: white; }

        /* 主区域 */
        main { overflow-y: auto; padding: 25px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 词块 */
        .word-token { display: inline-block; margin: 0 2px; padding: 0 4px; border-radius: 4px; cursor: pointer; }
        .pos-noun { border-bottom: 2px solid var(--sakura-pink); }
        .pos-verb { border-bottom: 2px solid var(--sakura-deep); }
        .pos-particle { border-bottom: 2px solid var(--mint-green); }

        /* 侧边栏分析详情 */
        aside { display: flex; flex-direction: column; gap: 15px; }
        .sidebar-panel { flex: 1; padding: 20px; overflow-y: auto; }
        .analysis-section { margin-bottom: 15px; border-bottom: 1px dashed var(--sakura-pink); padding-bottom: 10px; }
        .analysis-section strong { color: var(--sakura-deep); display: block; margin-bottom: 5px; }

        /* Wiki */
        .wiki-card { margin-bottom: 15px; padding: 15px; }
        .wiki-text { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
        
        /* 按钮与输入 */
        textarea { width: 100%; height: 280px; background: rgba(255,255,255,0.2); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; outline: none; }
        .btn-primary { background: var(--sakura-pink); border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-primary:hover { background: var(--sakura-deep); color: white; }

        /* Loading */
        #loading-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; display: none;}
    </style>
</head>
<body>

<div id="loading-view">🌸 AI 老师正在全力解析句子结构...</div>
<div id="config-trigger" onclick="alert('API Key 已内置，当前使用 Gemini 2.5 Flash')"></div>

<div id="app">
    <nav class="glass-card">
        <div class="nav-item" onclick="switchTab('wiki')">📚</div>
        <div class="nav-item active" onclick="switchTab('library')">📖</div>
        <div class="nav-item" onclick="switchTab('editor')">✍️</div>
    </nav>

    <main id="main-content" class="glass-card">
        <div id="view-wiki" class="tab-content">
            <h2 style="color: var(--sakura-deep);">基础语法百科</h2>
            <div id="wiki-list"></div>
        </div>

        <div id="view-library" class="tab-content active">
            <h2 style="color: var(--sakura-deep);">我的书架</h2>
            <div id="library-display"><p>快去“导入”页面输入新歌词吧！</p></div>
        </div>

        <div id="view-editor" class="tab-content">
            <h2 style="color: var(--sakura-deep);">导入歌词 (Gemini 2.5 强力分析)</h2>
            <textarea id="lyric-input" placeholder="贴入日语歌词..."></textarea>
            <button class="btn-primary" onclick="processLyrics()">分析并存入云端</button>
        </div>
    </main>

    <aside>
        <div class="sidebar-panel glass-card">
            <h3 style="border-bottom: 2px solid var(--sakura-pink);">深度语法解析</h3>
            <div id="analysis-box">点击“讲解”按钮开启教学模式。</div>
        </div>
        <div class="glass-card" style="padding: 15px; height: 120px;">
            <h4 style="margin:0">单词详情</h4>
            <div id="word-card-content" style="font-size: 0.85em;">点击歌词单词查看。</div>
        </div>
    </aside>
</div>

<script>
    // --- 核心配置 ---
    const GEMINI_API_KEY = "AIzaSyBd99vT-P-IkpRifkKvXy4G86ZmPS8_9cs"; // 已按需填入
    const MODEL_VERSION = "gemini-2.5-flash"; // 已按需设置

    let tokenizer = null;
    let currentLyricsData = [];

    // --- 语法数据 (已包含你补充的内容) ---
    const wikiData = [
        { "t": "人称代词", "c": "私（普通）/ 僕（男性自称）/ 俺（粗鲁男性）/ あなた（你）/ 彼（他）/ 彼女（她）。\n例：俺はこの世界の神になる！→ 我要成为这个世界的神！" },
        { "t": "格助词", "c": "は（主题）/ を（宾语）/ が（主语）/ の（所属）/ に（时间/地点）/ で（手段/场所）/ と（和）/ から（起点）/ まで（终点）。" }
        // ... (此处可继续补充其他 Wiki 数据)
    ];

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
        kuromoji.builder({ dicPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/" }).build((err, _tokenizer) => {
            tokenizer = _tokenizer;
            console.log("Fuwako Ready");
        });
        renderWiki();
    });

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${tabId}`).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function renderWiki() {
        const container = document.getElementById('wiki-list');
        container.innerHTML = wikiData.map(item => `
            <div class="glass-card wiki-card">
                <h4>${item.t}</h4>
                <div class="wiki-text">${item.c}</div>
            </div>
        `).join('');
    }

    // --- Gemini 2.5 深度分析逻辑 ---
    async function processLyrics() {
        const text = document.getElementById('lyric-input').value;
        if (!text) return alert("请输入内容");

        document.getElementById('loading-view').style.display = 'flex';

        // 强化的 Prompt 系统
        const prompt = `你是一个专业的日语教师。请对以下歌词进行【深度语法拆解】。
        要求：
        1. 返回一个严格的 JSON 数组，不要包含任何 Markdown 格式。
        2. 数组每个元素对应一行歌词，包含：
           - "trans": 中文翻译。
           - "structure": 句子结构分析（主语、谓语、宾语分别是什么）。
           - "grammar": 重点讲解（必须包含助词含义、连接词用法、动词活用形态）。
           - "vocab": 核心单词的含义。
        歌词内容如下：\n${text}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_VERSION}:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const rawResponse = data.candidates[0].content.parts[0].text;
            const cleanJson = rawResponse.replace(/```json|```/g, '').trim();
            currentLyricsData = JSON.parse(cleanJson);
            
            displayLibrary(text);
            switchTab('library');
        } catch (e) {
            console.error(e);
            alert("Gemini 分析异常，请检查 API Key 或模型版本是否可用。");
        } finally {
            document.getElementById('loading-view').style.display = 'none';
        }
    }

    function displayLibrary(originalText) {
        const lines = originalText.split('\n');
        const container = document.getElementById('library-display');
        container.innerHTML = lines.map((line, idx) => {
            if (!line.trim()) return '<br>';
            return `
                <div style="margin-bottom: 25px;">
                    <div style="font-size: 1.2em;">${tokenizeLine(line)}</div>
                    <button class="btn-primary" style="padding:4px 10px; font-size:12px;" onclick="showAnalysis(${idx})">深度讲解</button>
                </div>
            `;
        }).join('');
    }

    function tokenizeLine(text) {
        if (!tokenizer) return text;
        return tokenizer.tokenize(text).map(t => {
            let cls = "";
            if (t.pos === "名詞") cls = "pos-noun";
            if (t.pos.includes("動詞")) cls = "pos-verb";
            if (t.pos === "助詞") cls = "pos-particle";
            return `<span class="word-token ${cls}" onclick="showWord('${t.surface_form}','${t.pos}')">${t.surface_form}</span>`;
        }).join('');
    }

    function showWord(s, p) {
        document.getElementById('word-card-content').innerHTML = `<strong>${s}</strong><br>词性: ${p}`;
    }

    // 展示详细分析
    function showAnalysis(idx) {
        const box = document.getElementById('analysis-box');
        const data = currentLyricsData[idx];
        if (!data) return box.innerText = "未找到该行解析数据。";

        box.innerHTML = `
            <div class="fade-in">
                <div class="analysis-section"><strong>翻译</strong>${data.trans}</div>
                <div class="analysis-section"><strong>句子结构</strong>${data.structure}</div>
                <div class="analysis-section"><strong>助词与语法</strong>${data.grammar}</div>
                <div class="analysis-section"><strong>核心词汇</strong>${data.vocab}</div>
            </div>
        `;
    }
</script>
</body>
</html>
