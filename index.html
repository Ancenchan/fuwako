<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwari Lyrics & Grammar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #fceaf1 0%, #e8f4ff 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        /* 词性配色 */
        .pos-助词 { color: #e67e22; font-weight: bold; }
        .pos-动词 { color: #3498db; font-weight: bold; }
        .pos-名次 { color: #2c3e50; }
        .pos-形容词 { color: #e74c3c; }
        .pos-副词 { color: #27ae60; }

        .loading-mask {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .token-block {
            display: inline-block;
            margin: 2px;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .token-block:hover { background: rgba(0,0,0,0.05); }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader" class="loading-mask">
        <div class="animate-bounce mb-4 text-pink-400"><i data-lucide="heart" size="48"></i></div>
        <p class="text-gray-500 text-sm">正在加载字典与环境...</p>
    </div>

    <div id="ai-progress" class="fixed top-0 left-0 h-1 bg-gradient-to-r from-blue-400 to-purple-500 z-50 transition-all duration-300" style="width: 0%"></div>

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-8">
        <div class="flex gap-4">
            <button onclick="switchTab('grammar')" class="tab-btn font-bold text-xl text-gray-700 hover:text-pink-500 transition">语法</button>
            <button onclick="switchTab('lyrics')" class="tab-btn font-bold text-xl text-gray-700 hover:text-pink-500 transition">歌词库</button>
        </div>
        <div class="relative group">
            <img src="7.png" onclick="toggleTokenModal()" class="w-10 h-10 rounded-full cursor-pointer hover:rotate-12 transition shadow-sm" alt="Settings">
            <div id="token-modal" class="hidden absolute right-0 mt-2 w-64 glass-card p-4 z-50 shadow-xl">
                <input type="password" id="gh-token" placeholder="GitHub Token" class="w-full p-2 rounded-lg border-none mb-2 text-sm">
                <input type="text" id="gh-repo" placeholder="username/repo" class="w-full p-2 rounded-lg border-none mb-2 text-sm">
                <input type="password" id="gemini-key" placeholder="Gemini API Key" class="w-full p-2 rounded-lg border-none text-sm">
                <button onclick="saveConfigs()" class="w-full mt-2 bg-pink-400 text-white py-1 rounded-lg text-sm">保存配置</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <section id="tab-grammar" class="tab-content grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-6">
                <h3 class="font-bold text-lg mb-4 text-pink-600">动词变形展示</h3>
                <div class="space-y-2 text-gray-700" id="grammar-list">
                    <div class="p-3 bg-white/50 rounded-xl">
                        <p class="font-bold">~て型 (中顿/持续)</p>
                        <p class="text-sm opacity-70">五段动词：書く -> 书いて / 泳ぐ -> 泳いで</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-lyrics" class="tab-content hidden">
            <div id="lyrics-shelf" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div onclick="openUploadModal()" class="glass-card flex flex-col items-center justify-center p-8 cursor-pointer border-dashed border-2 hover:bg-white/80 transition">
                    <i data-lucide="plus" class="text-gray-400 mb-2"></i>
                    <span class="text-gray-400 text-sm">上传歌词</span>
                </div>
                </div>

            <div id="lyrics-detail" class="hidden glass-card p-6 min-h-[70vh]">
                <button onclick="backToShelf()" class="mb-4 text-gray-500 flex items-center gap-1 hover:text-pink-500"><i data-lucide="arrow-left" size="18"></i> 返回</button>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div id="lyrics-display" class="space-y-6 leading-relaxed text-lg overflow-y-auto max-h-[60vh] pr-4 no-scrollbar">
                        </div>
                    <div id="ai-explanation" class="bg-white/30 rounded-2xl p-4 overflow-y-auto max-h-[60vh] border border-white/50">
                        <p class="text-center text-gray-400 mt-10">点击右侧讲解按钮获取 AI 语法解析</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="upload-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="glass-card p-6 w-full max-w-md mx-4">
            <h3 class="font-bold mb-4">上传新歌词</h3>
            <input type="text" id="lyric-title" placeholder="歌曲名称" class="w-full p-2 rounded-lg mb-3 bg-white/50">
            <textarea id="lyric-content" rows="10" placeholder="粘贴歌词原文..." class="w-full p-2 rounded-lg mb-3 bg-white/50 text-sm"></textarea>
            <div class="flex gap-2">
                <button onclick="closeUploadModal()" class="flex-1 py-2 rounded-lg bg-gray-200">取消</button>
                <button onclick="handleUpload()" class="flex-1 py-2 rounded-lg bg-pink-400 text-white">保存并同步</button>
            </div>
        </div>
    </div>

    <script>
        // --- 全局变量 ---
        let tokenizer = null;
        let localLyrics = [];
        let offlineDict = {};
        let currentLyric = null;

        // --- 初始化 ---
        window.onload = async () => {
            lucide.createIcons();
            loadConfigs();
            
            // 加载 Kuromoji
            kuromoji.builder({ dicPath: "dict/" }).build((err, _tokenizer) => {
                if (err) { console.error(err); return; }
                tokenizer = _tokenizer;
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            });

            // 加载本地 5000 词库
            try {
                const res = await fetch('dict.json');
                offlineDict = await res.json();
            } catch (e) { console.warn("未找到本地 dict.json"); }

            // 同步 GitHub 数据
            syncWithGithub();
        };

        // --- 配置管理 ---
        function loadConfigs() {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
            document.getElementById('gemini-key').value = localStorage.getItem('gemini_key') || '';
        }

        function saveConfigs() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value);
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value);
            localStorage.setItem('gemini_key', document.getElementById('gemini-key').value);
            toggleTokenModal();
            syncWithGithub();
        }

        function toggleTokenModal() {
            document.getElementById('token-modal').classList.toggle('hidden');
        }

        // --- 核心逻辑：GitHub 同步 ---
        async function syncWithGithub() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if (!token || !repo) return;

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/lyrics_data.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    const cloudLyrics = JSON.parse(atob(data.content));
                    mergeLyrics(cloudLyrics);
                }
            } catch (e) { console.error("同步失败", e); }
        }

        function mergeLyrics(cloudData) {
            const localData = JSON.parse(localStorage.getItem('lyrics_cache') || '[]');
            const combined = [...localData, ...cloudData];
            // 按 timestamp 去重，保留最新的
            const unique = Array.from(new Map(combined.map(item => [item.id, item])).values());
            localLyrics = unique.sort((a, b) => b.timestamp - a.timestamp);
            localStorage.setItem('lyrics_cache', JSON.stringify(localLyrics));
            renderShelf();
        }

        async function pushToGithub(newData) {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if (!token || !repo) return;

            const path = 'lyrics_data.json';
            // 获取现有的 SHA
            let sha = '';
            const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (getRes.ok) {
                const fileData = await getRes.json();
                sha = fileData.sha;
            }

            await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update lyrics",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(localLyrics)))),
                    sha: sha
                })
            });
        }

        // --- 歌词处理 ---
        function renderShelf() {
            const shelf = document.getElementById('lyrics-shelf');
            const uploadBtn = shelf.firstElementChild;
            shelf.innerHTML = '';
            shelf.appendChild(uploadBtn);

            localLyrics.forEach(l => {
                const div = document.createElement('div');
                div.className = 'glass-card p-4 cursor-pointer hover:scale-105 transition';
                div.innerHTML = `<h4 class="font-bold truncate">${l.title}</h4><p class="text-xs text-gray-400 mt-2">${new Date(l.timestamp).toLocaleDateString()}</p>`;
                div.onclick = () => showLyricDetail(l);
                shelf.appendChild(div);
            });
        }

        function showLyricDetail(lyric) {
            currentLyric = lyric;
            document.getElementById('lyrics-shelf').classList.add('hidden');
            document.getElementById('lyrics-detail').classList.remove('hidden');
            const display = document.getElementById('lyrics-display');
            display.innerHTML = '';

            const lines = lyric.content.split('\n').filter(t => t.trim());
            lines.forEach((line, idx) => {
                const row = document.createElement('div');
                row.className = 'flex justify-between items-start group';
                
                const textPart = document.createElement('div');
                textPart.className = 'flex-1';
                
                // Kuromoji 分词渲染
                const tokens = tokenizer.tokenize(line);
                tokens.forEach(t => {
                    const span = document.createElement('span');
                    span.className = `token-block pos-${t.pos}`;
                    span.innerText = t.surface_form;
                    span.onclick = () => showWordInfo(t.surface_form);
                    textPart.appendChild(span);
                });

                const actionPart = document.createElement('button');
                actionPart.innerHTML = '<i data-lucide="sparkles" size="16"></i>';
                actionPart.className = 'opacity-0 group-hover:opacity-100 p-2 text-blue-500 transition';
                actionPart.onclick = () => explainWithGemini(lyric);

                row.appendChild(textPart);
                row.appendChild(actionPart);
                display.appendChild(row);
            });
            lucide.createIcons();

            // 如果已有解析结果，直接显示
            if (lyric.ai_explanation) renderAIExplanation(lyric.ai_explanation);
        }

        function showWordInfo(word) {
            const info = offlineDict[word] || "词库中暂无该词释义";
            alert(`${word}: ${info}`);
        }

        // --- Gemini AI ---
        async function explainWithGemini(lyric) {
            const apiKey = localStorage.getItem('gemini_key');
            if (!apiKey) return alert("请先输入 Gemini API Key");

            document.getElementById('ai-progress').style.width = '30%';
            
            const prompt = `你是一个日语老师。请分析以下歌词。
            歌词内容：
            ${lyric.content}
            
            请严格返回JSON数组格式，严禁任何开头语或解释。格式：
            [{"t": "整句翻译", "e": "语法点解释，包含单词变形和句型连接"}]
            要求：语言极简，不要客套。数组长度必须与歌词行数（${lyric.content.split('\n').filter(t=>t.trim()).length}行）一致。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                document.getElementById('ai-progress').style.width = '70%';
                const resData = await response.json();
                const aiText = resData.candidates[0].content.parts[0].text;
                const aiJson = JSON.parse(aiText.replace(/```json|```/g, ''));

                // 保存并同步
                lyric.ai_explanation = aiJson;
                saveAndSyncAll();
                renderAIExplanation(aiJson);
                document.getElementById('ai-progress').style.width = '100%';
                setTimeout(() => document.getElementById('ai-progress').style.width = '0', 1000);
            } catch (e) {
                console.error(e);
                alert("AI 解析失败，请检查 API Key 或网络");
                document.getElementById('ai-progress').style.width = '0';
            }
        }

        function renderAIExplanation(data) {
            const container = document.getElementById('ai-explanation');
            container.innerHTML = '<h4 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="cpu" size="18"></i> AI 语法解析</h4>';
            data.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'mb-6 text-sm border-b border-white/20 pb-2';
                div.innerHTML = `<p class="text-gray-500 mb-1">译：${item.t}</p><p class="text-blue-800 leading-relaxed">${item.e}</p>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- 交互辅助 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }

        function openUploadModal() { document.getElementById('upload-modal').classList.remove('hidden'); }
        function closeUploadModal() { document.getElementById('upload-modal').classList.add('hidden'); }
        function backToShelf() {
            document.getElementById('lyrics-shelf').classList.remove('hidden');
            document.getElementById('lyrics-detail').classList.add('hidden');
        }

        async function handleUpload() {
            const title = document.getElementById('lyric-title').value;
            const content = document.getElementById('lyric-content').value;
            if (!title || !content) return;

            const newLyric = {
                id: Date.now().toString(),
                title,
                content,
                timestamp: Date.now(),
                ai_explanation: null
            };

            localLyrics.unshift(newLyric);
            saveAndSyncAll();
            closeUploadModal();
            renderShelf();
        }

        function saveAndSyncAll() {
            localStorage.setItem('lyrics_cache', JSON.stringify(localLyrics));
            pushToGithub();
        }
    </script>
</body>
</html>
