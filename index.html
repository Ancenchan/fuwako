<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwari 日语学园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kosugi Maru', sans-serif; background-color: #fff9fb; }
        .fuwari-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 20px; border: 2px solid #ffe4e9; transition: transform 0.2s; }
        .fuwari-card:hover { transform: translateY(-5px); }
        .tab-active { border-bottom: 4px solid #ffb7c5; color: #ff8fa3; }
        .word-tag:hover { background-color: #fff0f3; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body class="text-gray-700">

    <nav class="p-6 flex justify-center space-x-12 bg-white shadow-sm">
        <button onclick="switchTab('knowledge')" id="btn-knowledge" class="tab-active text-xl font-bold pb-2">知识百科</button>
        <button onclick="switchTab('analyzer')" id="btn-analyzer" class="text-xl font-bold pb-2 text-gray-400">句子拆解</button>
    </nav>

    <main class="max-w-6xl mx-auto p-8">
        
        <section id="section-knowledge" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="fuwari-card p-6">
                <h3 class="text-pink-400 font-bold mb-4 flex items-center">🌸 核心助词 (Particles)</h3>
                <ul class="text-sm space-y-2">
                    <li><b class="text-red-400">は</b>：提示主题 (Topic)</li>
                    <li><b class="text-red-400">が</b>：主语/对象 (Subject)</li>
                    <li><b class="text-red-400">を</b>：宾语 (Object)</li>
                    <li><b class="text-red-400">に</b>：时间/地点/目的地</li>
                </ul>
            </div>
            
            <div class="fuwari-card p-6 bg-blue-50/30">
                <h3 class="text-blue-400 font-bold mb-4">🌀 动词活用 (Conjugation)</h3>
                <div class="text-xs grid grid-cols-2 gap-2">
                    <div class="p-2 border border-blue-100 rounded">ます形：礼貌</div>
                    <div class="p-2 border border-blue-100 rounded">て形：连接/状态</div>
                    <div class="p-2 border border-blue-100 rounded">ない形：否定</div>
                    <div class="p-2 border border-blue-100 rounded">辞書形：原形</div>
                </div>
            </div>

            <div class="fuwari-card p-6 bg-yellow-50/30">
                <h3 class="text-yellow-600 font-bold mb-4">💡 必备句型 (Patterns)</h3>
                <p class="text-xs">～たいです (想做...)</p>
                <p class="text-xs mt-1">～たことがあります (曾有过...经验)</p>
            </div>
        </section>

        <section id="section-analyzer" class="hidden">
            <div class="fuwari-card p-8">
                <textarea id="jp-input" class="w-full h-40 p-4 border-2 border-pink-100 rounded-xl focus:outline-none focus:border-pink-300" placeholder="在此粘贴日文文本..."></textarea>
                <button onclick="analyzeText()" class="mt-4 bg-pink-400 text-white px-8 py-3 rounded-full hover:bg-pink-500 shadow-lg transition">开始解析 ✨</button>
            </div>

            <div id="analysis-result" class="mt-8 space-y-4">
                </div>
        </section>
    </main>

    <div id="word-modal" class="fixed inset-0 bg-black/20 hidden flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl">
            <h2 id="modal-word" class="text-3xl font-bold text-pink-500 mb-2">単語</h2>
            <p id="modal-reading" class="text-gray-400 mb-4">假名加载中...</p>
            <div class="p-4 bg-pink-50 rounded-xl mb-6">
                <p id="modal-meaning">这里是 AI 自动生成的解释...</p>
            </div>
            <button onclick="saveWord()" class="w-full bg-pink-400 text-white py-2 rounded-xl">收藏生词本</button>
            <button onclick="closeModal()" class="w-full mt-2 text-gray-400 py-2">关闭</button>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('section-knowledge').classList.toggle('hidden', tab !== 'knowledge');
            document.getElementById('section-analyzer').classList.toggle('hidden', tab !== 'analyzer');
            document.getElementById('btn-knowledge').className = tab === 'knowledge' ? 'tab-active text-xl font-bold pb-2' : 'text-xl font-bold pb-2 text-gray-400';
            document.getElementById('btn-analyzer').className = tab === 'analyzer' ? 'tab-active text-xl font-bold pb-2' : 'text-xl font-bold pb-2 text-gray-400';
        }

        async function analyzeText() {
            const text = document.getElementById('jp-input').value;
            const resultDiv = document.getElementById('analysis-result');
            
            // 模拟拆解逻辑（实际部署建议调用 Gemini API）
            const sentences = text.split(/[。！？]/).filter(s => s.trim());
            resultDiv.innerHTML = sentences.map(s => `
                <div class="fuwari-card p-4">
                    <p class="text-lg mb-2">${tokenize(s)}</p>
                    <div class="text-xs text-blue-400">结构分析：主语 + 谓语...</div>
                </div>
            `).join('');
        }

        function tokenize(sentence) {
            // 这里演示将句子包裹成可点击的词块
            return sentence.split('').map(char => `<span class="word-tag px-1" onclick="showDetail('${char}')">${char}</span>`).join('');
        }

        function showDetail(word) {
            document.getElementById('modal-word').innerText = word;
            document.getElementById('word-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('word-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
