<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Lyrics AI Hub | 深度语法解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'fw-bg': '#fefaf6', 'fw-pink': '#ffb3c6', 'fw-cream': '#fff3e0', 'fw-lavender': '#e1bee7', 'fw-text': '#5d4037' },
                    fontFamily: { 'maru': ['"Kosugi Maru"', 'sans-serif'], 'round': ['"Varela Round"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #ff80ab; font-family: 'Varela Round'; padding-top: 1px; }
        .word-item { cursor: pointer; transition: all 0.2s; padding: 4px 10px; margin: 4px 6px; border-radius: 12px; display: inline-block; background: #fff; border-bottom: 3px solid transparent; }
        .word-item:hover { transform: translateY(-3px); background: #fff3e0; }
        .pos-noun { border-color: #b2dfdb; } .pos-verb { border-color: #ffb3c6; } .pos-particle { background: #fdf2f2; color: #8d6e63; }
        .lyric-line { line-height: 5.5rem; }
        .ai-note { white-space: pre-wrap; line-height: 1.8; }
    </style>
</head>
<body class="bg-fw-bg min-h-screen text-fw-text font-maru p-6">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black text-fw-pink font-round">ふわり AI Hub 🌸</h1>
        <button onclick="toggleSettings()" class="bg-white px-4 py-2 rounded-full shadow-sm text-sm">⚙️ 设置 API Key</button>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm">
                <textarea id="inputArea" class="w-full h-32 p-4 bg-fw-bg rounded-2xl outline-none text-xl" placeholder="歌に形はないけれど"></textarea>
                <button onclick="startAIAnalysis()" id="btnAction" class="w-full mt-4 bg-fw-pink text-white py-4 rounded-xl font-bold shadow-lg hover:scale-[1.01] transition">✨ AI 深度逐词拆解</button>
            </div>
            
            <div id="resultCard" class="bg-white p-8 rounded-3xl shadow-sm hidden">
                <div id="output" class="lyric-line text-4xl tracking-widest"></div>
            </div>
        </div>

        <aside class="bg-white p-8 rounded-3xl shadow-sm min-h-[500px]">
            <div id="aiAnalysisBox" class="ai-note text-sm text-fw-text/80">
                <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                    <span class="text-6xl mb-4">🤖</span>
                    <p>等待 AI 老师上线...</p>
                </div>
            </div>
        </aside>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Gemini API 配置</h3>
            <input type="password" id="geminiKey" placeholder="粘贴你的 API Key" class="w-full p-4 bg-fw-bg rounded-xl mb-6 outline-none border focus:border-fw-pink">
            <button onclick="saveKey()" class="w-full bg-fw-pink text-white py-3 rounded-xl font-bold">保存并开始学习</button>
        </div>
    </div>

    <script>
        let kuroshiro, analyzer;

        async function init() {
            const KClass = window.Kuroshiro?.default || window.Kuroshiro;
            const AClass = window.KuromojiAnalyzer?.default || window.KuromojiAnalyzer;
            kuroshiro = new KClass();
            analyzer = new AClass({ dictPath: "./dict" });
            await kuroshiro.init(analyzer);
            console.log("Ready!");
        }
        window.onload = init;

async function startAIAnalysis() {
    const text = document.getElementById('inputArea').value.trim();
    if (!text) return;

    const rawKey = localStorage.getItem('gemini_api_key') || "";
    const apiKey = rawKey.trim().replace(/[\r\n\s]/g, '');
    
    const aiBox = document.getElementById('aiAnalysisBox');
    aiBox.innerHTML = `<div class="p-6 bg-fw-cream/30 rounded-2xl animate-pulse text-center text-fw-pink font-bold">🚀 正在调用 Gemini 2.5 Flash 深度解析...</div>`;

    try {
        // 【核心修改】直接使用你 ListModels 返回的精确路径
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ 
                    parts: [{ 
                        text: `你是一位专业的日语老师。请对以下歌词进行【极其精细】的逐词解析和语法结构分析。
                        
                        要求：
                        1. 逐词解析：列出词汇、假名、词性、含义。
                        2. 语法重点：深入解释助词（如に、は、けれど）在本句中的具体语法功能。
                        3. 结构总结：拆解整句的主谓关系和逻辑转折。
                        
                        歌词内容：${text}` 
                    }] 
                }],
                generationConfig: {
                    temperature: 1,
                    topP: 0.95,
                    maxOutputTokens: 2048
                }
            })
        });

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || `状态码: ${response.status}`);
        }

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content) {
            const result = data.candidates[0].content.parts[0].text;
            
            // 渲染结果
            aiBox.style.whiteSpace = "pre-wrap";
            aiBox.className = "ai-note text-sm leading-relaxed text-fw-text p-2 animate-slide-up";
            aiBox.innerText = result;

            // 同步渲染本地假名
            const tokens = await analyzer.parse(text);
            renderTokens(tokens);
            document.getElementById('resultCard').classList.remove('hidden');
        }

    } catch (e) {
        console.error("Gemini 2.5 Error:", e);
        aiBox.innerHTML = `
            <div class="p-4 bg-red-50 text-red-500 rounded-xl text-xs">
                <strong>❌ Gemini 2.5 调用失败</strong><br>
                报错：${e.message}<br><br>
                提示：既然 ListModels 能看到 2.5，说明 Key 没问题。请确认请求时【不要】使用香港节点。
            </div>`;
    }
}
        function renderTokens(tokens) {
            const out = document.getElementById('output');
            const KUtils = window.Kuroshiro?.default?.util || window.Kuroshiro?.util;
            out.innerHTML = "";
            tokens.forEach(t => {
                const span = document.createElement('span');
                const pos = t.pos.includes('名詞') ? 'pos-noun' : t.pos.includes('動詞') ? 'pos-verb' : t.pos.includes('助詞') ? 'pos-particle' : '';
                span.className = `word-item ${pos}`;
                if (KUtils && t.surface_form !== t.reading && t.reading !== '*') {
                    span.innerHTML = `<ruby>${t.surface_form}<rt>${KUtils.kanaToHiragana(t.reading)}</rt></ruby>`;
                } else { span.innerText = t.surface_form; }
                out.appendChild(span);
            });
        }

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }
        function saveKey() {
            localStorage.setItem('gemini_api_key', document.getElementById('geminiKey').value);
            toggleSettings();
            alert("API Key 已就绪！🌸");
        }
    </script>
</body>
</html>
