<div id="custom-modal" class="modal-overlay" style="display: none;">
    <div class="glass-card modal-content">
        <h3 id="modal-title">输入信息</h3>
        <div id="modal-body"></div>
        <div class="modal-footer">
            <button class="cute-btn" onclick="closeModal()">取消</button>
            <button class="cute-btn primary" id="modal-confirm">确定</button>
        </div>
    </div>
</div>

<style>
    /* 新增弹窗样式 */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.2);
        backdrop-filter: blur(4px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .modal-content {
        width: 90%;
        max-width: 500px;
        padding: 30px;
        animation: fuwariShow 0.3s ease-out;
    }
    @keyframes fuwariShow {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
    .modal-body input, .modal-body textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.1);
        font-family: inherit;
    }
    .cute-btn.primary { background: var(--primary-pink); color: #d63384; font-weight: bold; }
</style>

<script>
    // --- 增强型自定义弹窗函数 ---
    function showModal(title, fields, onConfirm) {
        const modal = document.getElementById('custom-modal');
        const body = document.getElementById('modal-body');
        document.getElementById('modal-title').innerText = title;
        
        body.innerHTML = fields.map(f => f.type === 'textarea' 
            ? `<textarea id="m-${f.id}" placeholder="${f.placeholder}" rows="5"></textarea>`
            : `<input type="${f.type}" id="m-${f.id}" placeholder="${f.placeholder}" value="${f.value || ''}">`
        ).join('');

        modal.style.display = 'flex';
        document.getElementById('modal-confirm').onclick = () => {
            const results = {};
            fields.forEach(f => results[f.id] = document.getElementById(`m-${f.id}`).value);
            onConfirm(results);
            closeModal();
        };
    }

    function closeModal() {
        document.getElementById('custom-modal').style.display = 'none';
    }

    // --- 修正后的数据获取（静默处理 404） ---
    async function githubFetch(path) {
        try {
            const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                headers: { Authorization: `token ${GITHUB_TOKEN()}` }
            });
            if (resp.status === 404) return null; // 404 是正常现象，表示从未解析过
            const data = await resp.json();
            return JSON.parse(decodeURIComponent(escape(atob(data.content))));
        } catch (e) {
            console.log("GitHub Fetch 提示: 文件尚不存在或权限不足");
            return null;
        }
    }

    // --- 修正后的 Gemini 请求 (解决 400 错误) ---
    async function explainLine(songId, lineIdx) {
        const lyrics = JSON.parse(localStorage.getItem('fuwako_lyrics') || "[]");
        const song = lyrics.find(l => l.id === songId);
        
        // 进度条开始
        const bar = document.getElementById('ai-progress-bar');
        bar.style.width = '30%';

        // 使用更稳定的模型版本，注意 API Key 不要带多余空格
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY().trim()}`;

        const promptText = `你是一个专业的日语老师。请分析以下歌词并严格以JSON数组格式返回（不要包含Markdown代码块外框）。
        格式要求：[{"t": "翻译", "e": "语法点和变形讲解"}] 
        语法点要包括整体句子结构。
        歌词内容：\n${song.text.join('\n')}`;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: { response_mime_type: "application/json" } // 强制要求 JSON 响应
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error.message || "Gemini 请求失败");
            }

            bar.style.width = '70%';
            const resData = await response.json();
            const aiText = resData.candidates[0].content.parts[0].text;
            const aiResult = JSON.parse(aiText);
            
            // 存入 GitHub
            await githubPush(`analysis/ans_${songId}.json`, aiResult);
            window.currentAnalysis = aiResult;
            showExplanation(aiResult[lineIdx]);
            
        } catch (e) {
            console.error(e);
            alert("解析出错: " + e.message);
        } finally {
            bar.style.width = '100%';
            setTimeout(() => bar.style.width = '0', 800);
        }
    }

    // --- 替换原有的上传函数 ---
    function uploadLyric() {
        showModal("上传新歌词", [
            { id: 'title', type: 'text', placeholder: '请输入歌曲名称' },
            { id: 'content', type: 'textarea', placeholder: '请输入歌词内容（按行换行）' }
        ], async (data) => {
            if (!data.title || !data.content) return;
            const newItem = { 
                id: Date.now(), 
                title: data.title, 
                text: data.content.split('\n').filter(l => l.trim()), 
                timestamp: Date.now() 
            };
            
            let lyrics = JSON.parse(localStorage.getItem('fuwako_lyrics') || "[]");
            lyrics.push(newItem);
            localStorage.setItem('fuwako_lyrics', JSON.stringify(lyrics));
            renderBookshelf();
            await githubPush('lyrics_data.json', lyrics);
        });
    }

    // --- 替换原有的设置函数 ---
    function openSettings() {
        showModal("GitHub & Gemini 设置", [
            { id: 'token', type: 'password', placeholder: 'GitHub Personal Access Token', value: GITHUB_TOKEN() },
            { id: 'gemini', type: 'password', placeholder: 'Gemini API Key', value: GEMINI_KEY() }
        ], (data) => {
            if (data.token) localStorage.setItem('fuwako_github_token', data.token);
            if (data.gemini) localStorage.setItem('fuwako_gemini_key', data.gemini);
        });
    }
</script>
