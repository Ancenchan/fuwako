<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako | 日语学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    
    <style>
        :root {
            --fuwari-pink: #ffe5ec;
            --fuwari-blue: #d8e2dc;
            --fuwari-mint: #e8f3f1;
            --fuwari-lavender: #f3e5f5;
            --text-main: #4a4a4a;
        }

        body {
            background: linear-gradient(135deg, var(--fuwari-pink), var(--fuwari-blue));
            font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", "Hiragino Kaku Gothic Pro", sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 毛玻璃质感 */
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        /* 加载遮罩 */
        #loading-mask {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--fuwari-mint);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        /* 词块着色 */
        .token-verb { color: #ff85a1; font-weight: bold; } /* 动词-粉色 */
        .token-particle { color: #4a90e2; } /* 助词-蓝色 */
        .token-noun { color: #6b705c; }

        /* 动画 */
        .hover-scale { transition: transform 0.2s; }
        .hover-scale:hover { transform: scale(1.02); }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #ai-progress-bar {
            height: 4px;
            width: 0%;
            background: linear-gradient(90deg, #ff85a1, #a2d2ff);
            transition: width 0.3s;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-mask">
        <div class="text-2xl mb-4 font-bold">Fuwako 加载中...</div>
        <div class="w-64 h-2 bg-white rounded-full overflow-hidden">
            <div id="init-progress" class="h-full bg-pink-300" style="width: 0%"></div>
        </div>
        <div id="loading-text" class="mt-2 text-sm">正在初始化词典...</div>
    </div>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold tracking-tight">Fuwako</h1>
        <button onclick="toggleSettings()" class="glass p-2 hover-scale">
            <img src="7.png" alt="Settings" class="w-8 h-8 rounded-full">
        </button>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        
        <nav class="flex space-x-2">
            <button onclick="switchTab('grammar')" class="glass px-6 py-2 active:scale-95 transition">语法</button>
            <button onclick="switchTab('lyrics')" class="glass px-6 py-2 active:scale-95 transition">歌词解析</button>
        </nav>

        <section id="grammar" class="tab-content glass p-6 min-h-[60vh]">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="grammar-list">
                </div>
        </section>

        <section id="lyrics" class="tab-content active glass p-6 min-h-[60vh]">
            <div id="lyrics-list-view">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">歌词库</h2>
                    <button onclick="showUploadModal()" class="bg-white/50 px-4 py-1 rounded-full text-sm">+ 新增歌词</button>
                </div>
                <div id="lyrics-container" class="space-y-3">
                    </div>
            </div>

            <div id="lyrics-detail-view" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="backToList()" class="text-sm">← 返回</button>
                    <div class="space-x-2">
                        <button id="ai-analyze-btn" class="bg-pink-200/50 px-3 py-1 rounded-full text-xs">AI 深度解析</button>
                    </div>
                </div>
                <div id="ai-progress-container" class="w-full bg-gray-200/30 rounded-full mb-4 hidden">
                    <div id="ai-progress-bar" class="rounded-full"></div>
                </div>
                <div class="flex flex-col md:flex-row gap-6">
                    <div id="lyrics-render-area" class="flex-1 space-y-2 text-lg leading-relaxed">
                        </div>
                    <aside id="info-panel" class="w-full md:w-64 space-y-4">
                        <div class="glass p-4 text-sm min-h-[200px]">
                            <h3 class="font-bold mb-2">词义/语法</h3>
                            <div id="aside-content" class="text-gray-600">点击词块或解析按钮查看</div>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4">配置中心</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs mb-1">GitHub Personal Token</label>
                    <input type="password" id="gh-token" class="w-full p-2 rounded-lg bg-white/50 border-none focus:ring-2 ring-pink-300 outline-none">
                </div>
                <div>
                    <label class="block text-xs mb-1">SiliconFlow API Key</label>
                    <input type="password" id="sf-api-key" class="w-full p-2 rounded-lg bg-white/50 border-none focus:ring-2 ring-pink-300 outline-none">
                </div>
                <div class="flex justify-end space-x-2 pt-4">
                    <button onclick="toggleSettings()" class="px-4 py-2">取消</button>
                    <button onclick="saveSettings()" class="bg-pink-300 text-white px-6 py-2 rounded-xl">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 状态管理 ---
        let tokenizer = null;
        let dictData = {};
        let lyricsData = [];
        let currentLyrics = null;

        // --- 初始化 ---
        window.onload = async () => {
            initKuromoji();
            loadLocalSettings();
            fetchGrammar();
            syncLyrics();
        };

        function initKuromoji() {
            const progress = document.getElementById('init-progress');
            kuromoji.builder({ dicPath: "dict/" }).build((err, _tokenizer) => {
                if (err) {
                    console.error(err);
                    document.getElementById('loading-text').innerText = "词典加载失败，请检查路径";
                    return;
                }
                tokenizer = _tokenizer;
                progress.style.width = "100%";
                setTimeout(() => {
                    document.getElementById('loading-mask').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-mask').style.display = 'none';
                    }, 500);
                }, 800);
            });
        }

        // --- 核心功能：分词与渲染 ---
        function renderLyricsWithTokens(textArray) {
            const container = document.getElementById('lyrics-render-area');
            container.innerHTML = '';

            textArray.forEach(line => {
                const lineDiv = document.createElement('div');
                lineDiv.className = "flex flex-wrap items-center gap-x-1 py-1 border-b border-white/20";

                // 简单判断是否包含日语（假名）
                if (/[ぁ-んァ-ヶ]/.test(line)) {
                    const tokens = tokenizer.tokenize(line);
                    tokens.forEach(token => {
                        const span = document.createElement('span');
                        span.innerText = token.surface_form;
                        span.className = `cursor-pointer hover:bg-white/40 rounded px-0.5 transition ${getPosClass(token.pos)}`;
                        span.onclick = () => lookupWord(token.surface_form);
                        lineDiv.appendChild(span);
                    });
                    
                    // 添加行解析按钮
                    const analyzeBtn = document.createElement('button');
                    analyzeBtn.innerText = "🧐";
                    analyzeBtn.className = "ml-auto text-xs opacity-50 hover:opacity-100";
                    analyzeBtn.onclick = () => showLineAnalysis(line);
                    lineDiv.appendChild(analyzeBtn);
                } else {
                    // 非日语行（如中文翻译或罗马音）直接显示
                    lineDiv.innerText = line;
                    lineDiv.className += " text-sm text-gray-500 italic";
                }
                container.appendChild(lineDiv);
            });
        }

        function getPosClass(pos) {
            if (pos === "助詞") return "token-particle";
            if (pos === "動詞") return "token-verb";
            if (pos === "名詞") return "token-noun";
            return "";
        }

        // --- GitHub 同步逻辑 ---
        async function syncLyrics() {
            const token = localStorage.getItem('fuwako_gh_token');

        async function pushToCloud(data) {

        // --- AI 解析 (SiliconFlow) ---
        async function analyzeWithAI() {
            const apiKey = localStorage.getItem('fuwako_sf_key');
            if (!apiKey) {
                alert("请先在设置中输入 SiliconFlow API Key");
                return;
            }
            
            // 展示进度条
            const progContainer = document.getElementById('ai-progress-container');
            const progBar = document.getElementById('ai-progress-bar');
            progContainer.classList.remove('hidden');

            // 提示词：你是一个日语老师，请将以下歌词按行翻译并解析语法，强制返回 JSON 格式...
        }

        // --- UI 交互 ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
        }

        function saveSettings() {
            localStorage.setItem('fuwako_gh_token', document.getElementById('gh-token').value);
            localStorage.setItem('fuwako_sf_key', document.getElementById('sf-api-key').value);
            toggleSettings();
            alert("配置已保存");
        }

        function lookupWord(word) {
            const content = document.getElementById('aside-content');
            // 匹配 dict.json 逻辑
            content.innerHTML = `<div class="font-bold text-lg">${word}</div><p class="mt-2 text-pink-500">${dictData[word] || '本地词库未收录'}</p>`;
        }
        
        async function fetchGrammar() {
            try {
                const res = await fetch('grammar.json');
                const data = await res.json();

            } catch (e) { console.log("请确保根目录下有 grammar.json"); }
        }
    </script>
</body>
</html>
