<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako 日语学园 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/kuromoji@0.1.2/build/kuromoji.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fuwari-pink: #ffc2d1;
            --fuwari-pink-dark: #fb6f92;
            --fuwari-bg: #fffcfd;
            --fuwari-card-bg: rgba(255, 255, 255, 0.7);
            --fuwari-border: #ffe5ec;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--fuwari-bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(338, 100%, 95%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(338, 100%, 98%, 1) 0, transparent 50%);
            color: #6d6d6d;
            min-height: 100vh;
        }

        /* 纯净可爱的导航栏 */
        nav {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--fuwari-border);
        }

        .nav-btn {
            position: relative;
            font-weight: 700;
            color: #ccadb4;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn.active {
            color: var(--fuwari-pink-dark);
            transform: scale(1.1);
        }

        .nav-btn.active::after {
            content: '✿';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
        }

        /* 更轻盈的卡片 */
        .fuwari-card {
            background: var(--fuwari-card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid white;
            box-shadow: 0 10px 30px rgba(255, 194, 209, 0.15);
            transition: all 0.3s ease;
        }

        .fuwari-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 194, 209, 0.25);
            background: white;
        }

        /* 词块效果优化 */
        .jp-token {
            display: inline-block;
            padding: 0 4px;
            margin: 0 2px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .jp-token:hover, .jp-token.selected {
            background: #ffe5ec;
            color: var(--fuwari-pink-dark);
        }

        .pos-助詞 { border-bottom: 2px solid #ffccd5; }
        .pos-動詞 { color: #8ecae6; }
        .pos-名詞 { color: #6d6d6d; }
        .pos-形容詞 { color: #b7e4c7; }

        .line-wrapper { margin-bottom: 1.2rem; line-height: 2.2; }
        
        .sidebar-sticky {
            position: sticky;
            top: 100px;
            height: calc(100vh - 140px);
            overflow-y: auto;
        }

        /* 配置弹窗动画 */
        #config-modal {
            transition: opacity 0.3s ease;
        }

        #config-modal .modal-content {
            animation: fuwariPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fuwariPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #fff;
            border-top: 4px solid var(--fuwari-pink);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader-screen" class="fixed inset-0 flex flex-col items-center justify-center z-[9999]">
        <div class="spinner"></div>
        <p class="mt-4 font-bold text-pink-300 tracking-widest text-sm">LOADING...</p>
    </div>

    <nav class="sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-6">
            <div class="flex items-center gap-6">
                <div class="text-2xl font-bold text-pink-400 tracking-tight">Fuwako.</div>
                <button onclick="openConfigModal()" id="btn-config" class="text-xl opacity-40 hover:opacity-100 transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M208,80H173.66a36,36,0,0,0-67.32,0H48a12,12,0,0,0,0,24H106.34a36,36,0,0,0,67.32,0H208a12,12,0,0,0,0-24Zm-68,28a12,12,0,1,1,12-12A12,12,0,0,1,140,108ZM48,176a12,12,0,0,0,0,24H82.34a36,36,0,0,0,67.32,0H208a12,12,0,0,0,0-24H149.66a36,36,0,0,0-67.32,0Z"></path></svg>
                </button>
            </div>
            <div class="flex gap-10">
                <button onclick="switchPage('wiki')" id="btn-wiki" class="nav-btn active">WIKI</button>
                <button onclick="switchPage('lib')" id="btn-lib" class="nav-btn">LIBRARY</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="page-wiki" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></section>

        <section id="page-lib" class="hidden">
            <div class="fuwari-card p-10 mb-10 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-pink-50 rounded-full opacity-50"></div>
                <div id="sync-status" class="absolute top-6 right-8 text-[10px] font-bold tracking-widest uppercase text-gray-300"></div>
                
                <h3 class="text-lg font-bold text-gray-400 mb-6 flex items-center gap-2">
                    <span class="w-8 h-[2px] bg-pink-200"></span> NEW ENTRY
                </h3>
                <input type="text" id="input-title" placeholder="Title" class="w-full p-4 mb-4 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 bg-white/50 transition-all">
                <textarea id="input-content" placeholder="Content..." class="w-full h-40 p-4 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 bg-white/50 transition-all"></textarea>
                <button onclick="saveLyrics()" class="w-full mt-6 bg-pink-200 text-white font-bold py-4 rounded-2xl hover:bg-pink-300 shadow-sm transition-all active:scale-95">SAVE TO CLOUD</button>
            </div>
            
            <div id="lyrics-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="page-detail" class="hidden">
            <button onclick="switchPage('lib')" class="mb-6 text-pink-300 text-sm font-bold flex items-center gap-2 hover:gap-3 transition-all">
                <span>←</span> BACK TO LIBRARY
            </button>
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1 fuwari-card p-8 md:p-14 min-h-[600px]">
                    <h1 id="view-title" class="text-2xl font-bold text-center mb-12 text-gray-700 tracking-tight"></h1>
                    <div id="view-body" class="text-[17px] text-gray-500 leading-relaxed"></div>
                </div>
                <div class="w-full lg:w-80 shrink-0">
                    <div class="fuwari-card p-8 sidebar-sticky bg-white/80">
                        <h3 class="font-bold text-pink-300 text-xs tracking-widest mb-8 uppercase">Analysis</h3>
                        <div id="sidebar-content" class="space-y-6"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="config-modal" class="fixed inset-0 bg-pink-100/20 backdrop-blur-md hidden z-[100] flex items-center justify-center p-6">
        <div class="modal-content bg-white p-10 rounded-[40px] max-w-sm w-full shadow-2xl border border-white">
            <div class="w-12 h-12 bg-pink-50 rounded-2xl flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#ffb7c5" viewBox="0 0 256 256"><path d="M216,48H40A16,16,0,0,0,24,64V192a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V64A16,16,0,0,0,216,48ZM216,192H40V88H216V192Z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">GitHub Sync</h3>
            <p class="text-xs text-gray-400 mb-8 leading-relaxed">请输入您的 Personal Access Token 以开启跨设备同步功能。</p>
            
            <input type="password" id="cfg-github" placeholder="ghp_xxxxxxxxxxxx" class="w-full p-4 mb-8 rounded-2xl border border-pink-50 outline-none focus:border-pink-200 bg-gray-50/50 text-sm">

            <div class="flex gap-4">
                <button onclick="saveConfig()" class="flex-1 bg-pink-200 text-white font-bold py-4 rounded-2xl hover:bg-pink-300 transition-all">CONNECT</button>
                <button onclick="closeConfigModal()" class="flex-1 bg-gray-50 text-gray-400 font-bold py-4 rounded-2xl hover:bg-gray-100 transition-all">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 配置区 =================
        const GEMINI_KEY = "AIzaSyC3vAqGTuOmHUe1UDFbHXA4uf4Ij0ZeJbs"; // 硬编码
        const REPO_OWNER = "ancenchan";
        const REPO_NAME = "fuwako";
        const FILE_PATH = "lyrics_data.json";

        let GITHUB_TOKEN = localStorage.getItem('fuwako_github') || "";
        let tokenizer = null;
        let library = JSON.parse(localStorage.getItem('fuwari_lib') || '[]');

        const JP_DATA = [
            { title: "人称代词", icon: "🌸", content: [
                {k: "第一人称", v: "私 / 僕 / 俺 / あたし"},
                {k: "第二人称", v: "あなた / 君 / お前"},
                {k: "第三人称", v: "彼 / 彼女 / あいつ"}
            ]},
            { title: "核心格助词", icon: "📍", content: [
                {k: "は/が", v: "主题提示 / 强调主语"},
                {k: "を", v: "宾格（动作对象）"},
                {k: "に", v: "时间、对象、目的地"}
            ]},
            { title: "动词活用", icon: "🌀", content: [
                {k: "ます形", v: "敬体礼貌形式"},
                {k: "て形", v: "接续、正在进行"},
                {k: "辞書形", v: "原形/将来时"}
            ]},
            { title: "授受关系", icon: "🎁", content: [
                {k: "あげる", v: "我 给 别人"},
                {k: "くれる", v: "别人 给 我"},
                {k: "もらう", v: "我 得到"}
            ]},
            { title: "敬语体系", icon: "🙇", content: [
                {k: "尊敬语", v: "抬高对方"},
                {k: "谦让语", v: "降低自己"},
                {k: "郑重语", v: "です/ます"}
            ]},
            { title: "疑问与细节", icon: "❓", content: [
                {k: "だれ / なに", v: "谁 / 什么"},
                {k: "どこ / いつ", v: "哪里 / 何时"}
            ]}
        ];

        // ================= 初始化 =================
        kuromoji.builder({ dicPath: "./dict/" }).build(async (err, _tokenizer) => {
            if (err) return alert("词典加载失败");
            tokenizer = _tokenizer;
            renderWiki();
            updateConfigUI();
            if(GITHUB_TOKEN) await forceSyncFlow();
            else renderLibrary();
            document.getElementById('loader-screen').style.display = 'none';
        });

        // ================= 弹窗逻辑 =================
        function openConfigModal() {
            document.getElementById('cfg-github').value = GITHUB_TOKEN;
            document.getElementById('config-modal').classList.remove('hidden');
        }
        function closeConfigModal() {
            document.getElementById('config-modal').classList.add('hidden');
        }
        async function saveConfig() {
            GITHUB_TOKEN = document.getElementById('cfg-github').value.trim();
            localStorage.setItem('fuwako_github', GITHUB_TOKEN);
            closeConfigModal();
            updateConfigUI();
            if (GITHUB_TOKEN) await forceSyncFlow();
        }
        function updateConfigUI() {
            const statusText = document.getElementById('sync-status');
            statusText.innerHTML = GITHUB_TOKEN ? "● Connected to Cloud" : "○ Local Mode";
            statusText.className = GITHUB_TOKEN ? "absolute top-6 right-8 text-[10px] font-bold tracking-widest uppercase text-pink-300" : "absolute top-6 right-8 text-[10px] font-bold tracking-widest uppercase text-gray-300";
        }

        // ================= 同步与存取 =================
        async function forceSyncFlow() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            let sha = "", remoteLibrary = [];
            try {
                const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    remoteLibrary = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch (e) {}
            const map = new Map();
            remoteLibrary.forEach(item => map.set(item.id || item.title, item));
            library.forEach(item => { if(!map.has(item.id || item.title)) map.set(item.id || item.title, item); });
            library = Array.from(map.values()).sort((a,b) => b.id - a.id);
            localStorage.setItem('fuwari_lib', JSON.stringify(library));
            renderLibrary();
            await pushToGitHub(sha);
        }

        async function pushToGitHub(knownSha = "") {
            if(!GITHUB_TOKEN) return;
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            try {
                let sha = knownSha;
                if(!sha) {
                    const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
                    if(res.ok) sha = (await res.json()).sha;
                }
                const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(library, null, 2))));
                await fetch(url, {
                    method: 'PUT',
                    headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "Update", content: contentBase64, sha: sha })
                });
            } catch (e) {}
        }

        async function saveLyrics() {
            const title = document.getElementById('input-title').value || "Untitled";
            const content = document.getElementById('input-content').value;
            if(!content.trim()) return;
            library.unshift({ title, content, id: Date.now() });
            localStorage.setItem('fuwari_lib', JSON.stringify(library));
            renderLibrary();
            document.getElementById('input-title').value = "";
            document.getElementById('input-content').value = "";
            pushToGitHub();
        }

        // ================= 渲染 =================
        function switchPage(page) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const activeNav = document.getElementById(`btn-${page === 'detail' ? 'lib' : page}`);
            if(activeNav) activeNav.classList.add('active');
            window.scrollTo(0,0);
        }

        function renderWiki() {
            document.getElementById('page-wiki').innerHTML = JP_DATA.map(box => `
                <div class="fuwari-card p-8">
                    <div class="text-pink-300 text-2xl mb-4">${box.icon}</div>
                    <h3 class="font-bold text-gray-700 text-sm tracking-widest mb-6 uppercase">${box.title}</h3>
                    <div class="space-y-4">
                        ${box.content.map(item => `
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-pink-200 uppercase">${item.k}</span>
                                <span class="text-sm text-gray-500">${item.v}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderLibrary() {
            document.getElementById('lyrics-container').innerHTML = library.map((item, index) => `
                <div class="fuwari-card p-8 cursor-pointer group" onclick="viewDetail(${index})">
                    <h4 class="font-bold text-gray-600 mb-3 group-hover:text-pink-400 transition-colors">${item.title}</h4>
                    <p class="text-xs text-gray-400 line-clamp-2 leading-loose">${item.content}</p>
                </div>
            `).join('');
        }

        function viewDetail(idx) {
            const item = library[idx];
            document.getElementById('view-title').innerText = item.title;
            const body = document.getElementById('view-body');
            document.getElementById('sidebar-content').innerHTML = `<div class="py-20 text-center text-gray-300 text-xs tracking-widest">SELECT A WORD</div>`;
            switchPage('detail');
            setTimeout(() => {
                body.innerHTML = item.content.split('\n').map(line => {
                    const isJp = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/.test(line);
                    if (isJp && tokenizer) {
                        return `<div class="line-wrapper">${tokenizer.tokenize(line).map(t => `<span class="jp-token pos-${t.pos}" onclick="showWord(this, '${t.surface_form}', '${t.reading}', '${t.pos}')">${t.surface_form}</span>`).join('')}</div>`;
                    }
                    return `<div class="line-wrapper opacity-40 italic text-sm pl-4 border-l border-pink-50">${line}</div>`;
                }).join('');
            }, 100);
        }

        async function showWord(el, word, reading, pos) {
            document.querySelectorAll('.jp-token').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            const sidebar = document.getElementById('sidebar-content');
            sidebar.style.opacity = '0';
            
            setTimeout(async () => {
                sidebar.innerHTML = `
                    <div>
                        <h2 class="text-3xl font-bold text-gray-700 mb-1">${word}</h2>
                        <p class="text-pink-200 text-xs font-bold tracking-tighter">【${reading || ''}】</p>
                    </div>
                    <div class="pt-4 border-t border-pink-50">
                        <div class="inline-block px-3 py-1 rounded-full bg-pink-50 text-[10px] text-pink-300 font-bold mb-6">${pos}</div>
                        <div id="ai-res" class="text-sm text-gray-500 leading-relaxed space-y-4 animate-pulse">Searching...</div>
                    </div>
                `;
                sidebar.style.opacity = '1';

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `你是一位温柔可爱的日语老师。请简单解释词汇“${word}”（词性：${pos}）的含义，并给出一个非常简短的动漫风例句。要求：语气清新，排版简洁，不要废话。` }] }] })
                    });
                    const data = await res.json();
                    document.getElementById('ai-res').classList.remove('animate-pulse');
                    document.getElementById('ai-res').innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                } catch (e) {
                    document.getElementById('ai-res').innerText = "呜咕，连接失败了..";
                }
            }, 200);
        }
    </script>
</body>
</html>
