<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 日语学习助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        :root {
            --primary-pink: #ffdae0;
            --primary-blue: #d4f1f9;
            --primary-yellow: #fef5d4;
            --text-color: #5a5a5a;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-blue));
            margin: 0;
            color: var(--text-color);
            min-height: 100vh;
        }

        /* Loading Mask */
        #loading-mask {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        /* Glassmorphism UI */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        /* Tabs Navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .tab-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            background: var(--glass-bg);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Token / Settings */
        #github-settings {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            z-index: 100;
        }

        #github-settings img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid white;
            transition: transform 0.3s;
        }

        /* Progress Bar */
        #ai-progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: transparent;
            z-index: 1001;
        }
        #ai-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4);
            transition: width 0.3s;
        }

        /* Modules */
        .module { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .module.active { display: block; }

        /* Grammar Cards */
        .grammar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .grammar-item {
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Lyrics View */
        .bookshelf {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .lyric-card {
            padding: 20px;
            cursor: pointer;
            text-align: center;
        }

        /* Token Colors */
        .pos-助词 { color: #e67e22; }
        .pos-动词 { color: #2ecc71; font-weight: bold; }
        .pos-名词 { color: #3498db; }
        .pos-形容词 { color: #9b59b6; }

        /* Detail Page */
        .analysis-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        .lyric-line {
            padding: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .explanation-panel {
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
            position: sticky;
            top: 20px;
        }

        button.cute-btn {
            background: white;
            border: none;
            padding: 5px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="loading-mask">
        <p>正在加载可爱能量 (Kuromoji)...</p>
    </div>

    <div id="ai-progress-container"><div id="ai-progress-bar"></div></div>

    <div id="github-settings" onclick="openSettings()">
        <img src="7.png" alt="Settings">
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab('grammar')">语法手册</button>
        <button class="tab-btn" onclick="switchTab('lyrics')">歌词本</button>
    </nav>

    <div id="grammar" class="module active">
        <div class="grammar-grid">
            <div class="glass-card grammar-item"><strong>~ます形</strong><br>动词礼貌体变形</div>
            <div class="glass-card grammar-item"><strong>~て形</strong><br>连接、请求、进行</div>
            <div class="glass-card grammar-item"><strong>~ない形</strong><br>否定、禁止</div>
            <div class="glass-card grammar-item"><strong>~た形</strong><br>过去式、经验</div>
        </div>
    </div>

    <div id="lyrics" class="module">
        <div id="bookshelf-view">
            <button class="cute-btn" style="margin-bottom: 20px;" onclick="uploadLyric()">+ 上传新歌词</button>
            <div class="bookshelf" id="lyric-list">
                </div>
        </div>

        <div id="detail-view" style="display: none;">
            <button class="cute-btn" onclick="backToBookshelf()">← 返回</button>
            <h2 id="detail-title"></h2>
            <div class="analysis-container">
                <div class="glass-card" id="lyric-content" style="padding: 20px;"></div>
                <div class="glass-card explanation-panel" id="ai-explanation">
                    <p style="color: #999;">点击右侧“讲解”按钮获取 Gemini 分析</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 核心配置 ---
        let tokenizer = null;
        let localDict = {};
        const REPO = "Ancenchan/fuwako";
        const GITHUB_TOKEN = () => localStorage.getItem('fuwako_github_token');
        const GEMINI_KEY = () => localStorage.getItem('fuwako_gemini_key');

        // --- 初始化 ---
        window.onload = async () => {
            // 加载 Kuromoji
            kuromoji.builder({ dicPath: "dict/" }).build((err, _tokenizer) => {
                if (err) { console.error(err); return; }
                tokenizer = _tokenizer;
                document.getElementById('loading-mask').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-mask').remove(), 500);
            });

            // 加载本地词库
            try {
                const resp = await fetch('dict.json');
                localDict = await resp.json();
            } catch (e) { console.warn("未找到 dict.json"); }

            renderBookshelf();
        };

        // --- UI 交互 ---
        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function openSettings() {
            const token = prompt("请输入 GitHub Personal Access Token:", GITHUB_TOKEN() || "");
            if (token !== null) localStorage.setItem('fuwako_github_token', token);
            const gkey = prompt("请输入 Gemini API Key:", GEMINI_KEY() || "");
            if (gkey !== null) localStorage.setItem('fuwako_gemini_key', gkey);
        }

        // --- 数据同步核心逻辑 ---
        async function githubFetch(path) {
            const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                headers: { Authorization: `token ${GITHUB_TOKEN()}` }
            });
            if (!resp.ok) return null;
            const data = await resp.json();
            return JSON.parse(decodeURIComponent(escape(atob(data.content))));
        }

        async function githubPush(path, content, message = "Update data") {
            const currentFile = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                headers: { Authorization: `token ${GITHUB_TOKEN()}` }
            }).then(r => r.json()).catch(() => ({}));

            return fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                method: "PUT",
                headers: { Authorization: `token ${GITHUB_TOKEN()}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: message,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(content)))),
                    sha: currentFile.sha
                })
            });
        }

        // --- 歌词处理 ---
        async function uploadLyric() {
            const title = prompt("歌曲名称:");
            const text = prompt("歌词内容 (按行分隔):");
            if (!title || !text) return;

            const newItem = { id: Date.now(), title, text: text.split('\n'), timestamp: Date.now() };
            
            // 1. 更新本地
            let lyrics = JSON.parse(localStorage.getItem('fuwako_lyrics') || "[]");
            lyrics.push(newItem);
            localStorage.setItem('fuwako_lyrics', JSON.stringify(lyrics));
            renderBookshelf();

            // 2. 静默同步到 GitHub
            await githubPush('lyrics_data.json', lyrics);
        }

        function renderBookshelf() {
            const list = document.getElementById('lyric-list');
            const lyrics = JSON.parse(localStorage.getItem('fuwako_lyrics') || "[]");
            list.innerHTML = lyrics.map(l => `
                <div class="glass-card lyric-card" onclick="openLyric(${l.id})">
                    <h3>${l.title}</h3>
                    <p>${l.text.length} 行</p>
                </div>
            `).join('');
        }

        async function openLyric(id) {
            const lyrics = JSON.parse(localStorage.getItem('fuwako_lyrics') || "[]");
            const item = lyrics.find(l => l.id === id);
            document.getElementById('detail-title').innerText = item.title;
            
            const contentDiv = document.getElementById('lyric-content');
            contentDiv.innerHTML = item.text.map((line, idx) => `
                <div class="lyric-line">
                    <div class="tokens">${tokenizeLine(line)}</div>
                    <button class="cute-btn" onclick="explainLine(${id}, ${idx})">讲解</button>
                </div>
            `).join('');

            document.getElementById('bookshelf-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';

            // 尝试加载已有的 AI 分析
            const savedAnalysis = await githubFetch(`analysis/ans_${id}.json`);
            if (savedAnalysis) window.currentAnalysis = savedAnalysis;
        }

        function tokenizeLine(text) {
            if (!tokenizer) return text;
            const tokens = tokenizer.tokenize(text);
            return tokens.map(t => {
                const posClass = `pos-${t.pos}`;
                return `<span class="${posClass}" title="${t.reading}" onclick="lookup('${t.surface_form}')">${t.surface_form}</span>`;
            }).join('');
        }

        function lookup(word) {
            if (localDict[word]) alert(`${word}: ${localDict[word]}`);
        }

        // --- Gemini 2.5 集成 ---
        async function explainLine(songId, lineIdx) {
            const lyrics = JSON.parse(localStorage.getItem('fuwako_lyrics') || "[]");
            const song = lyrics.find(l => l.id === songId);
            
            document.getElementById('ai-progress-bar').style.width = '50%';
            
            const prompt = `你是一个日语老师。请分析以下歌词并以JSON数组格式返回，要求格式为 [{"t": "翻译", "e": "语法点和单词变形"}]。数组长度必须为 ${song.text.length}。内容要简洁直接。歌词：\n${song.text.join('\n')}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY()}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const resData = await response.json();
                const aiResult = JSON.parse(resData.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                
                // 保存到 GitHub
                await githubPush(`analysis/ans_${songId}.json`, aiResult);
                
                // 显示当前行的解释
                showExplanation(aiResult[lineIdx]);
            } catch (e) {
                alert("AI 解析失败，请检查 API Key 或网络");
            } finally {
                document.getElementById('ai-progress-bar').style.width = '100%';
                setTimeout(() => document.getElementById('ai-progress-bar').style.width = '0', 1000);
            }
        }

        function showExplanation(data) {
            const panel = document.getElementById('ai-explanation');
            panel.innerHTML = `
                <h3>AI 讲解</h3>
                <p><strong>翻译:</strong> ${data.t}</p>
                <p><strong>语法:</strong><br>${data.e.replace(/\n/g, '<br>')}</p>
            `;
        }

        function backToBookshelf() {
            document.getElementById('bookshelf-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
        }
    </script>
</body>
</html>
