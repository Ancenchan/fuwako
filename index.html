<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Lyrics ふわり Hub | 语义翻译增强版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Varela+Round&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fw-bg': '#fefaf6', 'fw-pink': '#ffb3c6', 'fw-cream': '#fff3e0', 
                        'fw-mint': '#b2dfdb', 'fw-lavender': '#e1bee7', 'fw-text': '#5d4037', 
                    },
                    fontFamily: { 'maru': ['"Kosugi Maru"', 'sans-serif'], 'round': ['"Varela Round"', 'sans-serif'] },
                    borderRadius: { 'fw': '1.5rem' },
                    boxShadow: { 'fw': '0 10px 25px -5px rgba(255, 179, 198, 0.2)', 'fw-sm': '0 4px 6px -1px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    
    <style>
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #ff80ab; user-select: none; padding-top: 1px; font-family: 'Varela Round', sans-serif; }
        
        /* 语义切割：增加词块间距，并赋予微弱的背景色区分 */
        .word-item { 
            position: relative; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            padding: 4px 8px; 
            margin: 2px 4px; /* 增加左右间距形成切割感 */
            border-radius: 12px; 
            display: inline-block;
            background: rgba(255, 255, 255, 0.5);
        }
        .word-item:hover { background-color: #fff3e0; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,179,198,0.2); }
        
        /* 根据词性设置底部标识线 */
        .pos-noun { border-bottom: 3px solid #b2dfdb; } /* 名词：薄荷绿 */
        .pos-verb { border-bottom: 3px solid #ffb3c6; } /* 动词：粉色 */
        .pos-adj { border-bottom: 3px solid #ffe082; }  /* 形容词：黄色 */
        .pos-particle { color: #a1887f; border-bottom: 3px solid #eeeeee; font-size: 0.95em; } /* 助词：浅灰 */

        .lyric-line { line-height: 5.5rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        .loader { border: 4px solid #fff; border-radius: 50%; border-top: 4px solid #ffb3c6; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-fw-bg min-h-screen text-fw-text font-maru">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-center px-6">
        <div class="loader mb-5"></div>
        <p class="text-xl font-bold tracking-wider text-fw-pink">ふわり 系统启动中...</p>
        <p class="text-xs text-slate-400 mt-2">正在下载词典文件 (./dict)，请稍候</p>
    </div>

    <nav class="bg-white/60 backdrop-blur-sm sticky top-0 z-10 border-b border-fw-cream/50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🌸</span>
                <h1 class="text-3xl font-black text-fw-pink tracking-tighter font-round">ふわり <span class="text-slate-400 font-light">Hub</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="clearAll()" class="px-5 py-2.5 bg-fw-cream text-fw-text rounded-full text-sm font-bold hover:shadow-fw-sm transition">☁️ 重置</button>
                <button onclick="toggleSettings()" class="px-5 py-2.5 bg-fw-pink text-white rounded-full text-sm font-bold hover:shadow-fw transition">⚙️ 设置</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-10 flex flex-col lg:flex-row gap-10">
        <div class="flex-1 space-y-8">
            <div class="bg-white p-8 rounded-fw shadow-fw border border-fw-cream/30">
                <textarea id="inputArea" class="w-full h-40 p-5 bg-fw-bg border-none rounded-2xl focus:ring-4 focus:ring-fw-cream/50 outline-none text-xl resize-none" placeholder="在此粘贴日语歌词..."></textarea>
                <button onclick="handleProcess()" id="btnAction" class="w-full mt-6 bg-fw-pink text-white py-4 rounded-full text-xl font-black hover:scale-[1.02] transition-all flex items-center justify-center gap-2 shadow-lg shadow-fw/50">
                    ✨ 开始语义解析
                </button>
            </div>

            <div id="fullTranslationCard" class="bg-white p-6 rounded-fw shadow-fw border-l-8 border-fw-lavender hidden animate-fade-in">
                <h3 class="text-xs font-bold text-fw-lavender uppercase mb-2 tracking-widest font-round">Sentence Meaning</h3>
                <p id="fullTranslationText" class="text-xl font-medium text-fw-text italic leading-relaxed"></p>
            </div>

            <div id="resultCard" class="bg-white p-10 rounded-fw shadow-fw border border-fw-cream/30 hidden">
                <div id="output" class="lyric-line text-3xl tracking-widest leading-relaxed"></div>
            </div>
        </div>

        <aside class="w-full lg:w-[360px]">
            <div class="bg-white p-8 rounded-fw shadow-fw border border-fw-cream/30 sticky top-28 transition-all min-h-[400px]">
                <div id="wordInfo" class="space-y-6 text-center py-10">
                    <span class="text-6xl">🍡</span>
                    <p class="text-slate-400 italic">点击词语获取<br>实时翻译与解析</p>
                </div>
            </div>
        </aside>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-fw-text/30 backdrop-blur-sm z-50 hidden flex items-center justify-center animate-fade-in px-4">
        <div class="bg-fw-bg p-8 rounded-fw max-w-md w-full shadow-2xl border-4 border-fw-pink">
            <h3 class="text-2xl font-bold mb-6 text-fw-pink font-round">Sync Settings</h3>
            <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full p-4 bg-white rounded-full mb-4 outline-none border border-fw-cream">
            <input type="text" id="ghRepo" placeholder="用户名/仓库名" class="w-full p-4 bg-white rounded-full mb-8 outline-none border border-fw-cream">
            <div class="flex gap-3">
                <button onclick="saveSettings()" class="flex-1 bg-fw-pink text-white py-3 rounded-full font-bold">保存</button>
                <button onclick="toggleSettings()" class="flex-1 bg-white py-3 rounded-full border border-fw-cream">取消</button>
            </div>
        </div>
    </div>

    <script>
        let kuroshiro, analyzer;

        // 工具类获取逻辑 (穿透 .default)
        function getKUtils() {
            const KBase = window.Kuroshiro;
            if (!KBase) return null;
            return KBase.default?.util || KBase.util || null;
        }

        async function initSystem() {
            try {
                const KClass = window.Kuroshiro?.default || window.Kuroshiro;
                const AClass = window.KuromojiAnalyzer?.default || window.KuromojiAnalyzer;

                kuroshiro = new KClass();
                analyzer = new AClass({ dictPath: "./dict" });

                await kuroshiro.init(analyzer);
                document.getElementById('loadingOverlay').classList.add('hidden');
            } catch (err) {
                console.error("Init Error:", err);
                document.querySelector('#loadingOverlay p').innerText = "加载失败，请检查 ./dict 路径";
            }
        }

        window.addEventListener('DOMContentLoaded', initSystem);

        // 处理主逻辑：解析 + 全文翻译
        async function handleProcess() {
            const text = document.getElementById('inputArea').value.trim();
            const btn = document.getElementById('btnAction');
            if (!text) return;

            try {
                btn.disabled = true;
                btn.innerText = "⚡️ 正在解析语义...";

                // 1. 语义切割解析
                const tokens = await analyzer.parse(text);
                renderLyrics(tokens);

                // 2. 全文翻译 (调用免费 API)
                translateSentence(text);

                document.getElementById('resultCard').classList.remove('hidden');
            } catch (e) {
                console.error(e);
                alert("处理失败，请重试");
            } finally {
                btn.disabled = false;
                btn.innerText = "✨ 开始语义解析";
            }
        }

        // 全文翻译：使用 MyMemory 免费 API
        async function translateSentence(text) {
            const card = document.getElementById('fullTranslationCard');
            const display = document.getElementById('fullTranslationText');
            
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ja|zh-CN`);
                const data = await res.json();
                display.innerText = data.responseData.translatedText || "翻译暂时不可用";
                card.classList.remove('hidden');
            } catch (e) {
                display.innerText = "网络连接超时";
            }
        }

        // 渲染带有语义切割感的歌词
        function renderLyrics(tokens) {
            const container = document.getElementById('output');
            container.innerHTML = "";
            const KUtils = getKUtils();

            tokens.forEach(token => {
                const span = document.createElement('span');
                const posClass = getPosClass(token.pos);
                span.className = `word-item font-round ${posClass} animate-fade-in`;
                
                // 处理读音
                if (KUtils && token.surface_form !== token.reading && token.reading !== '*') {
                    const hira = KUtils.kanaToHiragana(token.reading);
                    span.innerHTML = `<ruby>${token.surface_form}<rt>${hira}</rt></ruby>`;
                } else {
                    span.innerText = token.surface_form;
                }

                // 点击事件
                span.onclick = () => showDetail(token);
                container.appendChild(span);

                // 换行符处理
                if (token.surface_form.includes('\n')) {
                    container.appendChild(document.createElement('br'));
                }
            });
        }

        function getPosClass(pos) {
            if (pos.includes('名詞')) return 'pos-noun';
            if (pos.includes('動詞')) return 'pos-verb';
            if (pos.includes('形容詞')) return 'pos-adj';
            if (pos.includes('助詞')) return 'pos-particle';
            return '';
        }

        // 显示单词详情 & 自动翻译单个词
        async function showDetail(token) {
            const info = document.getElementById('wordInfo');
            const KUtils = getKUtils();
            const reading = (KUtils && token.reading !== '*') ? KUtils.kanaToHiragana(token.reading) : '-';
            
            // 初始显示加载状态
            info.innerHTML = `
                <div class="p-6 bg-fw-bg rounded-fw animate-fade-in text-left border-2 border-fw-cream">
                    <div class="text-4xl font-black text-fw-text text-center">${token.surface_form}</div>
                    <div class="text-base text-fw-pink font-bold mt-1 text-center">【${reading}】</div>
                    <div class="mt-6 text-center text-slate-400">🔍 正在获取翻译...</div>
                </div>`;

            // 异步获取单词翻译
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(token.surface_form)}&langpair=ja|zh-CN`);
                const data = await res.json();
                const trans = data.responseData.translatedText;

                info.innerHTML = `
                <div class="p-6 bg-fw-bg rounded-fw animate-fade-in text-left border-2 border-fw-cream">
                    <div class="text-4xl font-black text-fw-text tracking-tighter text-center">${token.surface_form}</div>
                    <div class="text-base text-fw-pink font-bold mt-1 text-center">【${reading}】</div>
                    
                    <div class="mt-6 p-4 bg-white rounded-xl shadow-inner text-center border border-fw-cream/50">
                        <div class="text-xs text-slate-400 mb-1">中文释义</div>
                        <div class="text-xl font-bold text-fw-text">${trans}</div>
                    </div>

                    <div class="mt-4 space-y-2 text-sm">
                        <div class="flex justify-between pb-1 border-b border-dashed border-fw-cream">
                            <span>词性</span><span class="font-bold text-fw-mint">${token.pos}</span>
                        </div>
                        <div class="flex justify-between">
                            <span>原形</span><span class="font-bold text-fw-pink">${token.basic_form}</span>
                        </div>
                    </div>

                    <button onclick="alert('已收藏到待开发列表！')" class="w-full mt-6 py-3.5 bg-fw-lavender text-fw-text rounded-full font-black shadow-fw hover:bg-fw-mint hover:text-white transition-all">✨ 收藏到 words.json</button>
                </div>`;
            } catch (e) {
                console.error("Translation error");
            }
        }

        // 设置与重置逻辑
        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }
        function saveSettings() {
            localStorage.setItem('gh_token', document.getElementById('ghToken').value);
            localStorage.setItem('gh_repo', document.getElementById('ghRepo').value);
            toggleSettings();
            alert("配置已本地保存🌸");
        }
        function clearAll() {
            if(confirm("确定要清空结果吗？")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
