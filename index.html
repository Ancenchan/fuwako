<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako | 日语学习</title>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fuwari-pink: #ffe4e9;
            --fuwari-blue: #d4f1f9;
            --fuwari-mint: #dcfce7;
            --fuwari-accent: #ffb7c5;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Quicksand', 'Zen Maru Gothic', sans-serif;
            background: linear-gradient(135deg, #ffe4e9 0%, #d4f1f9 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #5a5a5a;
        }

        /* 毛玻璃风格 */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(255, 183, 197, 0.2);
        }

        /* 加载遮罩 */
        #loading-mask {
            position: fixed;
            inset: 0;
            background: var(--fuwari-pink);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .loader-heart {
            font-size: 3rem;
            animation: beat 1.2s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 进度条 */
        .progress-container {
            width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--fuwari-accent);
            transition: width 0.3s;
        }

        /* 词块着色 */
        .token { display: inline-block; margin: 2px; padding: 2px 4px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .token:hover { background: rgba(255,255,255,0.8); transform: translateY(-2px); }
        .pos-verb { border-bottom: 3px solid #ffb7c5; } /* 动词-粉 */
        .pos-particle { border-bottom: 3px solid #93c5fd; } /* 助词-蓝 */
        .pos-noun { border-bottom: 3px solid #c084fc; } /* 名词-紫 */
        .pos-adjective { border-bottom: 3px solid #fbbf24; } /* 形容词-黄 */

        /* 标签切换 */
        .tab-btn { padding: 10px 24px; border-radius: 20px; transition: 0.3s; }
        .tab-btn.active { background: var(--fuwari-accent); color: white; }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--fuwari-accent); border-radius: 10px; }

        .ai-progress-top {
            position: fixed;
            top: 0; left: 0; height: 4px;
            background: linear-gradient(90deg, #ffb7c5, #93c5fd);
            z-index: 100; width: 0%; transition: width 0.4s;
        }
    </style>
</head>
<body>

    <div id="loading-mask">
        <div class="loader-heart">🌸</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p class="mt-4 text-sm opacity-70">词典努力加载中... <span id="progress-text">0%</span></p>
    </div>

    <div id="ai-progress" class="ai-progress-top"></div>

    <div class="max-w-5xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8">
            <div class="flex space-x-4 bg-white/40 p-2 rounded-full backdrop-blur-sm">
                <button onclick="switchTab('grammar')" id="tab-grammar" class="tab-btn active">文法</button>
                <button onclick="switchTab('lyrics')" id="tab-lyrics" class="tab-btn">歌词书架</button>
            </div>
            <img src="7.png" onclick="openTokenModal()" class="w-10 h-10 cursor-pointer hover:rotate-12 transition-transform" title="GitHub 设置">
        </header>

        <main>
            <section id="view-grammar" class="grid grid-cols-1 md:grid-cols-2 gap-4"></section>

            <section id="view-lyrics" class="hidden">
                <div id="lyrics-shelf" class="space-y-4">
                    <button onclick="showUploadModal()" class="glass-card w-full p-6 text-center border-dashed border-2 border-pink-300 text-pink-400 hover:bg-pink-50 transition">
                        + 添加新歌词
                    </button>
                    <div id="lyrics-list" class="grid grid-cols-1 gap-4"></div>
                </div>

                <div id="lyrics-detail" class="hidden flex flex-col md:flex-row gap-6">
                    <div class="flex-1 glass-card p-8">
                        <button onclick="backToShelf()" class="text-sm mb-4 opacity-60 hover:opacity-100">← 返回书架</button>
                        <h2 id="detail-title" class="text-2xl font-bold mb-6 text-pink-500"></h2>
                        <div id="detail-content" class="leading-loose text-lg"></div>
                    </div>
                    <div class="w-full md:w-80 space-y-4">
                        <div class="glass-card p-6 min-h-[200px]">
                            <h3 class="font-bold mb-4 flex justify-between items-center">
                                词汇释义
                                <span class="text-xs font-normal opacity-50">本地库</span>
                            </h3>
                            <div id="dict-display" class="text-sm italic opacity-80">点击歌词中的单词查看解释</div>
                        </div>
                        <button id="ai-btn" onclick="startAIAnalysis()" class="glass-card w-full p-4 bg-pink-400 text-white font-bold hover:shadow-lg transition">
                            ✨ AI 语法深度解析
                        </button>
                        <div id="ai-display" class="glass-card p-6 text-sm overflow-y-auto max-h-[400px]">
                            点击上方按钮开启 AI 解析...
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden z-50 flex items-center justify-center">
        <div id="token-modal" class="glass-card p-8 w-80 hidden">
            <h3 class="font-bold mb-4">GitHub Token 设置</h3>
            <p class="text-xs mb-4 opacity-70">需要 repo 权限用于同步数据</p>
            <input type="password" id="gh-token" class="w-full p-2 rounded-lg border mb-4" placeholder="ghp_xxxx">
            <div class="flex justify-end space-x-2">
                <button onclick="closeModal()" class="px-4 py-2">取消</button>
                <button onclick="saveToken()" class="px-4 py-2 bg-pink-400 text-white rounded-lg">保存</button>
            </div>
        </div>
        
        <div id="upload-modal" class="glass-card p-8 w-full max-w-md hidden">
            <h3 class="font-bold mb-4">上传歌词</h3>
            <input type="text" id="lyric-title" class="w-full p-2 rounded-lg border mb-4" placeholder="歌曲标题">
            <textarea id="lyric-text" class="w-full p-2 rounded-lg border mb-4 h-40" placeholder="粘贴歌词文本..."></textarea>
            <div class="flex justify-end space-x-2">
                <button onclick="closeModal()" class="px-4 py-2">取消</button>
                <button onclick="handleUpload()" class="px-4 py-2 bg-pink-400 text-white rounded-lg">上传并同步</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心配置 ---
        const CONFIG = {
            repo: "Ancenchan/fuwako",
            lyricsFile: "lyrics_data.json",
            grammarFile: "grammar.json",
            dictFile: "dict.json",
            kuromojiDir: "dict" // 对应仓库根目录下的 dict 文件夹
        };

        let tokenizer = null;
        let localDict = {};
        let currentLyrics = [];
        let activeLyric = null;
        let isAnalyzing = false;

        // --- 初始化 ---
        window.onload = async () => {
            initKuromoji();
            loadGrammar();
            loadLocalDict();
            syncData();
        };

        // 1. Kuromoji 初始化 (带百分比遮罩)
        function initKuromoji() {
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            
            // 模拟进度 (因为 kuromoji.builder 没有原生进度回调，我们根据阶段模拟)
            let prog = 0;
            const timer = setInterval(() => {
                prog += (90 - prog) * 0.1;
                bar.style.width = prog + '%';
                text.innerText = Math.floor(prog) + '%';
            }, 200);

            kuromoji.builder({ dicPath: CONFIG.kuromojiDir }).build((err, _tokenizer) => {
                clearInterval(timer);
                if (err) { console.error(err); return; }
                tokenizer = _tokenizer;
                bar.style.width = '100%';
                text.innerText = '100%';
                setTimeout(() => {
                    document.getElementById('loading-mask').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-mask').classList.add('hidden'), 500);
                }, 500);
            });
        }

        // 2. 数据拉取与合并 (基于 Timestamp)
        async function syncData() {
            const token = localStorage.getItem('gh_token');
            let cloudData = [];

            if (token) {
                try {
                    const res = await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.lyricsFile}`, {
                        headers: { Authorization: `token ${token}` }
                    });
                    if (res.ok) {
                        const json = await res.json();
                        cloudData = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                    }
                } catch (e) { console.warn("Cloud sync failed, using local."); }
            }

            const localData = JSON.parse(localStorage.getItem('lyrics_cache') || '[]');
            
            // 合并逻辑：以 ID 为主键，保留 Timestamp 最新的
            const mergedMap = new Map();
            [...cloudData, ...localData].forEach(item => {
                const existing = mergedMap.get(item.id);
                if (!existing || item.timestamp > existing.timestamp) {
                    mergedMap.set(item.id, item);
                }
            });

            currentLyrics = Array.from(mergedMap.values()).sort((a, b) => b.timestamp - a.timestamp);
            localStorage.setItem('lyrics_cache', JSON.stringify(currentLyrics));
            renderLyricsShelf();
        }

        // 3. 静默推送至 GitHub
        async function pushToCloud() {
            const token = localStorage.getItem('gh_token');
            if (!token) return;

            try {
                // 先获取文件的 SHA
                const getFile = await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.lyricsFile}`, {
                    headers: { Authorization: `token ${token}` }
                });
                const fileData = await getFile.json();
                const sha = fileData.sha;

                const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentLyrics, null, 2))));
                
                await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.lyricsFile}`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Sync Lyrics",
                        content: content,
                        sha: sha
                    })
                });
            } catch (e) { console.error("Push failed", e); }
        }

        // 4. 文本解析渲染
        function renderLyricContent(text) {
            if (!tokenizer) return text;
            const lines = text.split('\n');
            return lines.map(line => {
                const tokens = tokenizer.tokenize(line);
                const html = tokens.map(t => {
                    let posClass = "";
                    if (t.pos === "助詞") posClass = "pos-particle";
                    else if (t.pos === "動詞") posClass = "pos-verb";
                    else if (t.pos === "名詞") posClass = "pos-noun";
                    else if (t.pos === "形容詞") posClass = "pos-adjective";

                    return `<span class="token ${posClass}" onclick="lookupWord('${t.surface_form}')">${t.surface_form}</span>`;
                }).join('');
                return `<div class="lyric-line mb-2">${html}</div>`;
            }).join('');
        }

        // 5. 单词查询 (本地 dict.json)
        function lookupWord(word) {
            const display = document.getElementById('dict-display');
            if (localDict[word]) {
                display.innerHTML = `<b class="text-pink-500 text-lg">${word}</b><br>${localDict[word]}`;
            } else {
                display.innerHTML = `<b class="text-gray-400">${word}</b><br>未收录于本地库`;
            }
        }

        // 6. 硅基流动 AI 解析
        async function startAIAnalysis() {
            if (isAnalyzing || !activeLyric) return;

            // 检查云端是否已有结果 (analysis_{id}.json)
            const token = localStorage.getItem('gh_token');
            const analysisPath = `analysis_${activeLyric.id}.json`;
            
            // 尝试读取已有解析
            try {
                const check = await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${analysisPath}`, {
                    headers: { Authorization: `token ${token}` }
                });
                if (check.ok) {
                    const json = await check.json();
                    const data = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                    displayAIResults(data);
                    return;
                }
            } catch(e) {}

            // 发起 AI 请求
            const apiKey = localStorage.getItem('sf_api_key') || prompt("请输入硅基流动 API Key:");
            if (!apiKey) return;
            localStorage.setItem('sf_api_key', apiKey);

            isAnalyzing = true;
            document.getElementById('ai-btn').innerText = "⚡ 解析中...";
            const progress = document.getElementById('ai-progress');
            
            try {
                const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "deepseek-ai/DeepSeek-V3", // 这里可以换成你习惯的模型
                        messages: [{
                            role: "user",
                            content: `请解析以下歌词，强制返回JSON数组格式 [{"t":"翻译","e":"语法/变形点"}]，要求行数一致，语言简洁：\n${activeLyric.content}`
                        }],
                        temperature: 0.1
                    })
                });

                // 模拟进度条
                progress.style.width = '50%';
                const result = await response.json();
                const analysisData = JSON.parse(result.choices[0].message.content.replace(/```json|```/g, ''));
                
                progress.style.width = '100%';
                displayAIResults(analysisData);

                // 保存到 GitHub
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(analysisData, null, 2))));
                await fetch(`https://api.github.com/repos/${CONFIG.repo}/contents/${analysisPath}`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "AI Analysis", content: content })
                });

            } catch (e) {
                alert("AI 解析失败，请检查 API Key 或网络");
            } finally {
                isAnalyzing = false;
                document.getElementById('ai-btn').innerText = "✨ AI 语法深度解析";
                setTimeout(() => progress.style.width = '0%', 1000);
            }
        }

        // --- 辅助 UI 函数 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('view-grammar').classList.toggle('hidden', tab !== 'grammar');
            document.getElementById('view-lyrics').classList.toggle('hidden', tab !== 'lyrics');
        }

        function openTokenModal() {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('token-modal').classList.remove('hidden');
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
        }

        function saveToken() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value);
            closeModal();
            syncData();
        }

        function showUploadModal() {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.querySelectorAll('#modal-overlay > div').forEach(d => d.classList.add('hidden'));
        }

        function handleUpload() {
            const title = document.getElementById('lyric-title').value;
            const text = document.getElementById('lyric-text').value;
            if (!title || !text) return;

            const newItem = {
                id: 'id_' + Date.now(),
                title: title,
                content: text,
                timestamp: Date.now()
            };

            currentLyrics.unshift(newItem);
            localStorage.setItem('lyrics_cache', JSON.stringify(currentLyrics));
            renderLyricsShelf();
            closeModal();
            pushToCloud();
        }

        function renderLyricsShelf() {
            const list = document.getElementById('lyrics-list');
            list.innerHTML = currentLyrics.map(item => `
                <div onclick="viewDetail('${item.id}')" class="glass-card p-5 cursor-pointer hover:bg-white/60 transition group flex justify-between items-center">
                    <div>
                        <div class="font-bold text-lg text-pink-500">${item.title}</div>
                        <div class="text-xs opacity-40">${new Date(item.timestamp).toLocaleString()}</div>
                    </div>
                    <span class="opacity-0 group-hover:opacity-100 transition">🌸 进入学习</span>
                </div>
            `).join('');
        }

        function viewDetail(id) {
            activeLyric = currentLyrics.find(l => l.id === id);
            document.getElementById('lyrics-shelf').classList.add('hidden');
            document.getElementById('lyrics-detail').classList.remove('hidden');
            document.getElementById('detail-title').innerText = activeLyric.title;
            document.getElementById('detail-content').innerHTML = renderLyricContent(activeLyric.content);
            document.getElementById('ai-display').innerHTML = "点击上方按钮开启 AI 解析...";
        }

        function backToShelf() {
            document.getElementById('lyrics-shelf').classList.remove('hidden');
            document.getElementById('lyrics-detail').classList.add('hidden');
            activeLyric = null;
        }

        function displayAIResults(data) {
            const container = document.getElementById('ai-display');
            container.innerHTML = data.map((item, idx) => `
                <div class="mb-4 pb-2 border-b border-pink-100">
                    <div class="text-xs font-bold text-blue-400">#Line ${idx + 1}</div>
                    <div class="text-gray-600 mb-1">译: ${item.t}</div>
                    <div class="bg-pink-50/50 p-2 rounded text-xs">${item.e}</div>
                </div>
            `).join('');
        }

        async function loadGrammar() {
            try {
                const res = await fetch(CONFIG.grammarFile);
                const data = await res.json();
                document.getElementById('view-grammar').innerHTML = data.map(g => `
                    <div class="glass-card p-6">
                        <h4 class="font-bold text-pink-500 border-b pb-2 mb-3">${g.title}</h4>
                        <div class="text-sm space-y-2">${g.content}</div>
                    </div>
                `).join('');
            } catch (e) { console.log("Grammar file not found."); }
        }

        async function loadLocalDict() {
            try {
                const res = await fetch(CONFIG.dictFile);
                localDict = await res.json();
            } catch (e) { console.log("Dict file not found."); }
        }
    </script>
</body>
</html>
