<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwari Lyrics & Grammar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        :root {
            --fuwari-pink: #ffe4e6;
            --fuwari-blue: #e0f2fe;
            --fuwari-green: #f0fdf4;
            --fuwari-glass: rgba(255, 255, 255, 0.6);
        }

        body {
            background: linear-gradient(135deg, var(--fuwari-pink), var(--fuwari-blue));
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            color: #4b5563;
        }

        .glass-card {
            background: var(--fuwari-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* 语法颜色 */
        .pos-verb { color: #ec4899; font-weight: bold; }    /* 动词-粉 */
        .pos-particle { color: #3b82f6; }                 /* 助词-蓝 */
        .pos-noun { color: #10b981; }                     /* 名词-绿 */
        
        .token-block {
            display: inline-block;
            margin: 0 2px;
            padding: 2px 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .token-block:hover { background: rgba(255, 255, 255, 0.8); }

        /* 加载遮罩 */
        #loading-mask {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .ai-progress-bar {
            height: 4px;
            background: #ddd;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 50;
        }
        #ai-progress-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #f472b6, #60a5fa);
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div id="loading-mask">
        <div class="text-2xl font-bold text-pink-400 mb-4 animate-bounce">ふわり加载中...</div>
        <div class="text-sm text-gray-400">正在准备 Kuromoji 字典与配置</div>
    </div>

    <div class="ai-progress-bar">
        <div id="ai-progress-inner"></div>
    </div>

    <div class="container mx-auto p-4 max-w-4xl">
        <header class="flex justify-between items-center mb-6 px-4">
            <h1 class="text-2xl font-bold text-white drop-shadow-md">Fuwako 日语学习</h1>
            <button onclick="toggleSettings()" class="glass-card px-4 py-2 text-sm">Settings</button>
        </header>

        <section class="glass-card p-6 mb-8">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="mr-2">📚</span> 语法快速速查
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="bg-white/40 p-3 rounded-xl text-sm hover:bg-white/60 cursor-pointer">
                    <div class="font-bold text-pink-500">动词-て形</div>
                    <div class="text-xs text-gray-500">五段/一段/サ变</div>
                </div>
                </div>
        </section>

        <main id="app-router">
            <div id="view-shelf" class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold">我的歌词库</h2>
                    <button onclick="showEditor()" class="bg-pink-400 text-white px-4 py-2 rounded-full shadow-lg">+ 新歌词</button>
                </div>
                <div id="lyrics-list" class="grid gap-4">
                    </div>
            </div>

            <div id="view-detail" class="hidden">
                <button onclick="showShelf()" class="mb-4 text-gray-500">← 返回书架</button>
                <div class="flex flex-col md:flex-row gap-6">
                    <div id="lyrics-display" class="glass-card p-8 flex-1 leading-loose text-xl">
                        </div>
                    <div id="side-panel" class="w-full md:w-72 space-y-4">
                        <div class="glass-card p-4">
                            <h3 class="font-bold border-b pb-2 mb-2">释义/语法</h3>
                            <div id="side-content" class="text-sm text-gray-600">点击单词或“讲解”按钮显示内容</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-black/20 hidden flex items-center justify-center">
        <div class="glass-card p-8 w-80">
            <h3 class="font-bold mb-4">设置 GitHub Token</h3>
            <input id="input-token" type="password" placeholder="ghp_..." class="w-full p-2 rounded-lg border mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="toggleSettings()" class="text-gray-400">取消</button>
                <button onclick="saveSettings()" class="bg-blue-400 text-white px-4 py-1 rounded-lg">保存</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { Octokit } from "https://cdn.skypack.dev/@octokit/core";

        // --- 全局状态 ---
        let tokenizer = null;
        let lyricsData = [];
        let dictData = {}; // 约5000词的本地词库

        const CONFIG = {
            owner: 'YOUR_USERNAME', // 你的 GitHub 用户名
            repo: 'YOUR_REPO_NAME',  // 你的仓库名
            path: 'lyrics_data.json',
            token: localStorage.getItem('gh_token') || ''
        };

        // --- 初始化 ---
        async function init() {
            // 1. 加载 Kuromoji
            kuromoji.builder({ dicPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/" }).build((err, _tokenizer) => {
                if (err) return console.error(err);
                tokenizer = _tokenizer;
                document.getElementById('loading-mask').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-mask').remove(), 500);
            });

            // 2. 拉取云端数据并合并
            await syncCloudData();
            renderShelf();
        }

        // --- GitHub 持久化模块 ---
        async function syncCloudData() {
            if (!CONFIG.token) return;
            const octokit = new Octokit({ auth: CONFIG.token });
            try {
                const res = await octokit.request('GET /repos/{owner}/{repo}/contents/{path}', CONFIG);
                const cloudJson = JSON.parse(atob(res.data.content));
                
                // 合并逻辑 (按 timestamp 去重)
                const localData = JSON.parse(localStorage.getItem('lyrics_local') || '[]');
                const combined = [...cloudJson, ...localData];
                const unique = Array.from(new Map(combined.map(item => [item.id, item])).values());
                
                lyricsData = unique.sort((a, b) => b.timestamp - a.timestamp);
                localStorage.setItem('lyrics_local', JSON.stringify(lyricsData));
            } catch (e) {
                console.warn("Cloud sync failed, using local data.");
            }
        }

        async function pushToCloud() {
            if (!CONFIG.token) return;
            const octokit = new Octokit({ auth: CONFIG.token });
            
            // 需要先获取当前的 SHA 才能更新
            const getRes = await octokit.request('GET /repos/{owner}/{repo}/contents/{path}', CONFIG);
            const sha = getRes.data.sha;

            await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
                ...CONFIG,
                message: 'Update lyrics data',
                content: btoa(unescape(encodeURIComponent(JSON.stringify(lyricsData)))),
                sha: sha
            });
        }

        // --- Gemini AI 预处理模块 ---
        async function fetchGeminiAnalysis(lyricsText, songId) {
            document.getElementById('ai-progress-inner').style.width = '30%';
            
            // 构造 Prompt
            const prompt = `请分析以下日语歌词，返回一个JSON数组，格式为 [{"t": "中文翻译", "e": "核心语法点"}]，行数必须与原歌词一致：\n${lyricsText}`;

            // 调用 Gemini API (此处需替换为你的 API Endpoint 和 Key)
            // 建议：GitHub Actions 或 后端转发以保护 Key，此处演示直接请求
            const res = await fetch('YOUR_GEMINI_API_URL', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const analysis = await res.json(); 

            // 保存到云端对应的解析文件 (例如 analysis_{id}.json)
            // ... Octokit PUT 逻辑 ...

            document.getElementById('ai-progress-inner').style.width = '100%';
            setTimeout(() => document.getElementById('ai-progress-inner').style.width = '0', 1000);
            return analysis;
        }

        // --- 分词与渲染 ---
        window.renderLyricsDetail = async function(id) {
            const song = lyricsData.find(s => s.id === id);
            const container = document.getElementById('lyrics-display');
            container.innerHTML = '';

            const lines = song.content.split('\n');
            lines.forEach((line, index) => {
                const lineEl = document.createElement('div');
                lineEl.className = 'mb-4 flex items-start';

                const tokens = tokenizer.tokenize(line);
                const tokenContainer = document.createElement('div');
                tokenContainer.className = 'flex-1';

                tokens.forEach(token => {
                    const span = document.createElement('span');
                    span.className = `token-block ${getPosClass(token.pos)}`;
                    span.innerText = token.surface_form;
                    span.onclick = () => lookupWord(token.surface_form);
                    tokenContainer.appendChild(span);
                });

                // 讲解按钮
                const btn = document.createElement('button');
                btn.className = 'ml-4 text-xs bg-white/50 px-2 py-1 rounded shadow-sm';
                btn.innerText = '解説';
                btn.onclick = () => showAIExplanation(song.id, index);

                lineEl.appendChild(tokenContainer);
                lineEl.appendChild(btn);
                container.appendChild(lineEl);
            });

            switchView('detail');
        };

        function getPosClass(pos) {
            if (pos === '動詞') return 'pos-verb';
            if (pos === '助詞') return 'pos-particle';
            if (pos === '名詞') return 'pos-noun';
            return '';
        }

        function lookupWord(word) {
            const sense = dictData[word] || "本地词库暂未收录该词释义。";
            document.getElementById('side-content').innerHTML = `
                <div class="text-lg font-bold text-pink-500">${word}</div>
                <p class="mt-2">${sense}</p>
            `;
        }

        // --- 路由与交互 ---
        window.switchView = function(view) {
            document.getElementById('view-shelf').classList.toggle('hidden', view !== 'shelf');
            document.getElementById('view-detail').classList.toggle('hidden', view !== 'detail');
        };

        // 初始化启动
        window.onload = init;
    </script>
</body>
</html>
