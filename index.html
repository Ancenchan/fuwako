<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Lyrics ふわり Hub | 可爱的日语歌词学习</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Varela+Round&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fw-bg': '#fefaf6', 'fw-pink': '#ffb3c6', 'fw-cream': '#fff3e0', 
                        'fw-mint': '#b2dfdb', 'fw-lavender': '#e1bee7', 'fw-text': '#5d4037', 
                    },
                    fontFamily: { 'maru': ['"Kosugi Maru"', 'sans-serif'], 'round': ['"Varela Round"', 'sans-serif'] },
                    borderRadius: { 'fw': '1.5rem' },
                    boxShadow: { 'fw': '0 10px 25px -5px rgba(255, 179, 198, 0.2)', 'fw-sm': '0 4px 6px -1px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    
    <style>
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #ff80ab; user-select: none; padding-top: 1px; font-family: 'Varela Round', sans-serif; }
        .word-item { position: relative; cursor: pointer; transition: all 0.2s ease; padding: 2px 4px; border-radius: 8px; }
        .word-item:hover { background-color: #fff3e0; transform: translateY(-1px); }
        .pos-noun { border-bottom: 3px solid #b2dfdb; }
        .pos-verb { border-bottom: 3px solid #ffb3c6; }
        .pos-particle { border-bottom: 3px solid #e0e0e0; }
        .lyric-line { line-height: 4.2rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        .loader { border: 4px solid #fff; border-radius: 50%; border-top: 4px solid #ffb3c6; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-fw-bg min-h-screen text-fw-text font-maru">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <div class="loader mb-5"></div>
        <p class="text-xl font-bold tracking-wider text-fw-pink">ふわり 系统启动中...</p>
        <p class="text-xs text-slate-400 mt-2 text-center">正在读取本地词典 (./dict)...</p>
    </div>

    <nav class="bg-white/60 backdrop-blur-sm sticky top-0 z-10 border-b border-fw-cream/50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🌸</span>
                <h1 class="text-3xl font-black text-fw-pink tracking-tighter font-round">ふわり <span class="text-slate-400 font-light">Hub</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="clearWords()" class="px-5 py-2.5 bg-fw-cream text-fw-text rounded-full text-sm font-bold hover:shadow-fw-sm transition">☁️ 清空生词</button>
                <button onclick="toggleSettings()" class="px-5 py-2.5 bg-fw-pink text-white rounded-full text-sm font-bold hover:shadow-fw transition">⚙️ 仓库配置</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-10 flex flex-col lg:flex-row gap-10">
        <div class="flex-1 space-y-8">
            <div class="bg-white p-8 rounded-fw shadow-fw border border-fw-cream/30">
                <div class="flex items-center gap-3 mb-6">
                    <span class="text-2xl">📝</span>
                    <h2 class="text-2xl font-bold tracking-tight">粘贴你的日语歌词</h2>
                </div>
                <textarea id="inputArea" class="w-full h-40 p-5 bg-fw-bg border-none rounded-2xl focus:ring-4 focus:ring-fw-cream/50 outline-none text-lg resize-none" placeholder="ここにご入力ください..."></textarea>
                <button onclick="handleParse()" id="btnParse" class="w-full mt-6 bg-fw-pink text-white py-4 rounded-full text-xl font-black hover:scale-[1.02] transition-all disabled:opacity-50 flex items-center justify-center gap-2 shadow-lg shadow-fw/50">
                    ✨ 智能解析
                </button>
            </div>

            <div id="resultCard" class="bg-white p-10 rounded-fw shadow-fw border border-fw-cream/30 hidden">
                <div class="flex items-center justify-between mb-8 border-b pb-6 border-dashed border-fw-cream text-xs">
                    <h2 class="text-2xl font-bold">学习画布</h2>
                    <div class="flex gap-2">
                        <span class="bg-fw-mint/30 px-3 py-1 rounded-full text-fw-text/80">薄荷绿=名词</span>
                        <span class="bg-fw-pink/30 px-3 py-1 rounded-full text-fw-text/80">粉色=动词/形</span>
                    </div>
                </div>
                <div id="output" class="lyric-line text-3xl tracking-widest leading-relaxed"></div>
            </div>
        </div>

        <aside class="w-full lg:w-[360px]">
            <div class="bg-white p-8 rounded-fw shadow-fw border border-fw-cream/30 sticky top-28 transition-all">
                <div class="flex items-center gap-3 mb-8">
                    <span class="text-2xl">💡</span>
                    <h3 class="text-xl font-bold uppercase tracking-widest text-slate-400 font-round">Detail Card</h3>
                </div>
                <div id="wordInfo" class="space-y-6 text-center py-10">
                    <span class="text-6xl">🍡</span>
                    <p class="text-slate-400 italic">点击歌词单词<br>开启魔法拆解</p>
                </div>
            </div>
        </aside>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-fw-text/30 backdrop-blur-sm z-50 hidden flex items-center justify-center animate-fade-in">
        <div class="bg-fw-bg p-10 rounded-fw max-w-md w-full shadow-2xl border-4 border-fw-pink">
            <h3 class="text-2xl font-bold mb-6 text-fw-pink">GitHub 同步配置 ☁️</h3>
            <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full p-4 bg-white rounded-full mb-4 outline-none border border-fw-cream">
            <input type="text" id="ghRepo" placeholder="用户名/仓库名" class="w-full p-4 bg-white rounded-full mb-8 outline-none border border-fw-cream">
            <div class="flex gap-3">
                <button onclick="saveSettings()" class="flex-1 bg-fw-pink text-white py-3 rounded-full font-bold">保存配置</button>
                <button onclick="toggleSettings()" class="flex-1 bg-white py-3 rounded-full border border-fw-cream">关闭</button>
            </div>
        </div>
    </div>

    <script>
        let kuroshiro, analyzer;

        // 【针对诊断结果的定向修复】
        function getKUtils() {
            // 诊断发现 util 在 Kuroshiro.default 下
            const KBase = window.Kuroshiro;
            if (!KBase) return null;

            // 路径1: Kuroshiro.default.util (最符合你的诊断情况)
            if (KBase.default && KBase.default.util) return KBase.default.util;
            
            // 路径2: Kuroshiro.util
            if (KBase.util) return KBase.util;
            
            return null;
        }

        async function initSystem() {
            const status = document.querySelector('#loadingOverlay p');
            try {
                // 同样根据诊断，优先使用 .default
                const KClass = window.Kuroshiro?.default || window.Kuroshiro;
                const AClass = window.KuromojiAnalyzer?.default || window.KuromojiAnalyzer;

                if (!KClass || !AClass) throw new Error("库文件加载不完整");

                kuroshiro = new KClass();
                analyzer = new AClass({ dictPath: "./dict" });

                await kuroshiro.init(analyzer);
                document.getElementById('loadingOverlay').classList.add('hidden');
                console.log("✅ [Fuwari] 就绪");
            } catch (err) {
                console.error("❌ 初始化失败:", err);
                status.innerHTML = `<span class="text-red-500 text-sm">初始化失败: ${err.message}</span>`;
            }
        }

        window.addEventListener('DOMContentLoaded', initSystem);

        async function handleParse() {
            const text = document.getElementById('inputArea').value;
            const btn = document.getElementById('btnParse');
            if (!text.trim()) return;

            try {
                btn.disabled = true;
                btn.innerHTML = '<span>⚡️ 解析中...</span>';
                const tokens = await analyzer.parse(text);
                renderEnhancedLyrics(tokens);
                document.getElementById('resultCard').classList.remove('hidden');
            } catch (e) {
                console.error("解析出错:", e);
                alert("解析出错");
            } finally {
                btn.disabled = false;
                btn.innerText = "✨ 智能解析";
            }
        }

        function renderEnhancedLyrics(tokens) {
            const container = document.getElementById('output');
            container.innerHTML = "";
            const KUtils = getKUtils();

            tokens.forEach(token => {
                const span = document.createElement('span');
                span.className = `word-item font-round ${getPosClass(token.pos)} animate-fade-in`;
                
                // 只有汉字词且能找到工具类时才显示 ruby
                if (KUtils && token.surface_form !== token.reading && token.reading !== '*') {
                    try {
                        const hira = KUtils.kanaToHiragana(token.reading);
                        span.innerHTML = `<ruby>${token.surface_form}<rt>${hira}</rt></ruby>`;
                    } catch(e) {
                        span.innerText = token.surface_form;
                    }
                } else {
                    span.innerText = token.surface_form;
                }

                span.onclick = () => showWordDetail(token);
                container.appendChild(span);
                if (token.surface_form.includes('\n')) container.appendChild(document.createElement('br'));
            });
        }

        function getPosClass(pos) {
            const mapping = { '名詞': 'pos-noun', '動詞': 'pos-verb', '助詞': 'pos-particle', '形容詞': 'pos-verb' };
            return mapping[pos] || '';
        }

        function showWordDetail(token) {
            const info = document.getElementById('wordInfo');
            const KUtils = getKUtils();
            let reading = '-';
            if (KUtils && token.reading && token.reading !== '*') {
                try { reading = KUtils.kanaToHiragana(token.reading); } catch(e) {}
            }
            
            info.innerHTML = `
                <div class="p-6 bg-fw-bg rounded-fw animate-fade-in text-left border-2 border-fw-cream">
                    <div class="text-4xl font-black text-fw-text tracking-tighter text-center">${token.surface_form}</div>
                    <div class="text-base text-fw-pink font-bold mt-1 text-center">【${reading}】</div>
                    <div class="mt-8 space-y-2 text-sm bg-white p-4 rounded-xl shadow-inner">
                        <div class="flex justify-between pb-1 border-b border-dashed border-fw-cream">
                            <span>词性</span><span class="font-bold text-fw-mint">${token.pos}</span>
                        </div>
                        <div class="flex justify-between">
                            <span>基本形</span><span class="font-bold text-fw-pink">${token.basic_form}</span>
                        </div>
                    </div>
                    <button onclick="saveToGitHub('${token.surface_form}', '${reading}')" class="w-full mt-6 py-3.5 bg-fw-lavender text-fw-text rounded-full font-black shadow-fw hover:bg-fw-mint hover:text-white transition-all">✨ 收藏生词</button>
                </div>`;
        }

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }
        function saveSettings() {
            localStorage.setItem('gh_token', document.getElementById('ghToken').value);
            localStorage.setItem('gh_repo', document.getElementById('ghRepo').value);
            toggleSettings();
            alert("配置已保存🌸");
        }

        async function saveToGitHub(word, reading) {
            if (!localStorage.getItem('gh_token')) { alert("请先设置 GitHub 配置！"); toggleSettings(); return; }
            alert(`🌸 已收藏: "${word}"！`);
        }

        function clearWords() {
            if(confirm("确定清空吗？")) {
                document.getElementById('wordInfo').innerHTML = '<div class="py-10 text-slate-400 italic">已清空</div>';
            }
        }
    </script>
</body>
</html>
