<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako | 魔法日语咏唱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+SC:wght@400;700&display=swap');

        :root {
            --f-bg: #fffcfd; 
            --f-accent: #ffb1c1; 
            --f-accent-soft: #ffe4e9;
            --f-glass: rgba(255, 255, 255, 0.75); 
            --f-text-main: #5a5a5a; 
            --f-shadow: rgba(255, 177, 193, 0.12);
        }

        body {
            background-color: var(--f-bg);
            background-image: url('https://www.transparenttextures.com/patterns/sakura.png');
            background-attachment: fixed;
            color: var(--f-text-main);
            font-family: 'Kosugi Maru', 'Noto Sans SC', sans-serif;
            margin: 0;
            cursor: url('https://cur.cursors-4u.net/anime/ani-12/ani1159.cur'), auto !important;
        }

        /* 精致毛玻璃 */
        .glass {
            background: var(--f-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            box-shadow: 0 4px 15px var(--f-shadow);
        }

        /* 选项卡内容显隐 */
        .tab-content { display: none; }
        .tab-content.active { 
            display: block; 
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 词块着色 */
        .token-verb { color: #ff8fa3; font-weight: bold; border-bottom: 2px dashed #ffdae0; }
        .token-particle { color: #89cff0; }
        .token-noun { color: #a29bfe; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--f-accent-soft); border-radius: 10px; }

        .bubbly-btn {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .bubbly-btn:active { transform: scale(0.95); }

        .nav-btn {
            padding: 6px 20px;
            font-size: 0.9rem;
            border-radius: 14px;
            transition: 0.3s;
        }
        .nav-btn.active-grammar { background: #ffb1c1; color: white; box-shadow: 0 4px 10px rgba(255, 177, 193, 0.4); }
        .nav-btn.active-lyrics { background: #a3d8f4; color: white; box-shadow: 0 4px 10px rgba(163, 216, 244, 0.4); }

        .star-decor { position: fixed; pointer-events: none; opacity: 0.4; z-index: -1; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="loading-mask" class="fixed inset-0 z-[100] bg-[#fffcfd] flex flex-col items-center justify-center">
        <div class="text-3xl mb-4 animate-bounce">⸜(๑'ᵕ'๑)⸝</div>
        <div class="text-base font-bold mb-4 text-pink-400">正在构建魔法世界...</div>
        <div class="w-48 h-2 bg-pink-50 rounded-full overflow-hidden border border-pink-100">
            <div id="init-progress" class="h-full bg-pink-300 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-6">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🌸</span>
            <h1 class="text-xl font-black tracking-tight text-gray-700">Fuwako</h1>
        </div>
        <button onclick="toggleSettings()" class="glass p-1 bubbly-btn">
            <img src="7.png" alt="Settings" class="w-8 h-8 rounded-full border border-white">
        </button>
    </header>

    <main class="max-w-4xl mx-auto">
        <nav class="flex space-x-2 mb-6">
            <button id="btn-grammar" onclick="switchTab('grammar')" class="nav-btn glass font-bold text-pink-400">语法秘籍</button>
            <button id="btn-lyrics" onclick="switchTab('lyrics')" class="nav-btn glass font-bold text-blue-400 active-lyrics">歌词咏唱</button>
        </nav>

        <section id="grammar" class="tab-content glass p-6 min-h-[50vh]">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="grammar-list">
                <p class="col-span-full text-center italic opacity-50 py-10 text-sm">正在翻找语法书...</p>
            </div>
        </section>

        <section id="lyrics" class="tab-content active glass p-6 min-h-[50vh]">
            <div id="lyrics-list-view">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-lg font-black">歌词库</h2>
                    <button onclick="showUploadModal()" class="bg-pink-400 text-white px-5 py-1.5 rounded-full text-sm font-bold bubbly-btn shadow-md shadow-pink-100">
                        + 记录新咏唱
                    </button>
                </div>
                <div id="lyrics-container" class="grid gap-3"></div>
            </div>

            <div id="lyrics-detail-view" class="hidden">
                <div class="flex justify-between items-center mb-5">
                    <button onclick="backToList()" class="glass px-3 py-1.5 text-xs bubbly-btn">🔙 返回列表</button>
                    <button id="ai-analyze-btn" onclick="analyzeWithAI()" class="bg-purple-400 text-white px-5 py-1.5 rounded-full text-sm font-bold bubbly-btn">
                        ✨ AI 深度解析
                    </button>
                </div>
                <div id="ai-progress-container" class="w-full bg-pink-50 rounded-full h-1.5 mb-5 hidden overflow-hidden">
                    <div id="ai-progress-bar" class="bg-purple-300 h-full" style="width: 0%"></div>
                </div>
                <div class="flex flex-col md:flex-row gap-6">
                    <div id="lyrics-render-area" class="flex-1 space-y-2 text-base leading-relaxed"></div>
                    <aside class="w-full md:w-64">
                        <div class="glass p-5 sticky top-4 bg-white/40">
                            <h3 class="font-black text-sm mb-3 flex items-center text-pink-500">
                                <span class="mr-2">📖</span> 释义详情
                            </h3>
                            <div id="aside-content" class="text-xs leading-loose text-gray-500">
                                点击词块或 AI 解析开启知识大门...
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-pink-50/40 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[60]">
        <div class="glass p-8 w-full max-w-sm shadow-xl">
            <h2 class="text-lg font-black mb-4">魔导同步配置</h2>
            <div class="space-y-3">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">GitHub Token</label>
                <input type="password" id="gh-token" placeholder="Token..." class="w-full p-3 rounded-xl bg-white/60 border border-pink-100 outline-none focus:border-pink-300 text-sm">
                <div class="flex justify-end space-x-2 pt-4">
                    <button onclick="toggleModal('settings-modal')" class="text-xs px-4">关闭</button>
                    <button onclick="saveSettings()" class="bg-blue-400 text-white px-6 py-2 rounded-xl text-sm font-bold bubbly-btn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="lyrics-modal" class="fixed inset-0 bg-blue-50/40 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[60]">
        <div class="glass p-8 w-full max-w-lg shadow-xl">
            <h2 class="text-lg font-black mb-4 flex items-center">📝 记录咏唱</h2>
            <div class="space-y-3">
                <input type="text" id="new-lyrics-title" placeholder="歌曲标题" class="w-full p-3 rounded-xl bg-white/60 border border-blue-100 outline-none focus:border-blue-300 text-sm">
                <textarea id="new-lyrics-content" rows="8" placeholder="粘贴日语歌词..." class="w-full p-3 rounded-xl bg-white/60 border border-blue-100 outline-none focus:border-blue-300 text-sm"></textarea>
                <div class="flex justify-end space-x-2 pt-2">
                    <button onclick="toggleModal('lyrics-modal')" class="text-xs px-4">取消</button>
                    <button onclick="saveNewLyrics()" class="bg-pink-400 text-white px-8 py-2 rounded-xl text-sm font-bold bubbly-btn">同步云端</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tokenizer = null;
        let lyricsData = JSON.parse(localStorage.getItem('fuwako_local_lyrics')) || [];
        let currentLyrics = null;
        let currentAnalysisResult = [];

        window.onload = () => {
            initKuromoji();
            renderLyricsList();
            fetchGrammar();
        };

        function initKuromoji() {
            const prog = document.getElementById('init-progress');
            kuromoji.builder({ dicPath: "dict/" }).build((err, _tokenizer) => {
                if (err) {
                    document.getElementById('loading-text').innerText = "词典初始化失败";
                    return;
                }
                tokenizer = _tokenizer;
                prog.style.width = "100%";
                setTimeout(() => {
                    const mask = document.getElementById('loading-mask');
                    mask.style.opacity = '0';
                    setTimeout(() => mask.style.display = 'none', 500);
                }, 600);
            });
        }

        // 修复切换逻辑
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // 按钮样式反馈
            const gBtn = document.getElementById('btn-grammar');
            const lBtn = document.getElementById('btn-lyrics');
            
            if(tabId === 'grammar') {
                gBtn.classList.add('active-grammar');
                lBtn.classList.remove('active-lyrics');
            } else {
                lBtn.classList.add('active-lyrics');
                gBtn.classList.remove('active-grammar');
            }
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function toggleSettings() {
            document.getElementById('gh-token').value = localStorage.getItem('fuwako_gh_token') || '';
            toggleModal('settings-modal');
        }

        function saveSettings() {
            localStorage.setItem('fuwako_gh_token', document.getElementById('gh-token').value);
            toggleModal('settings-modal');
            alert("配置已保存 ⭐");
        }

        function showUploadModal() { toggleModal('lyrics-modal'); }

        async function saveNewLyrics() {
            const title = document.getElementById('new-lyrics-title').value;
            const content = document.getElementById('new-lyrics-content').value;
            if (!title || !content) return alert("内容不能为空哦！");

            const entry = {
                id: Date.now(),
                title: title,
                text: content.split('\n').filter(l => l.trim() !== ''),
                timestamp: Date.now()
            };

            lyricsData.unshift(entry);
            localStorage.setItem('fuwako_local_lyrics', JSON.stringify(lyricsData));
            renderLyricsList();
            toggleModal('lyrics-modal');
            await pushToGitHub(lyricsData);
        }

        function renderLyricsList() {
            const container = document.getElementById('lyrics-container');
            container.innerHTML = lyricsData.length ? '' : '<p class="text-center opacity-40 py-10 text-xs">这里还没有咏唱记录...</p>';
            
            lyricsData.forEach(item => {
                const card = document.createElement('div');
                card.className = "glass p-4 cursor-pointer hover:bg-white/80 transition-all flex justify-between items-center group";
                card.onclick = () => openLyricsDetail(item);
                card.innerHTML = `
                    <div>
                        <div class="font-bold text-sm group-hover:text-pink-400 transition-colors">${item.title}</div>
                        <div class="text-[10px] text-gray-300 mt-1">${new Date(item.timestamp).toLocaleDateString()}</div>
                    </div>
                    <span class="text-lg opacity-30 group-hover:opacity-100 transition-opacity">🎶</span>
                `;
                container.appendChild(card);
            });
        }

        function openLyricsDetail(item) {
            currentLyrics = item;
            currentAnalysisResult = []; // 切换歌曲时清空之前的解析
            document.getElementById('lyrics-list-view').classList.add('hidden');
            document.getElementById('lyrics-detail-view').classList.remove('hidden');
            document.getElementById('aside-content').innerText = "点击词块开启知识大门...";
            renderLyricsTokens(item.text);
        }

        function backToList() {
            document.getElementById('lyrics-list-view').classList.remove('hidden');
            document.getElementById('lyrics-detail-view').classList.add('hidden');
        }

        function renderLyricsTokens(lines) {
            const area = document.getElementById('lyrics-render-area');
            area.innerHTML = '';
            let jpLineCounter = 0;

            lines.forEach(line => {
                const row = document.createElement('div');
                row.className = "flex flex-wrap items-center gap-x-1 py-1.5 border-b border-pink-50 group";
                
                if (/[ぁ-んァ-ヶ]/.test(line) && tokenizer) {
                    tokenizer.tokenize(line).forEach(t => {
                        const s = document.createElement('span');
                        s.innerText = t.surface_form;
                        s.className = `cursor-pointer hover:bg-pink-100/50 px-0.5 rounded transition-colors ${getPosClass(t.pos)}`;
                        s.onclick = () => lookup(t.surface_form);
                        row.appendChild(s);
                    });

                    if (currentAnalysisResult.length > 0) {
                        const idx = jpLineCounter;
                        const infoBtn = document.createElement('button');
                        infoBtn.innerText = "译";
                        infoBtn.className = "ml-auto text-[9px] bg-purple-100 text-purple-500 px-1.5 py-0.5 rounded-md opacity-0 group-hover:opacity-100 transition-opacity";
                        infoBtn.onclick = (e) => { e.stopPropagation(); showSingleLineDetail(idx, line); };
                        row.appendChild(infoBtn);
                    }
                    jpLineCounter++;
                } else {
                    row.innerText = line;
                    row.className += " text-xs text-gray-400 italic font-sans";
                }
                area.appendChild(row);
            });
        }

        function getPosClass(pos) {
            if (pos === "助詞") return "token-particle";
            if (pos === "動詞") return "token-verb";
            if (pos === "名詞") return "token-noun";
            return "";
        }

        function lookup(word) {
            const aside = document.getElementById('aside-content');
            aside.innerHTML = `
                <div class="animate-fadeIn">
                    <div class="text-lg font-black text-pink-400 mb-1">${word}</div>
                    <div class="p-2 bg-white/60 rounded-lg border border-pink-50 text-[11px]">
                        正在检索魔法字典...<br>(请确保根目录存在 dict.json)
                    </div>
                </div>`;
        }

        async function analyzeWithAI() {
            let apiKey = localStorage.getItem('fuwako_or_key');
            if (!apiKey) {
                const key = prompt("✨ 魔法中转站：请输入 OpenRouter API Key：");
                if (key) { localStorage.setItem('fuwako_or_key', key); apiKey = key; } else return;
            }
            if (!currentLyrics) return;

            const btn = document.getElementById('ai-analyze-btn');
            const prog = document.getElementById('ai-progress-container');
            const bar = document.getElementById('ai-progress-bar');
            
            btn.disabled = true; btn.innerText = "咏唱中...";
            prog.classList.remove('hidden'); bar.style.width = "30%";

            const jpLines = currentLyrics.text.filter(line => /[ぁ-んァ-ヶ]/.test(line));
            const promptText = `请解析以下日语歌词，严格返回 JSON 数组 [{"t": "翻译", "e": "语法解析"}]：\n${jpLines.join('\n')}`;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "z-ai/glm-4.5-air:free",
                        messages: [{ role: "system", content: "你是一个只输出 JSON 数组的日语助手。" }, { role: "user", content: promptText }],
                        temperature: 0.1 
                    })
                });
                const result = await response.json();
                let cleanText = result.choices[0].message.content.replace(/```json|```/g, '').trim();
                currentAnalysisResult = JSON.parse(cleanText);
                bar.style.width = "100%";
                btn.innerText = "✨ 解析完成";
                renderLyricsTokens(currentLyrics.text);
            } catch (error) {
                alert("AI 魔法失效，请检查 Key 或网络");
            } finally {
                btn.disabled = false;
                setTimeout(() => prog.classList.add('hidden'), 2000);
            }
        }

        function showSingleLineDetail(index, original) {
            const aside = document.getElementById('aside-content');
            const data = currentAnalysisResult[index];
            if (!data) return;
            aside.innerHTML = `
                <div class="animate-fadeIn">
                    <div class="text-[10px] text-gray-400 mb-1">原文：${original}</div>
                    <div class="text-xs font-bold text-pink-500 mb-2">译：${data.t}</div>
                    <div class="p-2 bg-purple-50/50 rounded-lg text-[10px] text-gray-600 leading-relaxed">
                        <span class="font-bold text-purple-400">解析：</span><br>${data.e}
                    </div>
                </div>`;
        }

        async function fetchGrammar() {
            const list = document.getElementById('grammar-list');
            try {
                const res = await fetch('grammar.json');
                const data = await res.json();
                list.innerHTML = '';
                data.forEach(g => {
                    const item = document.createElement('div');
                    item.className = "p-4 glass hover:bg-white/80 transition-all";
                    item.innerHTML = `
                        <h4 class="font-black text-pink-400 text-sm">${g.t}</h4>
                        <p class="text-[11px] mt-1 text-gray-500">${g.c}</p>
                        <div class="mt-2 p-2 bg-pink-50/30 rounded-lg text-[10px] italic text-gray-400 border-l-2 border-pink-200">${g.l}</div>
                    `;
                    list.appendChild(item);
                });
            } catch(e) {
                list.innerHTML = '<p class="col-span-full text-center py-10 text-xs opacity-30">尚未发现 grammar.json</p>';
            }
        }

        async function pushToGitHub(updatedData) {
            const token = localStorage.getItem('fuwako_gh_token');
            if (!token) return;
            const url = `https://api.github.com/repos/Ancenchan/fuwako/contents/lyrics_data.json`;
            try {
                const fileRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                let sha = "";
                if (fileRes.ok) { const d = await fileRes.json(); sha = d.sha; }
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Magic sync",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedData, null, 2)))),
                        sha: sha
                    })
                });
            } catch (err) { console.error("Sync Error", err); }
        }
    </script>
</body>
</html>
