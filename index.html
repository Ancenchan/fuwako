<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 日本語学習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');

        :root {
            --fuwari-pink: #ffe4e9;
            --fuwari-purple: #f3e5f5;
            --fuwari-accent: #ff85a2;
            --fuwari-bg: #fff9fb;
        }

        body {
            font-family: "Helvetica Neue", "Helvetica", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            background: linear-gradient(135deg, var(--fuwari-pink) 0%, var(--fuwari-purple) 100%);
            min-height: 100vh;
            color: #4a4a4a;
        }

        /* 毛玻璃质感 */
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        /* 动画 */
        .hover-scale { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hover-scale:hover { transform: scale(1.03); }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--fuwari-accent); border-radius: 10px; }

        /* 分词颜色 */
        .pos-noun { color: #5c7cfa; font-weight: 500; } /* 名词-蓝 */
        .pos-verb { color: #f06595; font-weight: 500; } /* 动词-粉 */
        .pos-particle { color: #845ef7; } /* 助词-紫 */
        .pos-adj { color: #fcc419; } /* 形容词-黄 */

        /* 加载遮罩 */
        #loading-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fuwari-bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading-mask">
        <div class="text-3xl mb-4">🌸</div>
        <div id="loading-text" class="text-sm text-pink-400 font-light italic">Initializing Dictionary... 0%</div>
        <div class="w-48 h-1 bg-pink-100 rounded-full mt-4 overflow-hidden">
            <div id="loading-bar" class="h-full bg-pink-400 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <header class="fixed top-6 left-0 right-0 z-50 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center glass p-4 shadow-sm">
            <div class="flex items-center space-x-4">
                <span class="text-xl font-bold tracking-tighter text-pink-500">Fuwako</span>
                <nav class="flex space-x-1">
                    <button onclick="switchTab('grammar')" class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-pink-400 text-white" id="tab-grammar">语法</button>
                    <button onclick="switchTab('lyrics')" class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all hover:bg-pink-100" id="tab-lyrics">歌词解析</button>
                </nav>
            </div>
            <button onclick="toggleConfig()" class="hover-scale">
                <img src="7.png" alt="Settings" class="w-8 h-8 rounded-full border-2 border-white shadow-sm" onerror="this.src='https://api.iconify.design/fluent-emoji-flat:cherry-blossom.svg'">
            </button>
        </div>
    </header>

    <main class="pt-32 pb-12 px-6 max-w-4xl mx-auto">
        <section id="view-grammar" class="view-section">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="grammar-list">
                </div>
        </section>

        <section id="view-lyrics" class="view-section hidden">
            <div class="glass p-6 mb-6">
                <h3 class="text-sm font-bold mb-4 opacity-60">新增歌词</h3>
                <input id="new-lyric-title" type="text" placeholder="歌曲标题..." class="w-full mb-3 p-3 rounded-xl bg-white/50 border-none outline-none focus:ring-2 ring-pink-300 text-sm">
                <textarea id="new-lyric-text" rows="4" placeholder="粘贴歌词内容（支持日语、罗马音混合）..." class="w-full p-3 rounded-xl bg-white/50 border-none outline-none focus:ring-2 ring-pink-300 text-sm"></textarea>
                <button onclick="addLyrics()" class="mt-3 w-full py-2 bg-pink-400 text-white rounded-xl text-xs font-bold hover:bg-pink-500 transition-colors">确认存入云端</button>
            </div>
            <div id="lyrics-container" class="space-y-4">
                </div>
        </section>

        <section id="view-detail" class="view-section hidden">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1 glass p-6 overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="switchTab('lyrics')" class="text-xs text-pink-400">← 返回列表</button>
                        <div class="flex items-center space-x-2">
                            <div id="ai-progress-container" class="hidden w-24 h-1 bg-pink-100 rounded-full overflow-hidden">
                                <div id="ai-progress-bar" class="h-full bg-pink-400" style="width: 0%"></div>
                            </div>
                            <button onclick="triggerAIAnalysis()" class="px-3 py-1 bg-pink-500 text-white rounded-full text-[10px] font-bold">AI 语法解析</button>
                        </div>
                    </div>
                    <h2 id="detail-title" class="text-xl font-bold mb-6">歌曲详情</h2>
                    <div id="detail-content" class="space-y-4 text-sm leading-relaxed">
                        </div>
                </div>
                <aside class="w-full md:w-64 space-y-4">
                    <div class="glass p-5 sticky top-32">
                        <h4 class="text-[10px] uppercase tracking-widest font-bold text-pink-400 mb-3">词汇释义</h4>
                        <div id="dict-result" class="text-sm italic text-gray-500">点击左侧词块查看释义...</div>
                        <hr class="my-4 border-pink-50">
                        <h4 class="text-[10px] uppercase tracking-widest font-bold text-pink-400 mb-3">AI 语法点</h4>
                        <div id="ai-result" class="text-xs leading-5">点击行号旁的“解析”按钮获取...</div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <div id="config-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-pink-100/20 backdrop-blur-sm" onclick="toggleConfig()"></div>
        <div class="glass p-8 w-80 relative shadow-xl">
            <h3 class="font-bold mb-4 text-center">GitHub 配置</h3>
            <div class="space-y-4 text-xs">
                <div>
                    <label class="block mb-1 opacity-60">Personal Token</label>
                    <input id="cfg-token" type="password" class="w-full p-2 rounded-lg bg-white outline-none">
                </div>
                <div>
                    <label class="block mb-1 opacity-60">Repo (username/repo)</label>
                    <input id="cfg-repo" type="text" placeholder="Ancen/my-lyrics" class="w-full p-2 rounded-lg bg-white outline-none">
                </div>
                <button onclick="saveConfig()" class="w-full py-2 bg-pink-400 text-white rounded-lg font-bold">保存设置</button>
                <div id="conn-status" class="text-center text-[10px] text-green-500 hidden">● 已连接到 GitHub</div>
            </div>
        </div>
    </div>

    <div id="ai-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-pink-100/20 backdrop-blur-sm"></div>
        <div class="glass p-8 w-80 relative shadow-xl">
            <h3 class="font-bold mb-4 text-center">需要 AI 接口权限</h3>
            <p class="text-[10px] text-center mb-4 text-gray-400">请输入 OpenRouter/SiliconFlow API Key</p>
            <input id="cfg-ai-key" type="password" class="w-full p-2 rounded-lg bg-white outline-none mb-4 text-xs">
            <button onclick="startAI()" class="w-full py-2 bg-pink-500 text-white rounded-lg font-bold text-xs">开始解析</button>
        </div>
    </div>

    <script>
        // --- 全局变量 ---
        let tokenizer = null;
        let grammarData = [];
        let lyricsData = [];
        let dictionary = {};
        let currentLyricId = null;

        // --- 初始化 ---
        async function init() {
            // 1. 加载 Kuromoji
            kuromoji.builder({ dicPath: "dict" }).build((err, _tokenizer) => {
                if (err) { console.error(err); return; }
                tokenizer = _tokenizer;
                updateLoading(100, "Ready!");
                setTimeout(() => document.getElementById('loading-mask').style.display = 'none', 800);
            });

            // 进度条模拟 (实际加载更复杂，这里做演示)
            let progress = 0;
            const timer = setInterval(() => {
                if (progress >= 95) clearInterval(timer);
                progress += 5;
                updateLoading(progress, `Loading Dictionary... ${progress}%`);
            }, 100);

            // 2. 加载数据
            loadLocalConfig();
            fetchGrammar();
            syncLyrics();
            fetchDict();
        }

        function updateLoading(p, text) {
            document.getElementById('loading-bar').style.width = p + '%';
            document.getElementById('loading-text').innerText = text;
        }

        // --- 路由与视图切换 ---
        function switchTab(tab) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-pink-400', 'text-white'));
            
            if (tab === 'grammar') {
                document.getElementById('view-grammar').classList.remove('hidden');
                document.getElementById('tab-grammar').classList.add('bg-pink-400', 'text-white');
            } else if (tab === 'lyrics') {
                document.getElementById('view-lyrics').classList.remove('hidden');
                document.getElementById('tab-lyrics').classList.add('bg-pink-400', 'text-white');
                renderLyricsList();
            } else if (tab === 'detail') {
                document.getElementById('view-detail').classList.remove('hidden');
            }
        }

        // --- 语法模块 ---
        async function fetchGrammar() {
            try {
                const res = await fetch('grammar.json');
                grammarData = await res.json();
                renderGrammar();
            } catch (e) { console.warn("Grammar.json not found"); }
        }

        function renderGrammar() {
            const container = document.getElementById('grammar-list');
            container.innerHTML = grammarData.map(g => `
                <div class="glass p-5 hover-scale">
                    <div class="text-pink-500 font-bold mb-1">${g.title}</div>
                    <div class="text-[10px] opacity-60 mb-2">${g.tag || 'N3'}</div>
                    <div class="text-xs text-gray-600">${g.description}</div>
                </div>
            `).join('');
        }

        // --- 歌词同步逻辑 ---
        async function syncLyrics() {
            // 1. 获取本地缓存
            const localData = JSON.parse(localStorage.getItem('fuwako_lyrics') || '[]');
            
            // 2. 尝试获取云端 (若有配置)
            const cfg = getCfg();
            if (cfg.token && cfg.repo) {
                try {
                    const res = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
                        headers: { 'Authorization': `token ${cfg.token}` }
                    });
                    const cloudRes = await res.json();
                    const cloudData = JSON.parse(atob(cloudRes.content));
                    
                    // 合并去重逻辑 (基于ID和Timestamp)
                    const combined = [...localData, ...cloudData];
                    const unique = Array.from(new Map(combined.map(item => [item.id, item])).values());
                    lyricsData = unique.sort((a, b) => b.timestamp - a.timestamp);
                    localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
                } catch (e) {
                    lyricsData = localData;
                }
            } else {
                lyricsData = localData;
            }
            renderLyricsList();
        }

        async function addLyrics() {
            const title = document.getElementById('new-lyric-title').value;
            const textRaw = document.getElementById('new-lyric-text').value;
            if (!title || !textRaw) return;

            const newItem = {
                id: Date.now(),
                title: title,
                text: textRaw.split('\n').filter(l => l.trim()),
                timestamp: Date.now(),
                analysis: []
            };

            lyricsData.unshift(newItem);
            renderLyricsList();
            localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));

            // 静默推送
            pushToGithub();
        }

        function renderLyricsList() {
            const container = document.getElementById('lyrics-container');
            container.innerHTML = lyricsData.map(l => `
                <div onclick="showDetail(${l.id})" class="glass p-5 flex justify-between items-center cursor-pointer hover-scale">
                    <div>
                        <div class="font-bold text-sm">${l.title}</div>
                        <div class="text-[10px] opacity-40 mt-1">${new Date(l.timestamp).toLocaleDateString()}</div>
                    </div>
                    <div class="text-pink-300">→</div>
                </div>
            `).join('');
        }

        // --- 详情页解析渲染 ---
        function showDetail(id) {
            currentLyricId = id;
            const item = lyricsData.find(l => l.id === id);
            document.getElementById('detail-title').innerText = item.title;
            const content = document.getElementById('detail-content');
            content.innerHTML = '';

            item.text.forEach((line, index) => {
                const isJP = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(line);
                const lineDiv = document.createElement('div');
                lineDiv.className = "py-2 border-b border-pink-50/50 group flex justify-between items-start";
                
                let html = `<div>`;
                if (isJP && tokenizer) {
                    const tokens = tokenizer.tokenize(line);
                    tokens.forEach(t => {
                        let cls = '';
                        if (t.pos === '名詞') cls = 'pos-noun';
                        if (t.pos === '動詞') cls = 'pos-verb';
                        if (t.pos === '助詞') cls = 'pos-particle';
                        if (t.pos === '形容詞') cls = 'pos-adj';
                        html += `<span class="cursor-help transition-all hover:bg-white px-0.5 rounded ${cls}" onclick="lookup('${t.surface_form}')">${t.surface_form}</span>`;
                    });
                } else {
                    html += `<span class="opacity-50 italic">${line}</span>`;
                }
                html += `</div>`;
                
                // 讲解按钮
                if (isJP) {
                    html += `<button onclick="showAIExplanation(${index})" class="opacity-0 group-hover:opacity-100 px-2 py-0.5 bg-pink-100 text-pink-500 rounded text-[10px] transition-all">讲解</button>`;
                }

                lineDiv.innerHTML = html;
                content.appendChild(lineDiv);
            });

            switchTab('detail');
        }

        // --- 词典与 AI ---
        async function fetchDict() {
            try {
                const res = await fetch('dict.json');
                dictionary = await res.json();
            } catch (e) { console.warn("dict.json not found"); }
        }

        function lookup(word) {
            const def = dictionary[word] || "未收录该词条";
            document.getElementById('dict-result').innerHTML = `<b class="text-pink-500">${word}</b><br>${def}`;
        }

        function showAIExplanation(index) {
            const item = lyricsData.find(l => l.id === currentLyricId);
            if (item.analysis && item.analysis[index]) {
                const info = item.analysis[index];
                document.getElementById('ai-result').innerHTML = `
                    <div class="text-pink-600 mb-1 font-bold">译：${info.translation || info.t}</div>
                    <div class="text-gray-500">${info.grammar || info.e}</div>
                `;
            } else {
                document.getElementById('ai-result').innerText = "该行暂无 AI 解析，请点击右上角执行全文解析。";
            }
        }

        function triggerAIAnalysis() {
            const key = localStorage.getItem('fuwako_ai_key');
            if (!key) {
                document.getElementById('ai-modal').classList.remove('hidden');
            } else {
                startAI();
            }
        }

        async function startAI() {
            const key = document.getElementById('cfg-ai-key').value || localStorage.getItem('fuwako_ai_key');
            if (!key) return;
            localStorage.setItem('fuwako_ai_key', key);
            document.getElementById('ai-modal').classList.add('hidden');

            const item = lyricsData.find(l => l.id === currentLyricId);
            const progressBar = document.getElementById('ai-progress-bar');
            document.getElementById('ai-progress-container').classList.remove('hidden');
            
            // 构建请求 (简单实现示例)
            const jpLines = item.text.map((line, idx) => ({ line, idx, isJP: /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(line) }));
            const promptLines = jpLines.filter(o => o.isJP).map(o => o.line).join('\n');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "glm-4.5-air:free",
                        messages: [{
                            role: "system",
                            content: `你是一个日语老师。请解析以下歌词。强制返回JSON数组，格式：[{"t": "翻译", "e": "语法点解析"}]。如果是空行或无法解析返回null。不要输出任何MarkDown或额外文字。使用单引号代替JSON内部引号。`
                        }, {
                            role: "user",
                            content: promptLines
                        }]
                    })
                });

                const data = await response.json();
                const aiResults = JSON.parse(data.choices[0].message.content);

                // 将 AI 结果回填到 item.analysis
                let aiIdx = 0;
                item.analysis = jpLines.map(obj => {
                    if (obj.isJP) return aiResults[aiIdx++];
                    return null;
                });

                progressBar.style.width = '100%';
                localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
                pushToGithub();
                showDetail(currentLyricId); // 刷新 UI
            } catch (e) {
                alert("AI 解析失败，请检查 API Key");
                console.error(e);
            }
        }

        // --- GitHub 存取底层 ---
        async function pushToGithub() {
            const cfg = getCfg();
            if (!cfg.token || !cfg.repo) return;

            try {
                // 先获取 SHA
                const getRes = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
                    headers: { 'Authorization': `token ${cfg.token}` }
                });
                const fileData = await getRes.json();
                
                await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${cfg.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "update lyrics data",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(lyricsData, null, 2)))),
                        sha: fileData.sha
                    })
                });
            } catch (e) { console.error("Cloud push failed", e); }
        }

        // --- 配置管理 ---
        function toggleConfig() {
            document.getElementById('config-modal').classList.toggle('hidden');
        }

        function saveConfig() {
            const token = document.getElementById('cfg-token').value;
            const repo = document.getElementById('cfg-repo').value;
            localStorage.setItem('fuwako_github_token', token);
            localStorage.setItem('fuwako_github_repo', repo);
            document.getElementById('conn-status').classList.remove('hidden');
            setTimeout(toggleConfig, 1000);
            syncLyrics();
        }

        function loadLocalConfig() {
            document.getElementById('cfg-token').value = localStorage.getItem('fuwako_github_token') || '';
            document.getElementById('cfg-repo').value = localStorage.getItem('fuwako_github_repo') || '';
            if (localStorage.getItem('fuwako_github_token')) document.getElementById('conn-status').classList.remove('hidden');
        }

        function getCfg() {
            return {
                token: localStorage.getItem('fuwako_github_token'),
                repo: localStorage.getItem('fuwako_github_repo')
            };
        }

        init();
    </script>
</body>
</html>
