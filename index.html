<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 歌词与语法助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        :root {
            --fuwari-pink: #fff1f2;
            --fuwari-blue: #f0f9ff;
            --fuwari-accent: #fb7185;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            background: linear-gradient(135deg, var(--fuwari-pink) 0%, var(--fuwari-blue) 100%);
            min-height: 100vh;
            color: #57534e;
            font-family: 'Hiragino Sans', 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* 磨砂玻璃特效 */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
        }

        /* 词性高亮 */
        .pos-verb { border-bottom: 2px solid #fda4af; color: #e11d48; }
        .pos-particle { border-bottom: 2px solid #93c5fd; color: #2563eb; }
        .pos-noun { color: #059669; }

        .token-item {
            display: inline-block;
            padding: 0 2px;
            margin: 0 1px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .token-item:hover { background: rgba(255,255,255,0.9); transform: translateY(-1px); }

        /* 配置按钮 */
        #config-trigger {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            cursor: pointer;
            z-index: 60;
            transition: transform 0.3s;
        }
        #config-trigger:hover { transform: rotate(15deg) scale(1.1); }

        /* AI 进度条 */
        .ai-bar {
            position: fixed;
            top: 0; left: 0;
            height: 4px;
            width: 0%;
            background: linear-gradient(90deg, #fb7185, #60a5fa);
            z-index: 100;
            transition: width 0.4s ease;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s;
        }
    </style>
</head>
<body>

    <div id="ai-bar" class="ai-bar"></div>

    <div id="loading-overlay">
        <div class="w-16 h-16 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-pink-400 font-medium">正在唤醒词典...</p>
    </div>

    <img src="7.png" id="config-trigger" onclick="toggleModal('modal-settings')" alt="Settings">

    <div class="container mx-auto px-4 pt-20 pb-10 max-w-5xl">
        
        <section class="glass p-6 mb-8 shadow-sm">
            <h2 class="text-lg font-bold mb-4 flex items-center text-pink-500">
                <span class="mr-2">✨</span> 语法变形看板
            </h2>
            <div class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
                <div class="flex-shrink-0 bg-white/50 p-4 rounded-2xl w-40">
                    <p class="text-xs text-gray-400 mb-1">动词五段</p>
                    <p class="font-bold text-gray-700">書く → 書いた</p>
                    <span class="text-[10px] bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full">连用形/た形</span>
                </div>
                <div class="flex-shrink-0 bg-white/50 p-4 rounded-2xl w-40">
                    <p class="text-xs text-gray-400 mb-1">使役受身</p>
                    <p class="font-bold text-gray-700">飲まされる</p>
                    <span class="text-[10px] bg-blue-100 text-blue-500 px-2 py-0.5 rounded-full">N3 重点</span>
                </div>
                </div>
        </section>

        <div id="app-content">
            <div id="view-shelf" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div onclick="showEditor()" class="glass border-dashed border-2 border-pink-200 flex flex-col items-center justify-center p-10 cursor-pointer hover:bg-white/80 transition-all">
                    <span class="text-4xl text-pink-300 mb-2">+</span>
                    <p class="text-pink-400 font-medium">添加新歌词</p>
                </div>
                <div id="shelf-items" class="contents">
                    </div>
            </div>

            <div id="view-detail" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="switchView('shelf')" class="text-sm bg-white/60 px-4 py-2 rounded-full hover:bg-white">← 返回书架</button>
                    <h2 id="detail-title" class="text-xl font-bold">歌词详情</h2>
                </div>
                <div class="flex flex-col lg:flex-row gap-8">
                    <div id="lyrics-render" class="glass flex-1 p-8 text-xl leading-[3.5rem]">
                        </div>
                    <div id="side-info" class="w-full lg:w-80 space-y-4">
                        <div class="glass p-6 sticky top-24">
                            <h3 class="font-bold text-pink-500 border-b border-pink-100 pb-2 mb-4">详细说明</h3>
                            <div id="info-content" class="text-sm leading-relaxed text-gray-500">
                                点击单词查看释义，点击行末按钮查看 AI 语法分析。
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-white/20 backdrop-blur-md hidden z-[100] flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center">系统配置</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">GitHub Token</label>
                    <input type="password" id="set-gh-token" class="w-full mt-1 p-3 rounded-xl bg-pink-50/50 border-none focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Gemini 2.5 API Key</label>
                    <input type="password" id="set-gemini-key" class="w-full mt-1 p-3 rounded-xl bg-blue-50/50 border-none focus:ring-2 focus:ring-blue-300 outline-none">
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="toggleModal('modal-settings')" class="flex-1 py-3 text-gray-400 font-medium">取消</button>
                <button onclick="saveConfigs()" class="flex-1 py-3 bg-pink-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-200">保存配置</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { Octokit } from "https://cdn.skypack.dev/@octokit/core";

        let tokenizer = null;
        let db = { lyrics: [] };
        let currentAnalysis = [];

        // 配置信息
        const CONFIG = {
            owner: 'YOUR_GITHUB_ID',
            repo: 'YOUR_REPO_NAME',
            dictPath: './dict/' // 这里的路径指向你仓库的 /dict 文件夹
        };

        // --- 初始化 ---
        async function init() {
            // 1. 初始化 Kuromoji (指向本地路径)
            kuromoji.builder({ dicPath: CONFIG.dictPath }).build((err, _tokenizer) => {
                if (err) {
                    console.error("词典加载失败:", err);
                    alert("词典路径配置错误，请检查 /dict 文件夹");
                    return;
                }
                tokenizer = _tokenizer;
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').remove(), 600);
            });

            // 2. 加载本地设置
            document.getElementById('set-gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('set-gemini-key').value = localStorage.getItem('gemini_key') || '';

            // 3. 从本地存储读取缓存数据
            const localData = localStorage.getItem('lyrics_cache');
            if (localData) db.lyrics = JSON.parse(localData);
            renderShelf();
        }

        // --- 核心：Gemini 2.5 预处理 ---
        async function runGeminiAnalysis(text, songId) {
            const key = localStorage.getItem('gemini_key');
            if (!key) return alert("请先配置 Gemini API Key");

            document.getElementById('ai-bar').style.width = '40%';
            
            try {
                // 调用 Gemini 2.5 API (此处为通用格式，具体 URL 取决于 Google 发布的 Endpoint)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `请分析以下日语歌词，严格按 JSON 数组格式返回，不要有任何多余文字：[{"t":"中文翻译", "e":"语法解析"}]。行数需与原歌词一致：\n${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const resultText = data.candidates[0].content.parts[0].text;
                const analysis = JSON.parse(resultText.replace(/```json|```/g, ''));

                // 持久化到本地及 GitHub
                await saveAnalysisToCloud(songId, analysis);
                
                document.getElementById('ai-bar').style.width = '100%';
                setTimeout(() => document.getElementById('ai-bar').style.width = '0', 800);
                return analysis;
            } catch (e) {
                console.error("AI 分析失败", e);
                document.getElementById('ai-bar').style.width = '0';
                return null;
            }
        }

        // --- GitHub 交互 ---
        async function saveAnalysisToCloud(songId, analysisData) {
            const token = localStorage.getItem('gh_token');
            if (!token) return;

            const octokit = new Octokit({ auth: token });
            const fileName = `analysis_${songId}.json`;
            
            // 将分析结果存入仓库
            try {
                await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
                    owner: CONFIG.owner,
                    repo: CONFIG.repo,
                    path: fileName,
                    message: `AI Analysis for ${songId}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(analysisData))))
                });
            } catch(e) { console.warn("云端备份失败，已存入本地缓存"); }
        }

        // --- 渲染逻辑 ---
        window.renderLyricsDetail = async function(songId) {
            const song = db.lyrics.find(s => s.id === songId);
            document.getElementById('detail-title').innerText = song.title;
            const container = document.getElementById('lyrics-render');
            container.innerHTML = '';

            // 尝试加载分析数据
            currentAnalysis = await loadAnalysis(songId);

            song.content.split('\n').forEach((line, idx) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'flex items-start group mb-2';

                const textDiv = document.createElement('div');
                textDiv.className = 'flex-1';
                
                // Kuromoji 分词渲染
                const tokens = tokenizer.tokenize(line);
                tokens.forEach(t => {
                    const span = document.createElement('span');
                    span.className = `token-item ${getPosClass(t.pos)}`;
                    span.innerText = t.surface_form;
                    span.onclick = () => showWordInfo(t.surface_form);
                    textDiv.appendChild(span);
                });

                // 讲解按钮
                const btn = document.createElement('button');
                btn.className = 'opacity-0 group-hover:opacity-100 transition-opacity ml-4 text-[10px] bg-pink-100 text-pink-500 px-2 py-1 rounded-lg';
                btn.innerText = '講解';
                btn.onclick = () => showLineExplanation(idx);

                lineDiv.appendChild(textDiv);
                lineDiv.appendChild(btn);
                container.appendChild(lineDiv);
            });

            switchView('detail');
        };

        function getPosClass(pos) {
            if (pos === '動詞') return 'pos-verb';
            if (pos === '助詞') return 'pos-particle';
            if (pos === '名詞') return 'pos-noun';
            return '';
        }

        // --- 工具函数 ---
        window.toggleModal = (id) => {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
        };

        window.saveConfigs = () => {
            localStorage.setItem('gh_token', document.getElementById('set-gh-token').value);
            localStorage.setItem('gemini_key', document.getElementById('set-gemini-key').value);
            toggleModal('modal-settings');
            alert("配置已本地保存");
        };

        window.switchView = (v) => {
            document.getElementById('view-shelf').classList.toggle('hidden', v !== 'shelf');
            document.getElementById('view-detail').classList.toggle('hidden', v !== 'detail');
        };

        window.onload = init;
    </script>
</body>
</html>
