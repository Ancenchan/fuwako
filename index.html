<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 软绵绵日语学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fuwari-pink: #ffd1dc;
            --fuwari-blue: #bfeaf5;
            --fuwari-purple: #e0dbff;
            --fuwari-green: #d4f0d4;
            --glass-bg: rgba(255, 255, 255, 0.45);
        }

        body {
            font-family: 'Zen Maru Gothic', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #f0f7ff 100%);
            min-height: 100vh;
            color: #5a5a5a;
            overflow-x: hidden;
        }

        /* Fuwari Glassmorphism */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glass-card:hover {
            transform: scale(1.01);
        }

        /* POS Coloring */
        .pos-verb { border-bottom: 3px solid #ffacc5; background: #fff0f3; } /* 动词-粉色 */
        .pos-particle { border-bottom: 3px solid #89d4ff; background: #f0f9ff; } /* 助词-蓝色 */
        .pos-noun { border-bottom: 3px solid #d1d1d1; }
        .pos-adj { border-bottom: 3px solid #ffd966; }

        /* Loading Mask */
        #loading-mask {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .loader-bar {
            width: 200px;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        #loader-progress {
            width: 0%;
            height: 100%;
            background: var(--fuwari-pink);
            transition: width 0.3s;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--fuwari-pink); border-radius: 10px; }

        /* Tab Transition */
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* AI Progress Bar */
        #ai-progress-container {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 4px; z-index: 60;
            background: transparent;
        }
        #ai-progress-bar { width: 0%; height: 100%; background: var(--fuwari-blue); transition: width 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-mask">
        <div class="text-2xl font-bold mb-4" style="color: var(--fuwari-pink)">Fuwako Loading...</div>
        <div class="loader-bar"><div id="loader-progress"></div></div>
        <div id="loader-text" class="mt-2 text-sm text-gray-400">正在唤醒词典 0%</div>
    </div>

    <div id="ai-progress-container"><div id="ai-progress-bar"></div></div>

    <header class="max-w-5xl mx-auto mb-8 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <h1 class="text-3xl font-bold text-gray-700">Fuwako</h1>
            <nav class="flex bg-white/50 rounded-full p-1 border border-white">
                <button onclick="switchTab('grammar')" class="px-6 py-2 rounded-full hover:bg-white transition" id="tab-btn-grammar">语法</button>
                <button onclick="switchTab('lyrics')" class="px-6 py-2 rounded-full hover:bg-white transition" id="tab-btn-lyrics">歌词</button>
            </nav>
        </div>
        <img src="7.png" onclick="openSettings()" class="w-10 h-10 cursor-pointer hover:rotate-12 transition-transform" alt="Settings">
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            
            <div id="grammar-tab" class="tab-content active">
                <div id="grammar-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
<div id="upload-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-[32px] w-[500px] max-w-[90%] shadow-xl">
        <h3 class="text-xl font-bold mb-4">新增歌词</h3>
        <input type="text" id="lyric-title" placeholder="歌词标题 (例如: yueguang)" class="w-full p-3 bg-gray-100 rounded-xl mb-4 outline-none border-2 border-transparent focus:border-[#ffd1dc]">
        <textarea id="lyric-text" placeholder="在此粘贴歌词内容..." class="w-full h-48 p-3 bg-gray-100 rounded-xl mb-4 outline-none border-2 border-transparent focus:border-[#ffd1dc] resize-none"></textarea>
        <div class="flex justify-end space-x-2">
            <button onclick="closeUploadModal()" class="px-4 py-2">取消</button>
            <button onclick="saveNewLyric()" class="bg-[#ffd1dc] px-6 py-2 rounded-full font-bold text-gray-700">保存并上传</button>
        </div>
    </div>
</div>
            <div id="lyrics-tab" class="tab-content">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">书架系统</h2>
                    <button onclick="showUploadModal()" class="bg-white px-4 py-2 rounded-full shadow-sm hover:shadow-md transition">+ 新增歌词</button>
                </div>
                <div id="lyrics-shelf" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    </div>

                <div id="lyrics-reader" class="hidden mt-8 p-6 glass-card">
                    <div class="flex justify-between items-start mb-6">
                        <h3 id="reader-title" class="text-2xl font-bold"></h3>
                        <button onclick="analyzeWithAI()" id="ai-btn" class="text-sm bg-[#e0dbff] px-4 py-2 rounded-full hover:brightness-95 transition">AI 语法讲解</button>
                    </div>
                    <div id="reader-content" class="leading-loose text-lg space-y-4">
                        </div>
                </div>
            </div>
        </div>

        <aside class="space-y-6">
            <div class="glass-card p-6 min-h-[300px]">
                <h3 class="text-lg font-bold mb-4 border-b pb-2">词汇解析</h3>
                <div id="sidebar-content" class="text-gray-600 italic">
                    点击下方歌词词块或“解析”按钮查看内容...
                </div>
            </div>
        </aside>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-[32px] w-96 shadow-xl">
            <h3 class="text-xl font-bold mb-4">GitHub 配置</h3>
            <input type="password" id="gh-token" placeholder="输入 GitHub Token" class="w-full p-3 bg-gray-100 rounded-xl mb-4 outline-none border-2 border-transparent focus:border-[#ffd1dc]">
            <div class="flex justify-end space-x-2">
                <button onclick="closeSettings()" class="px-4 py-2">取消</button>
                <button onclick="saveSettings()" class="bg-[#ffd1dc] px-6 py-2 rounded-full font-bold">保存</button>
            </div>
        </div>
    </div>

    <div id="api-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-[32px] w-96 shadow-xl">
            <h3 class="text-xl font-bold mb-4">硅基流动 API 设置</h3>
            <input type="password" id="sf-api-key" placeholder="输入 SiliconFlow API Key" class="w-full p-3 bg-gray-100 rounded-xl mb-4 outline-none">
            <button onclick="confirmAIAnalysis()" class="w-full bg-[#e0dbff] py-3 rounded-full font-bold">开始解析</button>
        </div>
    </div>

    <script>
        // --- 全局变量 ---
        let tokenizer = null;
        let localDict = {};
        let lyricsData = [];
        let currentLyricId = null;
        let isAnalyzing = false;

        // --- 初始化 ---
        window.onload = async () => {
            initKuromoji();
            loadLocalDict();
            loadGrammar();
            syncLyrics();
        };

        function initKuromoji() {
            kuromoji.builder({ dicPath: "dict/" }).build((err, _tokenizer) => {
                if (err) { console.error(err); return; }
                tokenizer = _tokenizer;
                document.getElementById('loader-progress').style.width = '100%';
                document.getElementById('loader-text').innerText = '词典加载完成 100%';
                setTimeout(() => {
                    document.getElementById('loading-mask').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-mask').style.display = 'none', 500);
                }, 800);
            });
        }

        async function loadLocalDict() {
            try {
                const res = await fetch('dict.json');
                localDict = await res.json();
            } catch (e) { console.warn("未找到 dict.json"); }
        }

        async function loadGrammar() {
            try {
                const res = await fetch('grammar.json');
                const data = await res.json();
                const container = document.getElementById('grammar-list');
                container.innerHTML = data.map(item => `
                    <div class="glass-card p-6">
                        <div class="text-xs text-pink-400 font-bold mb-1">${item.level || 'N/A'}</div>
                        <div class="text-xl font-bold mb-2">${item.title}</div>
                        <div class="text-sm text-gray-500">${item.meaning}</div>
                    </div>
                `).join('');
            } catch (e) { console.warn("未找到 grammar.json"); }
        }

        // --- 核心逻辑：歌词处理 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        async function syncLyrics() {
            // 1. 获取本地
            let local = JSON.parse(localStorage.getItem('fuwako_lyrics') || '[]');
            
            // 2. 尝试获取云端 (此处仅展示逻辑框架，需替换为你的 GitHub Repo 详情)
            const token = localStorage.getItem('gh_token');
            if (token) {
                try {
                    // 实际项目中请替换 URL: https://api.github.com/repos/OWNER/REPO/contents/lyrics_data.json
                    const res = await fetch('lyrics_data.json'); 
                    const remote = await res.json();
                    
                    // 合并去重逻辑 (基于 timestamp)
                    let combined = [...local, ...remote];
                    let unique = {};
                    combined.forEach(item => {
                        if (!unique[item.id] || item.timestamp > unique[item.id].timestamp) {
                            unique[item.id] = item;
                        }
                    });
                    lyricsData = Object.values(unique);
                    localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
                } catch (e) {
                    lyricsData = local;
                }
            } else {
                lyricsData = local;
            }
            renderShelf();
        }

        function renderShelf() {
            const shelf = document.getElementById('lyrics-shelf');
            shelf.innerHTML = lyricsData.map(l => `
                <div onclick="openLyric('${l.id}')" class="glass-card p-4 cursor-pointer text-center aspect-square flex flex-col justify-center">
                    <div class="text-lg font-bold truncate">${l.title}</div>
                    <div class="text-xs text-gray-400 mt-2">${new Date(l.timestamp).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        function openLyric(id) {
            const lyric = lyricsData.find(l => l.id == id);
            if (!lyric) return;
            currentLyricId = id;
            document.getElementById('reader-title').innerText = lyric.title;
            document.getElementById('lyrics-reader').classList.remove('hidden');
            
            const contentDiv = document.getElementById('reader-content');
            contentDiv.innerHTML = lyric.text.map((line, idx) => {
                const isJP = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(line);
                if (!isJP) return `<div class="text-gray-400 text-sm">${line}</div>`;
                
                // 对日语行进行分词
                const tokens = tokenizer.tokenize(line);
                const tokenHtml = tokens.map(t => {
                    let cls = "";
                    if (t.pos === "動詞") cls = "pos-verb";
                    else if (t.pos === "助詞") cls = "pos-particle";
                    else if (t.pos === "名詞") cls = "pos-noun";
                    return `<span class="cursor-help px-1 rounded ${cls}" onclick="lookupWord('${t.surface_form}')">${t.surface_form}</span>`;
                }).join('');

                return `
                    <div class="flex justify-between items-center group">
                        <div class="flex-1">${tokenHtml}</div>
                        <button onclick="showLineAnalysis(${idx})" class="opacity-0 group-hover:opacity-100 text-xs bg-gray-100 px-2 py-1 rounded ml-2 transition">解析</button>
                    </div>
                `;
            }).join('');
            
            // 滚动到阅读器
            document.getElementById('lyrics-reader').scrollIntoView({ behavior: 'smooth' });
        }

        function lookupWord(word) {
            const sidebar = document.getElementById('sidebar-content');
            const meaning = localDict[word] || "未收录至本地词库。";
            sidebar.innerHTML = `<div class="text-2xl font-bold text-pink-400 mb-2">${word}</div><div>${meaning}</div>`;
        }

        // --- AI 解析功能 ---
        function analyzeWithAI() {
            if (isAnalyzing) return;
            const apiKey = localStorage.getItem('sf_api_key');
            if (!apiKey) {
                document.getElementById('api-modal').classList.remove('hidden');
            } else {
                confirmAIAnalysis();
            }
        }

        async function confirmAIAnalysis() {
            const apiKey = document.getElementById('sf-api-key').value;
            if (apiKey) localStorage.setItem('sf_api_key', apiKey);
            document.getElementById('api-modal').classList.add('hidden');
            
            const lyric = lyricsData.find(l => l.id == currentLyricId);
            isAnalyzing = true;
            document.getElementById('ai-btn').innerText = "解析中...";
            
            // 模拟进度条
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                document.getElementById('ai-progress-bar').style.width = progress + '%';
                if (progress >= 90) clearInterval(interval);
            }, 500);

            try {
                // 调用硅基流动 API (简化版请求)
                const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('sf_api_key')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "vendor/model-name", // 替换为具体模型
                        messages: [{role: "user", content: `请解析以下日语歌词的语法，强制返回JSON数组格式 [{"t": "翻译", "e": "语法解析"}]：\n${lyric.text.join('\n')}`}]
                    })
                });
                
                const result = await response.json();
                // 假设解析成功，存入本地/云端
                const analysisData = JSON.parse(result.choices[0].message.content);
                localStorage.setItem(`analysis_${currentLyricId}`, JSON.stringify(analysisData));
                
                document.getElementById('ai-progress-bar').style.width = '100%';
                setTimeout(() => document.getElementById('ai-progress-bar').style.width = '0%', 1000);
            } catch (e) {
                alert("AI 解析失败，请检查 API Key 或网络");
            } finally {
                isAnalyzing = false;
                document.getElementById('ai-btn').innerText = "AI 语法讲解";
                clearInterval(interval);
            }
        }

        function showLineAnalysis(index) {
            const analysis = JSON.parse(localStorage.getItem(`analysis_${currentLyricId}`) || '[]');
            const sidebar = document.getElementById('sidebar-content');
            if (analysis[index]) {
                sidebar.innerHTML = `
                    <div class="text-sm text-gray-400 mb-2">句子解析</div>
                    <div class="text-lg font-bold mb-4">${analysis[index].t}</div>
                    <div class="bg-white/50 p-3 rounded-lg border border-white">${analysis[index].e}</div>
                `;
            } else {
                sidebar.innerHTML = "尚未生成 AI 解析，请先点击右上角“AI 语法讲解”。";
            }
        }

        // --- 设置管理 ---
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() {
            const token = document.getElementById('gh-token').value;
            if (token) localStorage.setItem('gh_token', token);
            closeSettings();
            syncLyrics();
        }
        // --- 歌词上传与管理函数 ---

function showUploadModal() {
    document.getElementById('upload-modal').classList.remove('hidden');
}

function closeUploadModal() {
    document.getElementById('upload-modal').classList.add('hidden');
    // 清空输入框
    document.getElementById('lyric-title').value = '';
    document.getElementById('lyric-text').value = '';
}

async function saveNewLyric() {
    const title = document.getElementById('lyric-title').value.trim();
    const rawText = document.getElementById('lyric-text').value.trim();

    if (!title || !rawText) {
        alert("标题和内容都不能为空哦~");
        return;
    }

    const timestamp = Date.now();
    const newEntry = {
        id: timestamp,
        title: title,
        // 将文本按行分割成数组，符合你的数据结构约定
        text: rawText.split('\n').filter(line => line.trim() !== ""),
        timestamp: timestamp
    };

    // 1. 更新本地状态
    lyricsData.push(newEntry);
    localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
    
    // 2. 立即刷新 UI
    renderShelf();
    closeUploadModal();

    // 3. 尝试静默推送到 GitHub (如果有 Token)
    const token = localStorage.getItem('gh_token');
    if (token) {
        pushToGithub(lyricsData);
    }
}

    </script>
</body>
</html>
