<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 日本語学習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        :root {
            --fuwari-pink: #ffe4e9;
            --fuwari-purple: #f3e5f5;
            --fuwari-accent: #ff85a2;
            --fuwari-bg: #fff9fb;
        }
        body {
            font-family: "Helvetica Neue", "Helvetica", "Heiti SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, var(--fuwari-pink) 0%, var(--fuwari-purple) 100%);
            min-height: 100vh;
            color: #4a4a4a;
            margin: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
        }
        .hover-scale { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hover-scale:hover { transform: scale(1.02); }
        .pos-noun { color: #5c7cfa; font-weight: 500; }
        .pos-verb { color: #f06595; font-weight: 500; }
        .pos-particle { color: #845ef7; }
        .pos-adj { color: #fcc419; }
        #loading-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fuwari-bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .tab-btn-active { background-color: var(--fuwari-accent) !important; color: white !important; }
        input, textarea { border: none !important; outline: none !important; }
    </style>
</head>
<body>

    <div id="loading-mask">
        <div class="text-4xl mb-4">🌸</div>
        <div id="loading-text" class="text-xs text-pink-400 font-light">正在加载词典... 0%</div>
        <div class="w-48 h-1 bg-pink-100 rounded-full mt-4 overflow-hidden">
            <div id="loading-bar" class="h-full bg-pink-400 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <header class="fixed top-4 left-0 right-0 z-50 px-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center glass p-3 shadow-sm">
            <div class="flex items-center space-x-4">
                <span class="text-lg font-bold tracking-tighter text-pink-500">Fuwako</span>
                <nav class="flex space-x-1">
                    <button onclick="switchTab('grammar')" id="tab-grammar" class="tab-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all hover:bg-white/50 tab-btn-active">语法库</button>
                    <button onclick="switchTab('lyrics')" id="tab-lyrics" class="tab-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all hover:bg-white/50">歌词解析</button>
                </nav>
            </div>
            <button onclick="toggleConfig()" class="hover-scale">
                <img src="7.png" class="w-8 h-8 rounded-full border-2 border-white shadow-sm" onerror="this.src='https://api.iconify.design/fluent-emoji-flat:cherry-blossom.svg'">
            </button>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 max-w-4xl mx-auto">
        <section id="view-grammar" class="view-section">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="grammar-list"></div>
        </section>

        <section id="view-lyrics" class="view-section hidden">
            <div class="glass p-5 mb-6">
                <h3 class="text-[10px] font-bold mb-3 opacity-40 uppercase tracking-widest">新增歌词数据</h3>
                <input id="new-lyric-title" type="text" placeholder="歌曲标题..." class="w-full mb-3 p-3 rounded-xl bg-white/40 text-sm">
                <textarea id="new-lyric-text" rows="3" placeholder="输入日语歌词（可包含翻译行）..." class="w-full p-3 rounded-xl bg-white/40 text-sm"></textarea>
                <button type="button" onclick="addLyrics()" class="mt-2 w-full py-2 bg-pink-400 text-white rounded-xl text-xs font-bold hover:bg-pink-500 transition-all shadow-sm">确认存入云端</button>
            </div>
            <div id="lyrics-container" class="space-y-3"></div>
        </section>

        <section id="view-detail" class="view-section hidden">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 glass p-6">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="switchTab('lyrics')" class="text-[10px] text-pink-400 font-bold hover:underline">← 返回列表</button>
                        <div class="flex items-center space-x-2">
                            <div id="ai-progress-wrap" class="hidden w-20 h-1 bg-pink-100 rounded-full overflow-hidden">
                                <div id="ai-progress-bar" class="h-full bg-pink-400" style="width: 0%"></div>
                            </div>
                            <button onclick="triggerAI()" class="px-3 py-1 bg-pink-500 text-white rounded-full text-[10px] font-bold hover:bg-pink-600 transition-all">AI 语法解析</button>
                        </div>
                    </div>
                    <h2 id="detail-title" class="text-lg font-bold mb-4 text-gray-700"></h2>
                    <div id="detail-content" class="space-y-4 text-sm leading-relaxed"></div>
                </div>
                <aside class="w-full md:w-60">
                    <div class="glass p-5 sticky top-24 space-y-6">
                        <div>
                            <h4 class="text-[10px] font-bold text-pink-400 mb-2 uppercase tracking-widest">单词释义</h4>
                            <div id="dict-result" class="text-xs text-gray-500 italic">点击词块查看...</div>
                        </div>
                        <div class="pt-4 border-t border-white/40">
                            <h4 class="text-[10px] font-bold text-pink-400 mb-2 uppercase tracking-widest">AI 解析内容</h4>
                            <div id="ai-result" class="text-[11px] leading-5 text-gray-600">点击行旁“解析”获取</div>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <div id="config-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-white/20 backdrop-blur-md" onclick="toggleConfig()"></div>
        <div class="glass p-8 w-72 relative shadow-2xl">
            <h3 class="font-bold mb-5 text-center text-pink-500">GitHub 设置</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold opacity-40 ml-1">ACCESS TOKEN</label>
                    <input id="cfg-token" type="password" class="w-full mt-1 p-2 rounded-lg bg-white/80 text-xs shadow-inner">
                </div>
                <button onclick="saveConfig()" class="w-full py-2.5 bg-pink-400 text-white rounded-xl font-bold text-xs shadow-md hover:bg-pink-500 transition-all">保存并连接</button>
                <div id="conn-status" class="text-center text-[10px] text-green-500 hidden font-bold">● 已成功连接</div>
            </div>
        </div>
    </div>

    <div id="ai-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-white/20 backdrop-blur-md" onclick="this.parentElement.classList.add('hidden')"></div>
        <div class="glass p-8 w-72 relative shadow-2xl">
            <h3 class="font-bold mb-2 text-center text-pink-500">API 配置</h3>
            <p class="text-[9px] text-center mb-4 text-gray-400">请输入 SiliconFlow / OpenRouter Key</p>
            <input id="cfg-ai-key" type="password" class="w-full p-2 rounded-lg bg-white/80 text-xs shadow-inner mb-4">
            <button onclick="startAIProcess()" class="w-full py-2.5 bg-pink-500 text-white rounded-xl font-bold text-xs shadow-md">保存并开始解析</button>
        </div>
    </div>

    <script>
        let tokenizer = null;
        let lyricsData = [];
        let dictionary = {};
        let currentId = null;

        // 初始化
        async function init() {
            kuromoji.builder({ dicPath: "dict" }).build((err, _tokenizer) => {
                if (err) return;
                tokenizer = _tokenizer;
                document.getElementById('loading-bar').style.width = '100%';
                document.getElementById('loading-text').innerText = '词典加载完成！';
                setTimeout(() => {
                    document.getElementById('loading-mask').style.display = 'none';
                }, 500);
            });

            // 预设默认仓库

            loadConfig();
            loadGrammar();
            loadLyrics();
            loadDict();
        }

        // 处理中文字符的 Base64 转换
        function utoa(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
        }

        function atou(str) {
            return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }

        async function loadGrammar() {
            try {
                const r = await fetch('grammar.json');
                const data = await r.json();
                const list = document.getElementById('grammar-list');
                list.innerHTML = data.map(i => `
                    <div class="glass p-4 hover-scale cursor-default">
                        <div class="text-pink-500 font-bold text-sm">${i.title}</div>
                        <div class="text-[9px] text-pink-300 mb-2 font-bold opacity-70">${i.tag || 'Common'}</div>
                        <div class="text-[11px] text-gray-500">${i.description}</div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        async function loadLyrics() {
            const local = JSON.parse(localStorage.getItem('fuwako_lyrics') || '[]');
            lyricsData = Array.isArray(local) ? local : [];
            
            const cfg = getCfg();
            if (cfg.token && cfg.repo) {
                try {
                    const r = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
                        headers: { 'Authorization': `token ${cfg.token}` }
                    });
                    if (r.ok) {
                        const json = await r.json();
                        const cloudData = JSON.parse(atou(json.content));
                        // 合并去重（以 timestamp 为准）
                        const combined = [...lyricsData, ...cloudData];
                        lyricsData = Array.from(new Map(combined.map(item => [item.id, item])).values())
                                          .sort((a,b) => b.timestamp - a.timestamp);
                        localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
                    }
                } catch(e) {}
            }
            renderLyricsList();
        }

        function renderLyricsList() {
            const container = document.getElementById('lyrics-container');
            container.innerHTML = lyricsData.map(l => `
                <div onclick="showDetail(${l.id})" class="glass p-4 flex justify-between items-center cursor-pointer hover-scale transition-all active:scale-95">
                    <div>
                        <div class="font-bold text-[13px] text-gray-700">${l.title}</div>
                        <div class="text-[9px] opacity-30 mt-1 font-mono">${new Date(l.timestamp).toLocaleString()}</div>
                    </div>
                    <div class="text-pink-200">❯</div>
                </div>
            `).join('');
        }

async function addLyrics() {
    // 1. 获取配置并进行硬性校验
    const cfg = getCfg();
    if (!cfg.token || !cfg.repo) {
        alert("❌ 错误：未检测到 GitHub 配置！\n请点击右上角图标输入 Token 和 仓库名后再试。");
        // 自动弹出配置框引导用户
        toggleConfig(); 
        return;
    }

    // 2. 获取输入内容
    const title = document.getElementById('new-lyric-title').value.trim();
    const textRaw = document.getElementById('new-lyric-text').value.trim();
    
    if (!title || !textRaw) {
        alert("请输入歌曲标题和歌词内容~");
        return;
    }

    // 3. 构建新歌词对象
    const newItem = {
        id: Date.now(),
        title: title,
        text: textRaw.split('\n').filter(s => s.trim()),
        timestamp: Date.now(),
        analysis: []
    };

    // 4. 先发起云端同步（只有同步成功才更新本地 UI，确保数据一致性）
    // 如果你希望用户感知到“正在上传”，可以在这里加一个 Loading
    const btn = event.target; // 自动获取点击的按钮
    const originalText = btn.innerText;
    btn.innerText = "正在存入云端...";
    btn.disabled = true;

    try {
        // 先把新数据加进内存中的临时列表用于上传
        const tempLyricsData = [newItem, ...lyricsData];
        
        let sha = null;
        const r = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
            headers: { 'Authorization': `token ${cfg.token}` }
        });
        
        if (r.ok) {
            const json = await r.json();
            sha = json.sha;
        }

        const pushRes = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
            method: 'PUT',
            headers: { 
                'Authorization': `token ${cfg.token}`, 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({
                message: `Add new lyrics: ${title}`,
                content: utoa(JSON.stringify(tempLyricsData, null, 2)),
                sha: sha
            })
        });

        if (pushRes.ok) {
            // 只有 GitHub 返回 200/201 成功后，才更新本地显示
            lyricsData = tempLyricsData;
            localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
            renderLyricsList();
            
            // 清空输入
            document.getElementById('new-lyric-title').value = "";
            document.getElementById('new-lyric-text').value = "";
            alert("✅ 成功同步至 GitHub！");
        } else {
            const errData = await pushRes.json();
            throw new Error(errData.message || "上传失败");
        }

    } catch(e) {
        console.error(e);
        alert("❌ 存入云端失败：" + e.message);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
        async function pushToCloud() {
            const cfg = getCfg();
            if (!cfg.token || !cfg.repo) return;

            try {
                let sha = null;
                const r = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
                    headers: { 'Authorization': `token ${cfg.token}` }
                });
                if (r.ok) {
                    const json = await r.json();
                    sha = json.sha;
                }

                const body = {
                    message: "Sync Fuwako Lyrics",
                    content: utoa(JSON.stringify(lyricsData, null, 2))
                };
                if (sha) body.sha = sha;

                await fetch(`https://api.github.com/repos/${cfg.repo}/contents/lyrics_data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${cfg.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            } catch(e) { console.error("Cloud push failed:", e); }
        }

        function showDetail(id) {
            currentId = id;
            const item = lyricsData.find(l => l.id === id);
            document.getElementById('detail-title').innerText = item.title;
            const content = document.getElementById('detail-content');
            content.innerHTML = "";

            item.text.forEach((line, idx) => {
                const isJP = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(line);
                const row = document.createElement('div');
                row.className = "flex justify-between items-start group py-1 border-b border-white/30";
                
                let html = `<div class="flex-1">`;
                if (isJP && tokenizer) {
                    tokenizer.tokenize(line).forEach(t => {
                        let c = "";
                        if (t.pos === '名詞') c = "pos-noun";
                        else if (t.pos === '動詞') c = "pos-verb";
                        else if (t.pos === '助詞') c = "pos-particle";
                        else if (t.pos === '形容詞') c = "pos-adj";
                        html += `<span class="cursor-help hover:bg-white/60 px-0.5 rounded ${c}" onclick="lookupDict('${t.surface_form}')">${t.surface_form}</span>`;
                    });
                } else {
                    html += `<span class="opacity-40 italic font-light">${line}</span>`;
                }
                html += `</div>`;
                
                if (isJP) {
                    html += `<button onclick="showAnalysis(${idx})" class="opacity-0 group-hover:opacity-100 text-[9px] bg-pink-100 text-pink-400 px-2 py-0.5 rounded transition-all">解析</button>`;
                }
                row.innerHTML = html;
                content.appendChild(row);
            });
            switchTab('detail');
        }

        async function loadDict() {
            try {
                const r = await fetch('dict.json');
                dictionary = await r.json();
            } catch(e) {}
        }

        function lookupDict(word) {
            const res = dictionary[word] || "词典暂未收录此词";
            document.getElementById('dict-result').innerHTML = `<b class="text-pink-500">${word}</b><br>${res}`;
        }

function showAnalysis(idx) {
    const item = lyricsData.find(l => l.id === currentId);
    // 获取对应行的解析对象
    const ana = item.analysis && item.analysis[idx];
    
    // 增加调试点：如果你还是看不到内容，可以在这里取消注释查看控制台
    // console.log("当前行解析数据:", ana);

    if (ana && typeof ana === 'object') {
        // 将旧版的 ana.t 改为 ana.translation，ana.e 改为 ana.grammar
        document.getElementById('ai-result').innerHTML = `
            <div class="text-pink-500 font-bold mb-1">译：${ana.translation || '（无翻译）'}</div>
            <div class="text-[11px] leading-5 text-gray-600">${ana.grammar || '（无语法解析）'}</div>
        `;
    } else {
        // 如果该行是 null 或者没有解析数据
        document.getElementById('ai-result').innerHTML = `
            <div class="text-gray-400 italic text-[10px]">该行无需解析或暂无数据</div>
        `;
    }
}

        function triggerAI() {
            const key = localStorage.getItem('fuwako_ai_key');
            if (!key) document.getElementById('ai-modal').classList.remove('hidden');
            else startAIProcess();
        }

async function startAIProcess() {
    // 1. 获取 API Key
    const key = document.getElementById('cfg-ai-key').value || localStorage.getItem('fuwako_ai_key');
    if (!key) {
        document.getElementById('ai-modal').classList.remove('hidden');
        return;
    }
    localStorage.setItem('fuwako_ai_key', key);
    document.getElementById('ai-modal').classList.add('hidden');

    const item = lyricsData.find(l => l.id === currentId);
    const barWrap = document.getElementById('ai-progress-wrap');
    const bar = document.getElementById('ai-progress-bar');
    
    // 计算日语行数，用于精确进度条
    const jpLines = item.text.filter(l => /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(l));
    const totalLines = jpLines.length;

    barWrap.classList.remove('hidden');
    bar.style.width = '10%';

    try {
        // 使用 OpenRouter 接口地址
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { 
                "Authorization": `Bearer ${key}`, 
                "Content-Type": "application/json",
                "HTTP-Referer": window.location.origin, // OpenRouter 建议携带
                "X-Title": "Fuwako Web App"
            },
            body: JSON.stringify({
                model: "nvidia/nemotron-nano-9b-v2:free", // 切换为 Nemotron 模型
                messages: [{
                    role: "system",
                    content: `你是一个中国的专业的日语老师，请用中文回答不要包含英文。请解析我提供的日语歌词，并严格按照以下规则执行：
1. 任务：提供单句翻译和深度语法解析。
2. 语法点要求：包含每个单词的词性、原形、含义、变形状态、连接词作用及句式结构。
3. 语境要求：语法解析需结合歌词上下文，保持连贯。
4. 格式规范：
   - 必须仅输出一个纯 JSON 数组。
   - 严禁包含任何 Markdown 代码块标签（如 ```json）、换行符或说明文字。
   - 属性名和字符串必须使用双引号。
   - 严禁在“translation”和“grammar”的内容中使用双引号（可用单引号或括号代替），以防解析失败。
5. 异常处理：若输入非日语歌词，请仅返回 null。

示例格式（严格遵守）：
[{"translation": "这里的翻译不含双引号", "grammar": "单词(词性)+助词(用法)+句型解析"},null]`
                }, {
                    role: "user",
                    content: item.text.join('\n')
                }],
                stream: true // 必须开启流式传输，否则进度条会卡死
            })
        });

        if (!response.ok) throw new Error(`API 请求失败: ${response.status}`);

        // 浏览器端处理流式数据
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let fullText = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            
            for (const line of lines) {
                if (line.startsWith("data: ")) {
                    const dataStr = line.slice(6);
                    if (dataStr === "[DONE]") break;
                    try {
                        const json = JSON.parse(dataStr);
                        const content = json.choices[0]?.delta?.content || "";
                        fullText += content;

                        // 进度计算：每当检测到一个对象结束符 "}"，进度增加
                        const matches = fullText.match(/\}/g);
                        if (matches) {
                            const progress = Math.min(95, (matches.length / totalLines) * 100);
                            bar.style.width = `${progress}%`;
                        }
                    } catch (e) {
                        // 忽略流传输过程中的片段解析错误
                    }
                }
            }
        }

        // 最终清理并解析 JSON
        const finalJsonString = fullText.replace(/```json|```/g, '').trim();
        item.analysis = JSON.parse(finalJsonString);
        
        // 更新 UI 和存储
        bar.style.width = '100%';
        localStorage.setItem('fuwako_lyrics', JSON.stringify(lyricsData));
        pushToCloud(); // 静默同步
        
        setTimeout(() => { 
            barWrap.classList.add('hidden');
            showDetail(currentId); // 刷新详情页展示结果
        }, 800);

    } catch(e) {
        console.error("AI Analysis Error:", e);
        alert("解析出错啦，请检查 API Key 或稍后再试。");
        barWrap.classList.add('hidden');
    }
}
        // 基础功能
        function switchTab(tab) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-btn-active'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab === 'detail' ? 'lyrics' : tab}`).classList.add('tab-btn-active');
        }

        function toggleConfig() { document.getElementById('config-modal').classList.toggle('hidden'); }
        function getCfg() {
            return {
                token: localStorage.getItem('fuwako_github_token'),
                repo: 'Ancenchan/fuwako'
            };
        }
function saveConfig() {
    localStorage.setItem('fuwako_github_token', document.getElementById('cfg-token').value);
    // 删掉了对 repo 的 setItem
    document.getElementById('conn-status').classList.remove('hidden');
    setTimeout(toggleConfig, 800);
    loadLyrics();
}

function loadConfig() {
    document.getElementById('cfg-token').value = localStorage.getItem('fuwako_github_token') || '';
    // 删掉了对 cfg-repo 的赋值
}
        init();
    </script>
