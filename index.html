<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako 日语学园 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/kuromoji@0.1.2/build/kuromoji.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fuwari-pink: #ffb7c5;
            --fuwari-bg: #fff9fb;
            --fuwari-card-border: #ffeef1;
        }

        body {
            font-family: 'M PLUS Rounded 1c', 'Kosugi Maru', sans-serif;
            background-color: var(--fuwari-bg);
            color: #5a5a5a;
            overflow-x: hidden;
        }

        nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--fuwari-card-border);
        }

        .nav-btn {
            position: relative;
            font-weight: 700;
            color: #d1d1d1;
            transition: all 0.3s;
        }

        .nav-btn.active {
            color: var(--fuwari-pink);
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--fuwari-pink);
            border-radius: 10px;
        }

        .fuwari-card {
            background: white;
            border-radius: 24px;
            border: 2px solid var(--fuwari-card-border);
            box-shadow: 0 8px 0 #ffeef1;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .fuwari-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #ffeef1;
        }

        .line-wrapper {
            margin-bottom: 1.5rem;
            line-height: 2.4;
        }

        .jp-token {
            display: inline-block;
            padding: 2px 6px;
            margin: 0 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }

        .jp-token:hover, .jp-token.selected {
            background: #fff0f3;
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(255, 183, 197, 0.3);
        }

        .pos-助詞 { color: #ff8fa3; font-weight: bold; border-bottom: 2px dotted #ffb7c5; }
        .pos-動詞 { color: #5dade2; font-weight: bold; }
        .pos-名詞 { color: #5a5a5a; }
        .pos-形容詞 { color: #58d68d; font-weight: bold;}

        .other-lang-line {
            color: #a0a0a0;
            font-size: 0.95rem;
            font-style: italic;
            padding-left: 1rem;
            border-left: 3px solid #f0f0f0;
        }

        #loader-screen { background: var(--fuwari-bg); z-index: 9999; }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #ffeef1;
            border-top: 5px solid var(--fuwari-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .sidebar-sticky {
            position: sticky;
            top: 88px;
            height: calc(100vh - 120px);
            overflow-y: auto;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ffe4e9; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loader-screen" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="spinner"></div>
        <p class="mt-6 font-bold text-pink-300 animate-pulse">系统加载中，请稍候...</p>
    </div>

    <nav class="sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-4">
                <div class="text-2xl font-bold text-pink-400">🌸 Fuwako 学园</div>
                <button onclick="openConfigModal()" id="btn-config" class="text-xl text-gray-300 hover:text-pink-400 transition" title="配置云端密钥">
                    ⚙️
                </button>
            </div>
            <div class="flex gap-8">
                <button onclick="switchPage('wiki')" id="btn-wiki" class="nav-btn active">知识百科</button>
                <button onclick="switchPage('lib')" id="btn-lib" class="nav-btn">歌词书架</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <section id="page-wiki" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>

        <section id="page-lib" class="hidden">
            <div class="fuwari-card p-8 mb-8 relative">
                <div id="sync-status" class="absolute top-6 right-6 text-xs font-bold text-gray-300 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-gray-300" id="sync-dot"></span> 未连接云端
                </div>
                <h3 class="text-xl font-bold text-pink-400 mb-4">📝 添加新歌词</h3>
                <input type="text" id="input-title" placeholder="歌曲名称..." class="w-full p-4 rounded-2xl border-2 border-pink-50 outline-none focus:border-pink-200 mb-4 bg-gray-50/50">
                <textarea id="input-content" placeholder="粘贴文本 (中日罗马音混排会自动识别日文行)..." class="w-full h-40 p-4 rounded-2xl border-2 border-pink-50 outline-none focus:border-pink-200 bg-gray-50/50"></textarea>
                <button onclick="saveLyrics()" class="w-full mt-4 bg-pink-300 text-white font-bold py-4 rounded-2xl shadow hover:bg-pink-400 transition">存入书架 ☁️</button>
            </div>
            
            <div id="lyrics-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="page-detail" class="hidden">
            <button onclick="switchPage('lib')" class="mb-4 text-pink-300 font-bold px-2 hover:text-pink-400 transition">← 返回书架</button>
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="flex-1 fuwari-card p-6 md:p-10">
                    <h1 id="view-title" class="text-3xl font-bold text-center mb-8 text-gray-700 border-b-2 border-pink-50 pb-6"></h1>
                    <div id="view-body" class="text-lg text-gray-600"></div>
                </div>
                <div class="w-full lg:w-80 shrink-0">
                    <div class="fuwari-card p-6 sidebar-sticky flex flex-col bg-pink-50/30">
                        <h3 class="font-bold text-pink-400 mb-4 flex items-center gap-2"><span>📖</span> 单词解析</h3>
                        <div id="sidebar-content" class="flex-1"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="config-modal" class="fixed inset-0 bg-black/10 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[32px] max-w-sm w-full shadow-2xl border-4 border-pink-50">
            <h3 class="text-xl font-bold text-pink-400 mb-2">⚙️ 核心配置</h3>
            <p class="text-xs text-gray-400 mb-6">密钥仅保存在您的浏览器本地，不会上传。</p>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">GitHub Token (用于云端同步)</label>
                    <input type="password" id="cfg-github" placeholder="ghp_..." class="w-full p-3 rounded-xl border-2 border-pink-50 outline-none focus:border-pink-200 text-sm bg-gray-50/50">
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="saveConfig()" class="flex-1 bg-pink-300 text-white font-bold py-3 rounded-xl shadow hover:bg-pink-400 transition">保存并同步</button>
                <button onclick="closeConfigModal()" class="flex-1 bg-gray-100 text-gray-500 font-bold py-3 rounded-xl hover:bg-gray-200 transition">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 配置与变量 =================
        const REPO_OWNER = "ancenchan";
        const REPO_NAME = "fuwako";
        const FILE_PATH = "lyrics_data.json";

        // 从本地存储读取密钥
        let GITHUB_TOKEN = localStorage.getItem('fuwako_github') || "";
        let GEMINI_KEY ="AIzaSyC3vAqGTuOmHUe1UDFbHXA4uf4Ij0ZeJbs";
        
        let tokenizer = null;
        let library = JSON.parse(localStorage.getItem('fuwari_lib') || '[]');

        const JP_DATA = [
            { title: "人称代词", icon: "🌸", content: [
                {k: "第一人称", v: "私 (普) / 僕 (男) / 俺 (糙) / あたし (娇)"},
                {k: "第二人称", v: "あなた (礼) / 君 (亲) / お前 (强)"},
                {k: "第三人称", v: "彼 (他) / 彼女 (她) / あいつ (那家伙)"},
                {k: "复数", v: "～たち (们) / ～ら (等)"}
            ]},
            { title: "核心格助词", icon: "📍", content: [
                {k: "は/が", v: "提示主题 / 强调主语"},
                {k: "を", v: "动作的目的物（吃/看/做）"},
                {k: "に", v: "时间、地点、终点、对象"},
                {k: "で", v: "动作地、工具、方式、原因"},
                {k: "と", v: "和、引用内容"},
                {k: "から/まで", v: "起点 / 终点"}
            ]},
            { title: "动词活用", icon: "🌀", content: [
                {k: "ます形", v: "敬体/礼貌形式"},
                {k: "て形", v: "中顿、状态、正在进行"},
                {k: "た形", v: "过去时、动作完成"},
                {k: "ない形", v: "否定式、不..."},
                {k: "辞書形", v: "原形/肯定将来时"},
                {k: "意向形", v: "想要、建议、一起吧"},
                {k: "可能形", v: "能、会、可以"},
                {k: "使役/被动", v: "让某人做 / 被迫做"}
            ]},
            { title: "授受关系", icon: "🎁", content: [
                {k: "あげる", v: "我/己方 给 别人"},
                {k: "くれる", v: "别人 给 我/己方"},
                {k: "もらう", v: "我 从别人处 得到"},
                {k: "～てあげる", v: "主动为他人做某事"},
                {k: "～てくれる", v: "感激他人为我做"}
            ]},
            { title: "敬语体系", icon: "🙇", content: [
                {k: "尊敬语", v: "抬高对方 (いらっしゃる)"},
                {k: "谦让语", v: "贬低自己 (参る)"},
                {k: "郑重语", v: "礼貌用语 (です/ます)"},
                {k: "美化语", v: "名词加 お/ご (お茶)"}
            ]},
            { title: "疑问与细节", icon: "❓", content: [
                {k: "人/物", v: "だれ / なに"},
                {k: "地点/时间", v: "どこ / いつ"},
                {k: "促音 (っ)", v: "顿一下，占一拍"},
                {k: "长音 (ー)", v: "拖长一拍"},
                {k: "拗音", v: "辅音+ゃ/ゅ/ょ"}
            ]}
        ];

        // ================= 初始化 =================
        kuromoji.builder({ dicPath: "./dict/" }).build(async (err, _tokenizer) => {
            if (err) {
                document.getElementById('loader-screen').innerHTML = `<p class="text-red-400">字典加载失败</p>`;
                return;
            }
            tokenizer = _tokenizer;
            renderWiki();
            updateConfigUI();
            
            if(GITHUB_TOKEN) {
                await forceSyncFlow(); // 如果有Token，初始化时自动拉取并合并
            } else {
                renderLibrary(); // 没有Token只显示本地
            }
            
            document.getElementById('loader-screen').classList.add('hidden');
        });

        // ================= 密钥管理UI =================
        function openConfigModal() {
            document.getElementById('cfg-github').value = GITHUB_TOKEN;
            document.getElementById('cfg-gemini').value = GEMINI_KEY;
            document.getElementById('config-modal').classList.remove('hidden');
        }

        function closeConfigModal() {
            document.getElementById('config-modal').classList.add('hidden');
        }

        async function saveConfig() {
            GITHUB_TOKEN = document.getElementById('cfg-github').value.trim();
            GEMINI_KEY = document.getElementById('cfg-gemini').value.trim();
            
            localStorage.setItem('fuwako_github', GITHUB_TOKEN);
            localStorage.setItem('fuwako_gemini', GEMINI_KEY);
            
            closeConfigModal();
            updateConfigUI();

            if (GITHUB_TOKEN) {
                const btn = document.getElementById('btn-config');
                btn.innerHTML = "⏳";
                await forceSyncFlow();
                btn.innerHTML = "⚙️";
            }
        }

        function updateConfigUI() {
            const btn = document.getElementById('btn-config');
            const statusText = document.getElementById('sync-status');
            const statusDot = document.getElementById('sync-dot');

            if (GITHUB_TOKEN) {
                btn.classList.replace('text-gray-300', 'text-pink-400');
                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> 云端已连接`;
            } else {
                btn.classList.replace('text-pink-400', 'text-gray-300');
                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-gray-300"></span> 未连接云端`;
            }
        }

        // ================= 云同步核心逻辑 =================
        // 强制全量合并与同步流
        async function forceSyncFlow() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            let sha = "";
            let remoteLibrary = [];

            // 1. 获取远程数据
            try {
                const getRes = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                    remoteLibrary = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch (err) {
                console.log("云端文件不存在或获取失败，将创建新文件");
            }

            // 2. 合并本地和远程数据 (通过 ID 去重)
            const map = new Map();
            remoteLibrary.forEach(item => map.set(item.id || item.title, item));
            library.forEach(item => {
                if(!map.has(item.id || item.title)) map.set(item.id || item.title, item);
            });
            library = Array.from(map.values()).sort((a,b) => b.id - a.id); // 最新的在前面

            // 3. 渲染并存入本地
            localStorage.setItem('fuwari_lib', JSON.stringify(library));
            renderLibrary();

            // 4. 将合并后的全量数据推回 GitHub
            await pushToGitHub(sha);
        }

        // 仅推送到云端 (新增时调用)
        async function pushToGitHub(knownSha = "") {
            if(!GITHUB_TOKEN) return;
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            
            try {
                let sha = knownSha;
                if (!sha) {
                    const getRes = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
                    if (getRes.ok) sha = (await getRes.json()).sha;
                }

                const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(library, null, 2))));
                await fetch(url, {
                    method: 'PUT',
                    headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "Auto-sync lyrics via Fuwako", content: contentBase64, sha: sha })
                });
                console.log("云端同步完成");
            } catch (err) {
                console.error("云推送失败:", err);
            }
        }

        // ================= 页面路由与渲染 =================
        function switchPage(page) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const activeNav = document.getElementById(`btn-${page === 'detail' ? 'lib' : page}`);
            if(activeNav) activeNav.classList.add('active');
        }

        function renderWiki() {
            const container = document.getElementById('page-wiki');
            container.innerHTML = JP_DATA.map(box => `
                <div class="fuwari-card p-6">
                    <div class="flex items-center gap-3 mb-4 border-b-2 border-pink-50 pb-3">
                        <span class="text-2xl">${box.icon}</span>
                        <h3 class="font-bold text-pink-400 text-lg">${box.title}</h3>
                    </div>
                    <div class="space-y-3">
                        ${box.content.map(item => `
                            <div class="flex text-sm">
                                <span class="w-24 shrink-0 font-bold text-pink-300">${item.k}</span>
                                <span class="text-gray-500">${item.v}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function saveLyrics() {
            const title = document.getElementById('input-title').value || "无题文本";
            const content = document.getElementById('input-content').value;
            if(!content.trim()) return alert("请输入内容~");

            // 插入到开头
            library.unshift({ title, content, id: Date.now() });
            localStorage.setItem('fuwari_lib', JSON.stringify(library));
            renderLibrary();
            
            document.getElementById('input-title').value = "";
            document.getElementById('input-content').value = "";
            
            // 静默同步到云端
            pushToGitHub();
        }

        function renderLibrary() {
            const container = document.getElementById('lyrics-container');
            container.innerHTML = library.map((item, index) => `
                <div class="fuwari-card p-6 cursor-pointer flex flex-col h-32" onclick="viewDetail(${index})">
                    <h4 class="font-bold text-gray-700 mb-2 truncate">${item.title}</h4>
                    <p class="text-xs text-gray-400 line-clamp-3 leading-relaxed flex-1">${item.content}</p>
                </div>
            `).join('');
        }

        function viewDetail(idx) {
            const item = library[idx];
            document.getElementById('view-title').innerText = item.title;
            const body = document.getElementById('view-body');
            
            document.getElementById('sidebar-content').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-gray-400 text-sm opacity-60 mt-20">
                    <span class="text-4xl mb-3">✨</span>
                    <p>点击左侧的日文单词</p>
                    <p>这里会显示详细释义哦</p>
                </div>
            `;
            switchPage('detail');

            setTimeout(() => {
                const lines = item.content.split('\n');
                body.innerHTML = lines.map(line => {
                    const isJp = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/.test(line);
                    if (isJp && tokenizer) {
                        const tokens = tokenizer.tokenize(line);
                        return `<div class="line-wrapper">${tokens.map(t => `<span class="jp-token pos-${t.pos}" onclick="showWord(this, '${t.surface_form}', '${t.reading}', '${t.pos}')">${t.surface_form}</span>`).join('')}</div>`;
                    } else {
                        return `<div class="line-wrapper other-lang-line">${line}</div>`;
                    }
                }).join('');
            }, 100);
        }

        // ================= 侧边栏释义 (Gemini) =================
        async function showWord(element, word, reading, pos) {
            document.querySelectorAll('.jp-token').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            const sidebar = document.getElementById('sidebar-content');
            
            sidebar.innerHTML = `
                <div class="mb-6">
                    <h2 class="text-3xl font-bold text-pink-400 mb-1">${word}</h2>
                    <p class="text-gray-400 text-sm mb-3">【${reading || '---'}】</p>
                    <span class="inline-block px-3 py-1 bg-white rounded-full text-xs text-pink-300 font-bold border border-pink-100">
                        词性: ${pos}
                    </span>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-pink-50 min-h-[150px]">
                    ${!GEMINI_KEY ? `<p class="text-xs text-red-300">请先在左上角 ⚙️ 中配置 Gemini API Key 哦~</p>` : `
                    <div id="ai-loading" class="flex flex-col items-center justify-center py-6">
                        <div class="w-6 h-6 border-4 border-pink-50 border-t-pink-300 rounded-full animate-spin"></div>
                        <p class="text-xs text-pink-300 mt-3 font-bold">思考中...</p>
                    </div>
                    <div id="ai-response" class="text-sm text-gray-600 leading-loose hidden"></div>
                    `}
                </div>
            `;

            if(!GEMINI_KEY) return;

            try {
                const prompt = `你是一位温柔的日语助手。请为词汇“${word}”（词性：${pos}）提供：1. 简明的中文含义。2. 一个二次元/动漫语境的简短日文例句及翻译。不需要太多客套话，排版整洁。`;
                const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`;

                const response = await fetch(MODEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const result = data.candidates[0].content.parts[0].text;
                
                document.getElementById('ai-loading').classList.add('hidden');
                const respDiv = document.getElementById('ai-response');
                respDiv.innerHTML = result.replace(/\n/g, '<br>');
                respDiv.classList.remove('hidden');

            } catch (error) {
                document.getElementById('ai-loading').classList.add('hidden');
                const respDiv = document.getElementById('ai-response');
                respDiv.innerHTML = `<span class="text-red-400 text-xs">呜咕... 查词失败了<br>${error.message}</span>`;
                respDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
