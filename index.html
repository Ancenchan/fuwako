<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 日语学习驱动器</title>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <style>
        :root {
            --primary: #ffb7b2;
            --bg-color: #fce4ec;
            --text-main: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* 可替换为你的可爱背景图 */
            color: var(--text-main);
            overflow: hidden;
        }

        /* Fuwari 毛玻璃风格 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* 全局加载遮罩 */
        #loading-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #fff; 
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 顶部导航与进度条 */
        #ai-progress-bar {
            position: fixed; top: 0; left: 0; height: 4px; background: #a2c2e6;
            width: 0%; transition: width 0.3s; z-index: 1000;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; position: relative; z-index: 10;
        }
        .tabs button {
            background: transparent; border: none; font-size: 1.2rem;
            margin-right: 20px; cursor: pointer; color: #888; transition: 0.3s;
        }
        .tabs button.active { color: var(--primary); font-weight: bold; border-bottom: 2px solid var(--primary); }
        #settings-btn { width: 40px; height: 40px; cursor: pointer; border-radius: 50%; transition: transform 0.3s; }
        #settings-btn:hover { transform: rotate(15deg) scale(1.1); }

        /* 布局 */
        .container { padding: 20px; height: calc(100vh - 100px); overflow-y: auto; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; }

        /* 语法模块 */
        .grammar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .grammar-card { padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .grammar-card:hover { transform: translateY(-5px); }

        /* 歌词模块：书架与详情页 */
        #lyrics-bookshelf { display: flex; flex-direction: column; gap: 15px; }
        #lyrics-detail { display: flex; gap: 20px; height: 100%; display: none; }
        .lyrics-list { flex: 2; overflow-y: auto; padding: 20px; line-height: 2.5; font-size: 1.2rem; }
        .sidebar { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* 词性高亮 CSS */
        .pos-名词 { color: #2c3e50; }
        .pos-動詞 { color: #e74c3c; font-weight: bold; cursor: pointer;}
        .pos-形容詞 { color: #2980b9; cursor: pointer;}
        .pos-助詞 { color: #27ae60; font-size: 0.9em; }
        .pos-副詞 { color: #8e44ad; }
        .token { margin: 0 2px; border-bottom: 1px dashed transparent; transition: 0.2s; }
        .token:hover { border-bottom: 1px dashed var(--primary); }

        .lyric-line { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 5px 0; }
        .explain-btn { font-size: 0.8rem; padding: 4px 8px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; }

        /* 模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { width: 300px; padding: 20px; text-align: center; }
        .modal-content input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .modal-content button { background: var(--primary); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading-mask">
    <div class="spinner"></div>
    <h3 style="color: #666; margin-top: 20px;">Fuwako 引擎启动中...<br><span style="font-size: 0.8em">正在加载 Kuromoji 字典与本地词库</span></h3>
</div>

<div id="ai-progress-bar"></div>

<header>
    <div class="tabs">
        <button class="active" onclick="switchTab('grammar')">语法模块</button>
        <button onclick="switchTab('lyrics')">歌词模块</button>
    </div>
    <img src="7.png" id="settings-btn" alt="Settings" onclick="openSettings()" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><circle cx=\'50\' cy=\'50\' r=\'40\' fill=\'#ffb7b2\'/></svg>'">
</header>

<div class="container">
    <div id="grammar" class="tab-content active">
        <div class="grammar-grid">
            <div class="glass-panel grammar-card">
                <h3>动词变形 (Te形)</h3>
                <p>食べて、飲んで、して...</p>
            </div>
            <div class="glass-panel grammar-card">
                <h3>假定形 (Ba形)</h3>
                <p>食べれば、飲めば...</p>
            </div>
            <div class="glass-panel grammar-card">
                <h3>授受动词</h3>
                <p>あげる、もらう、くれる</p>
            </div>
        </div>
    </div>

    <div id="lyrics" class="tab-content">
        <div id="lyrics-bookshelf">
            <div class="glass-panel" style="padding: 20px;">
                <input type="file" id="upload-lyrics" accept=".txt" style="display: none;" onchange="handleFileUpload(event)">
                <button onclick="document.getElementById('upload-lyrics').click()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer;">上传歌词 (.txt)</button>
                <button onclick="syncLyrics()" style="padding: 10px 20px; background: #a2c2e6; color: white; border: none; border-radius: 10px; cursor: pointer; margin-left: 10px;">从云端同步同步</button>
            </div>
            <div id="bookshelf-list" class="grammar-grid">
                </div>
        </div>

        <div id="lyrics-detail">
            <button onclick="backToBookshelf()" style="position: absolute; top: 80px; left: 30px; background: #ddd; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">返回书架</button>
            <div class="glass-panel lyrics-list" id="lyric-lines-container" style="margin-top: 30px;">
                </div>
            <div class="glass-panel sidebar" id="right-sidebar">
                <h3 style="margin-top: 0;">词典/AI 解析</h3>
                <div id="sidebar-content" style="font-size: 0.95rem; line-height: 1.6; color: #555;">
                    点击左侧歌词单词查看词义，或点击“讲解”获取 AI 语法分析。
                </div>
            </div>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="glass-panel modal-content">
        <h3>系统设置</h3>
        <input type="text" id="github-token" placeholder="输入 GitHub Token (Repo权限)">
        <input type="text" id="ai-key" placeholder="输入 SiliconFlow API Key">
        <br>
        <button onclick="saveSettings()">保存</button>
        <button onclick="closeModal('settings-modal')" style="background: #ccc;">取消</button>
    </div>
</div>

<script>
    /* ================= 核心状态与配置 ================= */
    const REPO = 'Ancenchan/fuwako';
    let tokenizer = null;
    let localDict = {};
    let isAIFetching = false; // 防止重复触发AI
    let currentLyricsId = null; 

    // Base64 编码解码支持中文
    const utoa = (str) => btoa(unescape(encodeURIComponent(str)));
    const atou = (str) => decodeURIComponent(escape(atob(str)));

    /* ================= 初始化与加载 ================= */
    window.onload = async () => {
        // 1. 加载本地词典 mock (需保证仓库有 dict.json)
        try {
            const dictRes = await fetch('dict.json');
            if (dictRes.ok) localDict = await dictRes.json();
            else console.warn("未找到 dict.json，本地词库将为空。");
        } catch (e) { console.warn("本地词库加载失败"); }

        // 2. 加载 Kuromoji 分词器
        kuromoji.builder({ dicPath: "dict/" }).build(function (err, _tokenizer) {
            if (err) {
                alert("Kuromoji 加载失败，请确保 dict 文件夹在根目录！");
                console.error(err);
                return;
            }
            tokenizer = _tokenizer;
            document.getElementById('loading-mask').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-mask').style.display = 'none', 500);
            renderBookshelf();
        });
    };

    /* ================= UI 交互 ================= */
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function openSettings() {
        document.getElementById('github-token').value = localStorage.getItem('gh_token') || '';
        document.getElementById('ai-key').value = localStorage.getItem('ai_key') || '';
        document.getElementById('settings-modal').style.display = 'flex';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function saveSettings() {
        localStorage.setItem('gh_token', document.getElementById('github-token').value.trim());
        localStorage.setItem('ai_key', document.getElementById('ai-key').value.trim());
        closeModal('settings-modal');
        alert('设置已保存！');
    }
    function backToBookshelf() {
        document.getElementById('lyrics-detail').style.display = 'none';
        document.getElementById('lyrics-bookshelf').style.display = 'flex';
    }

    /* ================= GitHub API 工具 ================= */
    async function ghFetch(path, method = 'GET', body = null) {
        const token = localStorage.getItem('gh_token');
        if (!token) throw new Error('No Token');
        const headers = {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, options);
        if (!res.ok && res.status !== 404) throw new Error(`GitHub API Error: ${res.status}`);
        return res;
    }

    /* ================= 歌词同步与上传逻辑 ================= */
    async function syncLyrics() {
        if (!localStorage.getItem('gh_token')) return alert("请先在右上角设置 GitHub Token!");
        try {
            const res = await ghFetch('lyrics_data.json');
            if (res.status === 404) { alert("云端暂无数据"); return; }
            
            const data = await res.json();
            const cloudLyrics = JSON.parse(atou(data.content));
            let local = JSON.parse(localStorage.getItem('fuwako_lyrics') || '[]');
            
            // 按 timestamp 合并去重
            const mergedMap = new Map();
            local.forEach(l => mergedMap.set(l.id, l));
            cloudLyrics.forEach(l => {
                if (!mergedMap.has(l.id) || mergedMap.get(l.id).timestamp < l.timestamp) {
                    mergedMap.set(l.id, l);
                }
            });
            const mergedList = Array.from(mergedMap.values());
            localStorage.setItem('fuwako_lyrics', JSON.stringify(mergedList));
            renderBookshelf();
            alert("拉取同步成功！");
        } catch (e) {
            console.error(e);
            alert("同步失败: " + e.message);
        }
    }

    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            const newLyric = {
                id: 'lyric_' + Date.now(),
                title: file.name.replace('.txt', ''),
                content: content,
                timestamp: Date.now()
            };
            
            // 1. 更新本地 UI
            let local = JSON.parse(localStorage.getItem('fuwako_lyrics') || '[]');
            local.push(newLyric);
            localStorage.setItem('fuwako_lyrics', JSON.stringify(local));
            renderBookshelf();

            // 2. 静默推送至云端
            try {
                if (!localStorage.getItem('gh_token')) return; // 无token则不云端备份
                let sha = null;
                const getRes = await ghFetch('lyrics_data.json');
                if (getRes.status === 200) {
                    const data = await getRes.json();
                    sha = data.sha;
                }
                const body = {
                    message: `Auto upload ${newLyric.title}`,
                    content: utoa(JSON.stringify(local, null, 2))
                };
                if (sha) body.sha = sha;
                await ghFetch('lyrics_data.json', 'PUT', body);
                console.log("云端静默推送成功");
            } catch (err) {
                console.error("云端推送失败", err);
            }
        };
        reader.readAsText(file);
    }

    function renderBookshelf() {
        const list = JSON.parse(localStorage.getItem('fuwako_lyrics') || '[]');
        const container = document.getElementById('bookshelf-list');
        container.innerHTML = '';
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'glass-panel grammar-card';
            div.innerHTML = `<h3>${item.title}</h3>`;
            div.onclick = () => openLyricDetail(item);
            container.appendChild(div);
        });
    }

    /* ================= 详情页与分词逻辑 ================= */
    function openLyricDetail(lyricObj) {
        currentLyricsId = lyricObj.id;
        document.getElementById('lyrics-bookshelf').style.display = 'none';
        document.getElementById('lyrics-detail').style.display = 'flex';
        
        const container = document.getElementById('lyric-lines-container');
        container.innerHTML = `<h2>${lyricObj.title}</h2>`;
        
        const lines = lyricObj.content.split('\n').filter(l => l.trim() !== '');
        
        lines.forEach((line, index) => {
            const tokens = tokenizer.tokenize(line);
            const lineDiv = document.createElement('div');
            lineDiv.className = 'lyric-line';
            
            // 渲染分词与词性颜色
            let htmlStr = `<div class="text-content">`;
            tokens.forEach(t => {
                const posClass = `pos-${t.pos}`;
                htmlStr += `<span class="token ${posClass}" onclick="lookupWord('${t.surface_form}', '${t.basic_form}')">${t.surface_form}</span>`;
            });
            htmlStr += `</div>`;
            
            // 讲解按钮，传入完整的 lines 数组，供全量 AI 解析时使用
            htmlStr += `<button class="explain-btn" onclick="handleExplain(${index}, ${encodeURIComponent(JSON.stringify(lines))})">讲解</button>`;
            
            lineDiv.innerHTML = htmlStr;
            container.appendChild(lineDiv);
        });
        document.getElementById('sidebar-content').innerHTML = "点击左侧歌词单词查看词义，或点击“讲解”获取 AI 语法分析。";
    }

    function lookupWord(surface, basic) {
        // 无网络请求，直接读内存本地词典
        const word = (basic && basic !== '*') ? basic : surface;
        const definition = localDict[word] || localDict[surface] || "本地词库未收录此词，可以尝试点击右侧 AI 讲解。";
        document.getElementById('sidebar-content').innerHTML = `
            <div class="glass-panel" style="padding:15px; background: var(--bg-color);">
                <h2 style="margin:0 0 10px 0; color: var(--primary);">${surface}</h2>
                <p><strong>原形:</strong> ${word}</p>
                <p><strong>释义:</strong> ${definition}</p>
            </div>
        `;
    }

    /* ================= AI 全量请求与缓存逻辑 ================= */
    async function handleExplain(lineIndex, encodedLines) {
        const lines = JSON.parse(decodeURIComponent(encodedLines));
        const aiKey = localStorage.getItem('ai_key');
        if (!aiKey) {
            alert("请先在右上角设置中输入 SiliconFlow API Key！");
            openSettings();
            return;
        }

        const fileName = `${currentLyricsId}_explain.json`;
        
        // 尝试从 GitHub 读取缓存
        let explanations = [];
        try {
            document.getElementById('sidebar-content').innerHTML = "正在检查云端解析缓存...";
            const res = await ghFetch(fileName);
            if (res.status === 200) {
                const data = await res.json();
                explanations = JSON.parse(atou(data.content));
                showAiExplanation(explanations, lineIndex);
                return; // 直接命中缓存
            }
        } catch (e) {
            console.log("未找到缓存或未配置 Token，准备触发 AI 生成。");
        }

        // 避免重复触发
        if (isAIFetching) {
            document.getElementById('sidebar-content').innerHTML = "AI 正在努力解析整首歌词，请稍候再点哦~ (Progress bar runing)";
            return;
        }

        // 触发全量 AI 请求
        isAIFetching = true;
        document.getElementById('sidebar-content').innerHTML = "初次解析中...正在调用硅基流动全量翻译与语法分析，稍等片刻...";
        document.getElementById('ai-progress-bar').style.width = '50%';

        const fullText = lines.join('\n');
        const prompt = `你是一个专业的日语教师。请针对以下日语歌词，提供逐行的中文翻译和语法点解析（包含单词原形、变形、句型等）。
        语言必须极其简洁，没有多余的客套话。
        必须严格返回 JSON 数组格式，数组的长度和歌词行数完全一致。
        格式示例：[{"t": "翻译内容", "e": "语法点内容"}, ...]
        歌词如下：\n${fullText}`;

        try {
            const aiRes = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiKey}` },
                body: JSON.stringify({
                    model: "deepseek-ai/DeepSeek-V2.5", // 或替换为其他模型
                    messages: [{"role": "user", "content": prompt}],
                    response_format: { type: "json_object" } // 强制部分模型返回 JSON，虽然数组可能需要手动清洗
                })
            });

            const aiData = await aiRes.json();
            let aiText = aiData.choices[0].message.content.trim();
            // 简单清洗 markdown JSON 包裹
            if(aiText.startsWith('```json')) aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
            
            explanations = JSON.parse(aiText);
            document.getElementById('ai-progress-bar').style.width = '100%';
            setTimeout(() => document.getElementById('ai-progress-bar').style.width = '0%', 1000);

            // 静默保存到 GitHub 缓存
            if (localStorage.getItem('gh_token')) {
                await ghFetch(fileName, 'PUT', {
                    message: `AI Explanations for ${currentLyricsId}`,
                    content: utoa(JSON.stringify(explanations, null, 2))
                }).catch(e => console.error("保存AI缓存失败", e));
            }

            isAIFetching = false;
            showAiExplanation(explanations, lineIndex);

        } catch (e) {
            console.error(e);
            document.getElementById('ai-progress-bar').style.width = '0%';
            document.getElementById('sidebar-content').innerHTML = `<span style="color:red">AI 请求解析失败: ${e.message}</span>`;
            isAIFetching = false;
        }
    }

    function showAiExplanation(explanations, lineIndex) {
        const item = explanations[lineIndex];
        if (!item) {
             document.getElementById('sidebar-content').innerHTML = "这一行好像没有得到解析。";
             return;
        }
        document.getElementById('sidebar-content').innerHTML = `
            <div class="glass-panel" style="padding:15px; background: rgba(255,255,255,0.8); border-left: 5px solid var(--primary);">
                <h3 style="margin-top:0;">行解析</h3>
                <p><strong>[翻译]</strong> <br> ${item.t}</p>
                <div style="height: 1px; background: #ddd; margin: 10px 0;"></div>
                <p style="white-space: pre-wrap; font-size: 0.9em;"><strong>[语法与单词]</strong> <br> ${item.e}</p>
            </div>
        `;
    }
</script>

</body>
</html>
