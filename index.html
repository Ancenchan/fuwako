<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako - 软绵绵日语学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        macaron: {
                            pink: '#FFD1DC',
                            blue: '#AEC6CF',
                            green: '#77DD77',
                            yellow: '#FDFD96',
                            purple: '#B39EB5'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Fuwari 风格：毛玻璃、高透明度、圆润边角 */
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }

        .fuwari-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .fuwari-card {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .fuwari-card:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        /* 词性高亮样式 */
        .pos-verb { color: #FF9AA2; font-weight: 500; cursor: pointer; } /* 动词-粉色 */
        .pos-particle { color: #AEC6CF; font-weight: 500; cursor: pointer; } /* 助词-蓝色 */
        .pos-noun { color: #B39EB5; cursor: pointer; } /* 名词-紫色 */
        .pos-adjective { color: #FDFD96; text-shadow: 0 0 1px #ccc; cursor: pointer; } /* 形容词-黄色 */
        .pos-unknown { color: #555; cursor: pointer; }

        /* 隐藏滚动条但保持可滚动 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loading 遮罩过渡 */
        #loading-mask {
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="loading-mask" class="fixed inset-0 z-50 flex flex-col items-center justify-center fuwari-glass bg-white/70">
        <div class="text-4xl animate-bounce mb-4">☁️</div>
        <h2 class="text-2xl font-bold text-gray-700 mb-2">Fuwako 加载中...</h2>
        <div class="text-gray-500" id="loading-text">准备初始化 (0%)</div>
    </div>

    <header class="fixed top-0 w-full z-40 p-4">
        <div class="max-w-6xl mx-auto fuwari-glass flex justify-between items-center px-6 py-3">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🌸</span>
                <h1 class="text-xl font-bold tracking-wider text-gray-700">Fuwako</h1>
            </div>
            
            <div class="flex gap-4">
                <button onclick="switchTab('grammar')" id="tab-grammar" class="px-4 py-2 rounded-full font-medium transition-colors bg-white/60 shadow-sm text-gray-800">Grammar</button>
                <button onclick="switchTab('lyrics')" id="tab-lyrics" class="px-4 py-2 rounded-full font-medium transition-colors hover:bg-white/60 text-gray-500">Lyrics</button>
            </div>

            <button onclick="toggleSettings()" class="w-10 h-10 rounded-full overflow-hidden fuwari-card border-2 border-white">
                <img src="7.png" alt="Settings" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=GH&background=random'">
            </button>
        </div>
    </header>

    <main class="pt-28 pb-12 px-4 max-w-6xl mx-auto min-h-screen flex gap-6">
        
        <div class="flex-1 transition-all">
            
            <div id="view-grammar" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="fuwari-glass fuwari-card p-6 text-center text-gray-500">
                    数据加载中... (读取 grammar.json)
                </div>
            </div>

            <div id="view-lyrics" class="hidden flex-col gap-6">
                <div id="lyrics-bookshelf" class="w-full">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-700">📚 我的歌词库</h2>
                        <button onclick="triggerUpload()" class="fuwari-glass px-6 py-2 rounded-full hover:bg-white/80 font-bold text-macaron-green transition-colors">
                            + 上传歌词
                        </button>
                        <input type="file" id="lyric-upload" class="hidden" accept=".txt,.json">
                    </div>
                    <div id="bookshelf-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>

                <div id="lyrics-reader" class="hidden w-full flex flex-col gap-4">
                    <div class="flex justify-between items-center bg-white/30 p-4 rounded-2xl">
                        <button onclick="backToBookshelf()" class="text-gray-500 hover:text-gray-800">← 返回</button>
                        <h2 id="reader-title" class="font-bold text-lg">歌词标题</h2>
                        <button onclick="analyzeFullLyrics()" class="fuwari-glass px-4 py-2 rounded-full text-macaron-blue text-sm font-bold hover:bg-white/80">
                            ✨ AI 语法讲解
                        </button>
                    </div>
                    
                    <div id="ai-progress-container" class="hidden w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="ai-progress-bar" class="h-full bg-macaron-blue transition-all duration-300" style="width: 0%"></div>
                    </div>

                    <div id="reader-content" class="fuwari-glass p-8 text-lg leading-loose min-h-[60vh] whitespace-pre-wrap font-serif">
                        </div>
                </div>
            </div>
        </div>

        <div id="sidebar" class="hidden w-80 fuwari-glass p-6 sticky top-28 h-[calc(100vh-8rem)] overflow-y-auto no-scrollbar flex-col gap-4">
            <h3 class="text-xl font-bold text-gray-700 border-b border-gray-200 pb-2">解析面板</h3>
            
            <div id="sidebar-" class="bg-white/50 p-4 rounded-xl">
                <p class="text-sm text-gray-400">点击左侧高亮单词查看释义</p>
                <div id="-content" class="mt-2 hidden">
                    <h4 id="-word" class="font-bold text-lg text-macaron-pink"></h4>
                    <p id="dict-meaning" class="text-gray-700 mt-1"></p>
                </div>
            </div>

            <div id="sidebar-ai" class="bg-white/50 p-4 rounded-xl hidden">
                <h4 class="font-bold text-macaron-blue mb-2">AI 句意解析</h4>
                <div id="ai-explanation" class="text-sm text-gray-700 space-y-2">
                    </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm">
        <div class="fuwari-glass bg-white/90 p-8 w-96 flex flex-col gap-4">
            <h2 class="text-xl font-bold">配置 Token</h2>
            <p class="text-xs text-gray-500">请输入具有 repo 权限的 GitHub Token 以同步数据。</p>
            <input type="password" id="gh-token-input" placeholder="ghp_xxxxxxxxxxxx" class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:border-macaron-blue bg-white/50">
            
            <p class="text-xs text-gray-500 mt-2">硅基流动 API Key (用于 AI 解析)</p>
            <input type="password" id="ai-token-input" placeholder="sk-xxxxxxxxxxxx" class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:border-macaron-purple bg-white/50">
            
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="toggleSettings()" class="px-4 py-2 rounded-xl text-gray-500 hover:bg-gray-100">取消</button>
                <button onclick="saveTokens()" class="px-4 py-2 rounded-xl bg-gray-800 text-white hover:bg-gray-700">保存</button>
            </div>
        </div>
    </div>

    <script>
        /* ================= App 状态与配置 ================= */
        const APP_CONFIG = {
            repoOwner: 'Ancenchan', // 请修改为你的 GitHub 用户名
            repoName: 'fuwako',    // 请修改为你的仓库名
            dictPath: 'dict',     // Kuromoji 字典路径
            aiEndpoint: 'https://api.siliconflow.cn/v1/chat/completions',
            aiModel: 'Qwen/Qwen2.5-7B-Instruct' // 根据硅基流动支持的模型修改
        };

        const state = {
            currentTab: 'grammar',
            tokenizer: null,
            lyricsData: [],
            localDict: {},
            grammarData: [],
            currentReadingId: null,
            aiCache: {} // 缓存当前解析
        };

        /* ================= 初始化与加载逻辑 ================= */
        document.addEventListener('DOMContentLoaded', async () => {
            updateLoadingStatus('正在加载分词引擎...', 20);
            
            // 1. 异步加载 Kuromoji
            try {
                await new Promise((resolve, reject) => {
                    kuromoji.builder({ dicPath: APP_CONFIG.dictPath }).build((err, tokenizer) => {
                        if (err) {
                            console.warn("Kuromoji 加载失败(可能路径不对), 继续运行...", err);
                            resolve(); // 容错处理
                        } else {
                            state.tokenizer = tokenizer;
                            resolve();
                        }
                    });
                });
            } catch (e) { console.error(e); }

            updateLoadingStatus('正在同步本地数据...', 60);

            // 2. 加载本地基础数据 (mock)
            await loadInitialData();

            // 3. 同步 GitHub 数据
            updateLoadingStatus('正在拉取云端存档...', 80);
            await syncLyricsData();

            // 完成加载
            updateLoadingStatus('加载完成!', 100);
            setTimeout(() => {
                const mask = document.getElementById('loading-mask');
                mask.style.opacity = '0';
                mask.style.pointerEvents = 'none'; // 关键：取消指针事件防止遮挡按钮
            }, 500);

            // 初始渲染
            renderGrammar();
            renderBookshelf();
        });

        function updateLoadingStatus(text, percent) {
            document.getElementById('loading-text').innerText = `${text} (${percent}%)`;
        }

        async function loadInitialData() {
            // 尝试加载 dict.json 和 grammar.json (此处做容错，若没有文件则用空数据)
            try {
                const dictRes = await fetch('dict.json');
                if (dictRes.ok) state.localDict = await dictRes.json();
            } catch(e) { console.log('dict.json 未找到，使用空词典'); }

            try {
                const gramRes = await fetch('grammar.json');
                if (gramRes.ok) state.grammarData = await gramRes.json();
                else state.grammarData = [{title: "示例语法", desc: "这是一个占位语法。请在根目录创建 grammar.json"}];
            } catch(e) { console.log('grammar.json 未找到'); }
        }

        /* ================= UI 交互控制 ================= */
        function switchTab(tabId) {
            state.currentTab = tabId;
            document.getElementById('view-grammar').style.display = tabId === 'grammar' ? 'grid' : 'none';
            document.getElementById('view-lyrics').style.display = tabId === 'lyrics' ? 'flex' : 'none';
            
            // 按钮样式切换
            const gBtn = document.getElementById('tab-grammar');
            const lBtn = document.getElementById('tab-lyrics');
            
            if (tabId === 'grammar') {
                gBtn.className = "px-4 py-2 rounded-full font-medium transition-colors bg-white/60 shadow-sm text-gray-800";
                lBtn.className = "px-4 py-2 rounded-full font-medium transition-colors hover:bg-white/60 text-gray-500";
                document.getElementById('sidebar').classList.add('hidden'); // 语法页默认不需要侧边栏
            } else {
                lBtn.className = "px-4 py-2 rounded-full font-medium transition-colors bg-white/60 shadow-sm text-gray-800";
                gBtn.className = "px-4 py-2 rounded-full font-medium transition-colors hover:bg-white/60 text-gray-500";
                if(state.currentReadingId) document.getElementById('sidebar').classList.remove('hidden');
            }
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.getElementById('gh-token-input').value = localStorage.getItem('gh_token') || '';
                document.getElementById('ai-token-input').value = localStorage.getItem('ai_token') || '';
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        function saveTokens() {
            localStorage.setItem('gh_token', document.getElementById('gh-token-input').value);
            localStorage.setItem('ai_token', document.getElementById('ai-token-input').value);
            toggleSettings();
            alert('Tokens 已保存！');
        }

        /* ================= 语法模块 (Grammar) ================= */
        function renderGrammar() {
            const container = document.getElementById('view-grammar');
            container.innerHTML = '';
            
            if (!state.grammarData || state.grammarData.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-400">暂无语法数据</div>`;
                return;
            }

            state.grammarData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'fuwari-glass fuwari-card p-6 flex flex-col gap-2';
                card.innerHTML = `
                    <h3 class="text-xl font-bold text-macaron-blue">${item.title}</h3>
                    <p class="text-gray-600 text-sm mt-2">${item.desc}</p>
                    ${item.rules ? `<div class="mt-4 bg-white/40 p-3 rounded-lg text-xs font-mono whitespace-pre-wrap">${item.rules}</div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        /* ================= 歌词模块 (Lyrics) - 书架 ================= */
        function renderBookshelf() {
            const list = document.getElementById('bookshelf-list');
            list.innerHTML = '';
            
            // 排序：最新修改在前
            const sortedData = [...state.lyricsData].sort((a, b) => b.timestamp - a.timestamp);

            sortedData.forEach(lyric => {
                const card = document.createElement('div');
                card.className = 'fuwari-glass fuwari-card p-4 flex justify-between items-center cursor-pointer';
                card.onclick = () => openReader(lyric.id);
                
                const date = new Date(lyric.timestamp).toLocaleDateString();
                card.innerHTML = `
                    <div>
                        <h3 class="font-bold text-gray-700">${lyric.title}</h3>
                        <p class="text-xs text-gray-400 mt-1">更新于: ${date}</p>
                    </div>
                    <span class="text-2xl opacity-50">📖</span>
                `;
                list.appendChild(card);
            });
        }

        function triggerUpload() {
            document.getElementById('lyric-upload').click();
        }

        document.getElementById('lyric-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const content = event.target.result;
                const newLyric = {
                    id: 'lyric_' + Date.now(),
                    title: file.name.replace(/\.[^/.]+$/, ""), // 移除扩展名
                    content: content,
                    timestamp: Date.now()
                };

                state.lyricsData.push(newLyric);
                saveLocalLyrics();
                renderBookshelf();
                
                // 静默推送至 GitHub
                await silentPushLyrics();
            };
            reader.readAsText(file);
        });

        /* ================= 歌词模块 (Lyrics) - 阅读器 & 分词 ================= */
        function openReader(id) {
            const lyric = state.lyricsData.find(l => l.id === id);
            if (!lyric) return;

            state.currentReadingId = id;
            document.getElementById('lyrics-bookshelf').classList.add('hidden');
            document.getElementById('lyrics-reader').classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('sidebar').classList.add('flex');
            
            document.getElementById('reader-title').innerText = lyric.title;
            
            renderLyricsContent(lyric.content);
        }

        function backToBookshelf() {
            state.currentReadingId = null;
            document.getElementById('lyrics-reader').classList.add('hidden');
            document.getElementById('lyrics-bookshelf').classList.remove('hidden');
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('flex');
        }

        function isJapaneseLine(text) {
            // 简单正则：包含平假名、片假名或部分汉字
            return /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text);
        }

        function renderLyricsContent(content) {
            const container = document.getElementById('reader-content');
            container.innerHTML = '';
            
            const lines = content.split('\n');
            lines.forEach((line, index) => {
                if (line.trim() === '') {
                    container.appendChild(document.createElement('br'));
                    return;
                }

                const lineDiv = document.createElement('div');
                lineDiv.className = 'group flex items-start gap-4 mb-2 p-2 hover:bg-white/40 rounded-xl transition-colors';

                const textSpan = document.createElement('div');
                textSpan.className = 'flex-1 leading-loose';

                if (isJapaneseLine(line) && state.tokenizer) {
                    // 分词渲染
                    const tokens = state.tokenizer.tokenize(line);
                    tokens.forEach(token => {
                        const wordSpan = document.createElement('span');
                        wordSpan.innerText = token.surface_form;
                        
                        // 根据词性着色
                        if (token.pos === '动词') wordSpan.classList.add('pos-verb');
                        else if (token.pos === '助词') wordSpan.classList.add('pos-particle');
                        else if (token.pos === '名词') wordSpan.classList.add('pos-noun');
                        else if (token.pos === '形容词') wordSpan.classList.add('pos-adjective');
                        else wordSpan.classList.add('pos-unknown');

                        // 绑定点击查词事件
                        wordSpan.onclick = () => lookupDictionary(token.surface_form, token.basic_form);
                        
                        textSpan.appendChild(wordSpan);
                    });

                    // 添加单行解析按钮
                    const analyzeBtn = document.createElement('button');
                    analyzeBtn.className = 'opacity-0 group-hover:opacity-100 transition-opacity text-xs bg-macaron-purple text-white px-2 py-1 rounded-lg ml-2';
                    analyzeBtn.innerText = '解析';
                    analyzeBtn.onclick = () => displayLineAnalysis(index, line);
                    
                    lineDiv.appendChild(textSpan);
                    lineDiv.appendChild(analyzeBtn);
                } else {
                    // 非日语（中文翻译/罗马音）直接展示
                    textSpan.innerText = line;
                    textSpan.className = 'flex-1 text-gray-500 text-base';
                    lineDiv.appendChild(textSpan);
                }

                container.appendChild(lineDiv);
            });
        }

        /* ================= 词典与 AI 侧边栏逻辑 ================= */
        function lookupDictionary(surface, basic) {
            const dictWord = document.getElementById('dict-word');
            const dictMeaning = document.getElementById('dict-meaning');
            
            document.getElementById('dict-content').classList.remove('hidden');
            
            // 优先查原型，其次查表层形式
            const target = state.localDict[basic] ? basic : surface;
            dictWord.innerText = target;
            
            if (state.localDict[target]) {
                dictMeaning.innerText = state.localDict[target];
            } else {
                dictMeaning.innerText = '暂未收录';
            }
        }

        function displayLineAnalysis(lineIndex, text) {
            const aiSidebar = document.getElementById('sidebar-ai');
            const aiContent = document.getElementById('ai-explanation');
            aiSidebar.classList.remove('hidden');
            
            if (state.aiCache[state.currentReadingId] && state.aiCache[state.currentReadingId][lineIndex]) {
                // 读取缓存
                const data = state.aiCache[state.currentReadingId][lineIndex];
                renderAiSidebar(text, data);
            } else {
                aiContent.innerHTML = `<p class="text-xs text-gray-400 animate-pulse">请先点击右上角 [✨ AI 语法讲解] 进行全文解析...</p>`;
            }
        }

        function renderAiSidebar(originalText, analysisData) {
            const container = document.getElementById('ai-explanation');
            let html = `<p class="text-xs font-bold text-gray-500 bg-white/60 p-2 rounded">${originalText}</p>`;
            
            if(Array.isArray(analysisData)) {
                analysisData.forEach(item => {
                    html += `
                        <div class="mt-2 bg-white/60 p-3 rounded-lg border-l-4 border-macaron-blue">
                            <p class="font-bold text-sm mb-1">${item.t || ''}</p>
                            <p class="text-xs text-gray-600">${item.e || ''}</p>
                        </div>
                    `;
                });
            }
            container.innerHTML = html;
        }

        /* ================= AI 深度解析请求 ================= */
        async function analyzeFullLyrics() {
            const aiToken = localStorage.getItem('ai_token');
            if (!aiToken) {
                alert("请先在设置中配置 硅基流动 API Key");
                toggleSettings();
                return;
            }

            const lyric = state.lyricsData.find(l => l.id === state.currentReadingId);
            if (!lyric) return;

            // 防抖/缓存拦截
            if (state.aiCache[state.currentReadingId]) {
                alert("已经解析完成！点击具体行的[解析]按钮查看。");
                return;
            }

            // UI 反馈
            const pContainer = document.getElementById('ai-progress-container');
            const pBar = document.getElementById('ai-progress-bar');
            pContainer.classList.remove('hidden');
            pBar.style.width = '10%';

            // 提取所有日文行
            const lines = lyric.content.split('\n');
            const jpLines = lines.map((l, i) => ({ text: l, index: i })).filter(item => isJapaneseLine(item.text));

            if (jpLines.length === 0) {
                alert("没有找到需要解析的日文行。");
                pContainer.classList.add('hidden');
                return;
            }

            const textToAnalyze = jpLines.map((l, i) => `[Line ${l.index}] ${l.text}`).join('\n');
            
            const prompt = `
            作为专业的日语老师，请分析以下歌词。
            必须严格返回 JSON 格式的对象，键名为行号(如 "0", "1")，值为数组，格式要求：[{"t": "直译", "e": "语法点讲解"}]。
            除了合法的 JSON，不要输出任何其他字符(如 Markdown 标记)。
            歌词内容：\n${textToAnalyze}
            `;

            try {
                pBar.style.width = '40%';
                
                // 请求硅基流动 API
                const response = await fetch(APP_CONFIG.aiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${aiToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: APP_CONFIG.aiModel,
                        messages: [{ role: "user", content: prompt }],
                        stream: false // 为保证 JSON 完整性，单次返回。如需 stream 需要更复杂的 buffer 解析
                    })
                });

                if (!response.ok) throw new Error("API 请求失败");
                pBar.style.width = '80%';

                const resData = await response.json();
                let aiResultText = resData.choices[0].message.content.trim();
                
                // 剔除可能包含的 markdown json 块标记
                if (aiResultText.startsWith('```json')) {
                    aiResultText = aiResultText.replace(/```json/g, '').replace(/```/g, '');
                }

                const parsedData = JSON.parse(aiResultText);
                state.aiCache[state.currentReadingId] = parsedData;
                
                pBar.style.width = '100%';
                setTimeout(() => pContainer.classList.add('hidden'), 1000);
                alert("解析完成！请点击句子右侧的[解析]按钮查看。");

                // 尝试静默保存解析结果到云端
                saveLocalAiCache();

            } catch (error) {
                console.error(error);
                alert("AI 解析出错: " + error.message);
                pContainer.classList.add('hidden');
            }
        }

        /* ================= GitHub 双端同步核心逻辑 ================= */
        function saveLocalLyrics() {
            localStorage.setItem('fuwako_lyrics', JSON.stringify(state.lyricsData));
        }
        function saveLocalAiCache() {
            localStorage.setItem('fuwako_ai_cache', JSON.stringify(state.aiCache));
        }

        async function syncLyricsData() {
            const localDataStr = localStorage.getItem('fuwako_lyrics');
            let localData = localDataStr ? JSON.parse(localDataStr) : [];
            
            const ghToken = localStorage.getItem('gh_token');
            if (!ghToken) {
                // 如果没有 Token，只使用本地数据
                state.lyricsData = localData;
                return;
            }

            try {
                // 1. 获取云端数据
                const cloudRes = await githubApiCall('lyrics_data.json');
                let cloudData = [];
                let sha = null;
                
                if (cloudRes && cloudRes.content) {
                    cloudData = JSON.parse(decodeURIComponent(escape(atob(cloudRes.content))));
                    sha = cloudRes.sha;
                }

                // 2. 根据 timestamp 合并去重
                const map = new Map();
                localData.forEach(item => map.set(item.id, item));
                cloudData.forEach(item => {
                    const existing = map.get(item.id);
                    if (!existing || item.timestamp > existing.timestamp) {
                        map.set(item.id, item); // 云端较新或本地不存在
                    }
                });

                state.lyricsData = Array.from(map.values());
                saveLocalLyrics();

                // 3. 如果合并后的数据比云端多或更新，推送回云端 (静默)
                // 此处简化判断逻辑，实际可比对 hash
                if (JSON.stringify(state.lyricsData) !== JSON.stringify(cloudData)) {
                    await githubApiPut('lyrics_data.json', JSON.stringify(state.lyricsData, null, 2), sha, "Sync lyrics data");
                }

            } catch (e) {
                console.error("同步失败，回退到本地数据", e);
                state.lyricsData = localData;
            }
        }

        async function silentPushLyrics() {
            const ghToken = localStorage.getItem('gh_token');
            if (!ghToken) return;

            try {
                // 先获取最新的 sha
                const cloudRes = await githubApiCall('lyrics_data.json');
                const sha = cloudRes ? cloudRes.sha : null;
                
                await githubApiPut('lyrics_data.json', JSON.stringify(state.lyricsData, null, 2), sha, "Update lyrics via Fuwako App");
                console.log("云端同步成功");
            } catch (e) {
                console.error("静默推送失败", e);
            }
        }

        // GitHub API 封装
        async function githubApiCall(path) {
            const token = localStorage.getItem('gh_token');
            const url = `https://api.github.com/repos/${APP_CONFIG.repoOwner}/${APP_CONFIG.repoName}/contents/${path}`;
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (res.status === 404) return null;
            if (!res.ok) throw new Error("GitHub API Request Failed");
            return await res.json();
        }

        async function githubApiPut(path, contentStr, sha, message) {
            const token = localStorage.getItem('gh_token');
            const url = `https://api.github.com/repos/${APP_CONFIG.repoOwner}/${APP_CONFIG.repoName}/contents/${path}`;
            
            const contentBase64 = btoa(unescape(encodeURIComponent(contentStr)));
            const body = { message, content: contentBase64 };
            if (sha) body.sha = sha;

            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error("GitHub PUT Failed");
            return await res.json();
        }

    </script>
