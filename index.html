<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Lyrics AI Hub | Gemini 2.5 Powered</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Varela+Round&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fw-bg': '#fefaf6', 'fw-pink': '#ffb3c6', 'fw-cream': '#fff3e0', 
                        'fw-mint': '#b2dfdb', 'fw-lavender': '#e1bee7', 'fw-text': '#5d4037', 
                    },
                    fontFamily: { 'maru': ['"Kosugi Maru"', 'sans-serif'], 'round': ['"Varela Round"', 'sans-serif'] },
                    borderRadius: { 'fw': '1.5rem' },
                    boxShadow: { 'fw': '0 10px 25px -5px rgba(255, 179, 198, 0.15)' }
                }
            }
        }
    </script>
    
    <style>
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #ff80ab; font-family: 'Varela Round', sans-serif; padding-top: 2px; }
        
        .word-item { 
            position: relative; 
            transition: all 0.2s ease; 
            padding: 4px 10px; 
            margin: 6px 4px; 
            border-radius: 12px; 
            display: inline-block;
            background: #ffffff;
            border-bottom: 3px solid #f3e5f5;
        }
        .word-item:hover { background-color: #fff3e0; transform: translateY(-2px); border-color: #ffb3c6; }
        
        .pos-noun { border-bottom-color: #b2dfdb; }
        .pos-verb { border-bottom-color: #ffb3c6; }
        .pos-particle { color: #8d6e63; background: #fdf2f2; border-bottom-color: #e1bee7; }

        .lyric-line { line-height: 5.5rem; word-break: break-all; }
        .ai-note-content { 
            white-space: pre-wrap; 
            line-height: 1.8; 
            font-size: 0.85rem;
            height: auto;
            overflow: visible;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-fw-bg min-h-screen text-fw-text font-maru">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-fw-cream px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🌸</span>
                <h1 class="text-2xl font-black text-fw-pink tracking-tight font-round">ふわり Study Hub</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleSettings()" class="p-2 hover:bg-fw-cream rounded-full transition">⚙️ 设置 Key</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-10 flex flex-col lg:flex-row gap-10">
        <div class="flex-1 space-y-6">
            <div class="bg-white p-6 rounded-fw shadow-fw">
                <textarea id="inputArea" class="w-full h-32 p-4 bg-fw-bg border-none rounded-2xl focus:ring-2 focus:ring-fw-pink/30 outline-none text-xl resize-none" placeholder="输入歌词，例如：歌に形はないけれど"></textarea>
                <button onclick="startAIAnalysis()" id="btnAction" class="w-full mt-4 bg-fw-pink text-white py-4 rounded-xl text-lg font-bold hover:shadow-lg transition-all active:scale-95">
                    ✨ Gemini 2.5 深度解析
                </button>
            </div>

            <div id="resultCard" class="bg-white/50 p-8 rounded-fw hidden border border-white">
                <div id="output" class="lyric-line text-4xl tracking-widest"></div>
            </div>
        </div>

        <aside class="w-full lg:w-[450px]">
            <div id="aiAnalysisBox" class="bg-white p-8 rounded-fw shadow-fw border border-fw-cream/30 sticky top-28 min-h-[400px] h-auto overflow-visible">
                <div id="aiPlaceholder" class="flex flex-col items-center justify-center py-20 text-center space-y-4">
                    <div class="text-6xl opacity-20">📖</div>
                    <p class="text-slate-400">点击按钮生成<br>AI 语法笔记</p>
                </div>
                <div id="aiContent" class="ai-note-content hidden"></div>
            </div>
        </aside>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-fw max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-fw-pink">API 配置</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 ml-2">Gemini API Key</label>
                    <input type="password" id="geminiKey" class="w-full p-3 bg-fw-bg rounded-xl outline-none border border-fw-cream">
                </div>
                <div>
                    <label class="text-xs text-slate-400 ml-2">GitHub Token (可选)</label>
                    <input type="password" id="ghToken" class="w-full p-3 bg-fw-bg rounded-xl outline-none border border-fw-cream">
                </div>
            </div>
            <button onclick="saveSettings()" class="w-full bg-fw-pink text-white py-3 rounded-xl font-bold mt-6 shadow-lg">保存配置</button>
            <button onclick="toggleSettings()" class="w-full mt-3 text-slate-400 text-sm">关闭</button>
        </div>
    </div>

    <script>
        let kuroshiro, analyzer;

        // 初始化假名转换引擎
        async function initSystem() {
            try {
                const KClass = window.Kuroshiro?.default || window.Kuroshiro;
                const AClass = window.KuromojiAnalyzer?.default || window.KuromojiAnalyzer;
                kuroshiro = new KClass();
                analyzer = new AClass({ dictPath: "./dict" });
                await kuroshiro.init(analyzer);
                
                // 自动填充 Key
                if(localStorage.getItem('gemini_api_key')) {
                    document.getElementById('geminiKey').value = localStorage.getItem('gemini_api_key');
                }
            } catch (err) { console.error("Init Error", err); }
        }
        window.addEventListener('DOMContentLoaded', initSystem);

        // 1. 更新后的核心解析逻辑
async function startAIAnalysis() {
    const text = document.getElementById('inputArea').value.trim();
    const apiKey = localStorage.getItem('gemini_api_key')?.trim().replace(/\s+/g, '');
    
    if (!apiKey) return toggleSettings();
    if (!text) return;

    // 本地渲染假名
    const tokens = await analyzer.parse(text);
    renderLyrics(tokens);
    document.getElementById('resultCard').classList.remove('hidden');

    const placeholder = document.getElementById('aiPlaceholder');
    const contentBox = document.getElementById('aiContent');
    
    placeholder.innerHTML = `<div class="animate-pulse text-fw-pink">🌸 正在整理笔记...</div>`;
    placeholder.classList.remove('hidden');
    contentBox.classList.add('hidden');

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ 
                    parts: [{ 
                        text: `你是一位专业的日语速记老师。请对“${text}”进行精细解析。
                        
                        要求：
                        1. 严禁开场白、严禁表格、严禁多余空行。
                        2. 采用【词汇解析】格式：使用“● 单词(读音)：含义 [词性] ➔ 语法作用”这种单行描述。
                        3. 采用【逻辑拆解】格式：用简洁的文字描述全句结构，不要换行。
                        4. 保持紧凑，让文本像段落一样流出。` 
                    }] 
                }]
            })
        });

        if (!response.ok) throw new Error(`请求失败`);

        const data = await response.json();
        let aiResult = data.candidates[0].content.parts[0].text;

        // 渲染处理
        placeholder.classList.add('hidden');
        contentBox.classList.remove('hidden');
        
        // 过滤掉 AI 习惯性加的加粗星号和多余空行
        contentBox.innerText = aiResult.replace(/\n\s*\n/g, '\n').trim();
        contentBox.classList.add('animate-slide-up');

    } catch (e) {
        placeholder.innerHTML = `<div class="text-red-400 text-xs">解析中断: ${e.message}</div>`;
    }
}

        function renderLyrics(tokens) {
            const container = document.getElementById('output');
            container.innerHTML = "";
            const KUtils = window.Kuroshiro?.default?.util || window.Kuroshiro?.util;

            tokens.forEach(token => {
                const span = document.createElement('span');
                const posClass = getPosClass(token.pos);
                span.className = `word-item animate-slide-up ${posClass}`;
                
                if (KUtils && token.surface_form !== token.reading && token.reading !== '*') {
                    span.innerHTML = `<ruby>${token.surface_form}<rt>${KUtils.kanaToHiragana(token.reading)}</rt></ruby>`;
                } else {
                    span.innerText = token.surface_form;
                }
                container.appendChild(span);
            });
        }

        function getPosClass(pos) {
            if (pos.includes('名詞')) return 'pos-noun';
            if (pos.includes('動詞')) return 'pos-verb';
            if (pos.includes('助詞')) return 'pos-particle';
            return '';
        }

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }
        function saveSettings() {
            localStorage.setItem('gemini_api_key', document.getElementById('geminiKey').value.trim());
            localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
            toggleSettings();
            alert("配置已更新 🌸");
        }
    </script>
</body>
</html>
