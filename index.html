<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwako | 魔法日语咏唱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    
<style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+SC:wght@400;700&display=swap');

        :root {
            --f-bg: #fffcfd; 
            --f-accent: #ffb1c1; 
            --f-accent-soft: #ffe4e9;
            --f-glass: rgba(255, 255, 255, 0.85); 
            --f-text-main: #5a5a5a; 
            --f-shadow: rgba(255, 177, 193, 0.15);
        }

        body {
            background-color: var(--f-bg);
            background-image: url('https://www.transparenttextures.com/patterns/sakura.png');
            background-attachment: fixed;
            color: var(--f-text-main);
            font-family: 'Kosugi Maru', 'Noto Sans SC', sans-serif;
            margin: 0;
            overflow-x: hidden;
            cursor: url('https://cur.cursors-4u.net/anime/ani-12/ani1159.cur'), auto !important;
        }
.glass {
    background: var(--f-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.8);
    border-radius: 28px;
    box-shadow: 0 8px 30px var(--f-shadow);
}

/* 2. 核心切换逻辑：强制覆盖 */
.tab-content { 
    display: none !important; 
}

.tab-content.active { 
    display: block !important; 
    animation: fadeIn 0.4s ease forwards;
}

/* 3. 补充一下缺失的动画声明 */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
        /* 精致毛玻璃卡片 */
        .f-card {
            background: var(--f-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            box-shadow: 0 8px 30px var(--f-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .f-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px var(--f-shadow); }

        /* 选项卡按钮 */
        .nav-btn {
            padding: 8px 24px;
            border-radius: 18px;
            font-weight: 700;
            transition: 0.3s;
            background: white;
            border: 1px solid var(--f-accent-soft);
            color: var(--f-accent);
        }
        .nav-btn.active {
            background: var(--f-accent);
            color: white;
            box-shadow: 0 5px 15px var(--f-shadow);
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--f-accent-soft); border-radius: 10px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 词块着色 */
        .token-verb { color: #ff8fa3; font-weight: bold; border-bottom: 2px dashed #ffdae0; }
        .token-particle { color: #89cff0; }
        .token-noun { color: #a29bfe; }

        /* 看板娘 Ancen */
        #pet-container { position: fixed; bottom: 20px; right: 20px; z-index: 99; }
        #pet-img { width: 85px; animation: softFloat 4s ease-in-out infinite; filter: drop-shadow(0 5px 10px var(--f-shadow)); }
        @keyframes softFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        #pet-bubble {
            position: absolute; bottom: 110%; right: 0; background: white; padding: 8px 12px;
            border-radius: 15px; font-size: 11px; border: 1px solid var(--f-accent-soft);
            box-shadow: 0 5px 15px var(--f-shadow); opacity: 0; transition: 0.3s; white-space: nowrap;
        }
        #pet-container:hover #pet-bubble { opacity: 1; }

        /* 加载遮罩 */
        #loading-mask {
            background: #fffcfd; position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="p-4 md:p-8 relative">

    <div class="star-decor" style="top: 10%; left: 5%;">✦</div>
    <div class="star-decor" style="top: 20%; right: 10%;">✧</div>

    <div id="loading-mask" class="fixed inset-0 z-[100] bg-[#fff0f5] flex flex-col items-center justify-center">
        <div class="text-4xl mb-6 animate-bounce">⸜(๑'ᵕ'๑)⸝</div>
        <div class="text-xl font-bold mb-4">Fuwako 正在构建魔法世界...</div>
        <div class="w-64 h-3 bg-white rounded-full overflow-hidden border-2 border-pink-100">
            <div id="init-progress" class="h-full bg-pink-300 transition-all duration-300" style="width: 0%"></div>
        </div>
        <div id="loading-text" class="mt-4 text-sm text-pink-400">正在同步魔导书 (Dictionary)...</div>
    </div>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div class="flex items-center space-x-2">
            <span class="text-3xl">🌸</span>
            <h1 class="text-3xl font-black tracking-tighter text-gray-700">Fuwako</h1>
        </div>
        <button onclick="toggleSettings()" class="glass p-1 bubbly-btn">
            <img src="7.png" alt="Settings" class="w-10 h-10 rounded-full border-2 border-white">
        </button>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        
        <nav class="flex space-x-3 mb-8">
            <button onclick="switchTab('grammar')" class="glass px-8 py-3 font-bold bubbly-btn text-pink-500">语法秘籍</button>
            <button onclick="switchTab('lyrics')" class="glass px-8 py-3 font-bold bubbly-btn text-blue-500">歌词咏唱</button>
        </nav>

        <section id="grammar" class="tab-content glass p-8 min-h-[60vh]">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="grammar-list">
                <div class="p-4 rounded-2xl bg-white/30 border border-white/50">
                    <p class="text-center italic opacity-50">正在翻找语法书...</p>
                </div>
            </div>
        </section>

        <section id="lyrics" class="tab-content active glass p-8 min-h-[60vh]">
            <div id="lyrics-list-view">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">歌词库</h2>
                    <button onclick="showUploadModal()" class="bg-pink-400 text-white px-6 py-2 rounded-full font-bold bubbly-btn">
                        + 记录新咏唱
                    </button>
                </div>
                <div id="lyrics-container" class="grid gap-4">
                    </div>
            </div>

            <div id="lyrics-detail-view" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="backToList()" class="glass px-4 py-2 text-sm bubbly-btn">🔙 返回列表</button>
                    <button id="ai-analyze-btn" onclick="analyzeWithAI()" class="bg-purple-400 text-white px-6 py-2 rounded-full font-bold bubbly-btn">
                        ✨ AI 深度解析
                    </button>
                </div>
                <div id="ai-progress-container" class="w-full bg-white/30 rounded-full h-2 mb-6 hidden overflow-hidden">
                    <div id="ai-progress-bar" style="width: 0%"></div>
                </div>
                <div class="flex flex-col md:flex-row gap-8">
                    <div id="lyrics-render-area" class="flex-1 space-y-3 text-xl leading-relaxed">
                        </div>
                    <aside class="w-full md:w-72">
                        <div class="glass p-6 sticky top-4">
                            <h3 class="font-black text-lg mb-4 flex items-center">
                                <span class="mr-2">📖</span> 释义详情
                            </h3>
                            <div id="aside-content" class="text-sm leading-loose">
                                点击词块开启知识大门...
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-pink-100/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-[60]">
        <div class="glass p-10 w-full max-w-md shadow-2xl relative">
            <div class="absolute -top-6 -left-6 text-4xl rotate-12">⚙️</div>
            <h2 class="text-2xl font-black mb-6">魔导同步配置</h2>
            <div class="space-y-4">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest">GitHub Access Token</label>
                <input type="password" id="gh-token" placeholder="输入你的 Token..." 
                       class="w-full p-4 rounded-2xl bg-white/60 border-2 border-pink-100 outline-none focus:border-pink-300 transition-all">
                <div class="flex justify-end space-x-3 pt-6">
                    <button onclick="toggleModal('settings-modal')" class="px-6 py-2">关闭</button>
                    <button onclick="saveSettings()" class="bg-blue-400 text-white px-8 py-3 rounded-2xl font-bold bubbly-btn">保存同步</button>
                </div>
            </div>
        </div>
    </div>

    <div id="lyrics-modal" class="fixed inset-0 bg-blue-100/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-[60]">
        <div class="glass p-10 w-full max-w-2xl shadow-2xl">
            <h2 class="text-2xl font-black mb-6 flex items-center">
                <span class="mr-2">📝</span> 记录新的歌词
            </h2>
            <div class="space-y-4">
                <input type="text" id="new-lyrics-title" placeholder="歌曲标题（例：月光）" 
                       class="w-full p-4 rounded-2xl bg-white/60 border-2 border-blue-100 outline-none focus:border-blue-300">
                <textarea id="new-lyrics-content" rows="10" placeholder="在此粘贴歌词内容..." 
                          class="w-full p-4 rounded-2xl bg-white/60 border-2 border-blue-100 outline-none focus:border-blue-300 no-scrollbar"></textarea>
                <div class="flex justify-end space-x-3 pt-4">
                    <button onclick="toggleModal('lyrics-modal')" class="px-6 py-2">取消</button>
                    <button onclick="saveNewLyrics()" class="bg-pink-400 text-white px-10 py-3 rounded-2xl font-bold bubbly-btn">同步至云端</button>
                </div>
            </div>
        </div>
    </div>

    <script>
let tokenizer = null;
    let lyricsData = JSON.parse(localStorage.getItem('fuwako_local_lyrics')) || [];
    let currentLyrics = null;
    let currentAnalysisResult = [];

    window.onload = () => {
        initKuromoji();
        renderLyricsList();
        fetchGrammar();
    };
        // --- 核心逻辑 ---

        function initKuromoji() {
            const prog = document.getElementById('init-progress');
            // 注意：dict/ 文件夹需与 index.html 在同一目录
            kuromoji.builder({ dicPath: "dict/" }).build((err, _tokenizer) => {
                if (err) {
                    document.getElementById('loading-text').innerText = "词典遗失在异世界了...";
                    return;
                }
                tokenizer = _tokenizer;
                prog.style.width = "100%";
                setTimeout(() => {
                    document.getElementById('loading-mask').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-mask').style.display = 'none', 500);
                }, 800);
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
        }

        // --- 歌词管理 ---

        function showUploadModal() {
            toggleModal('lyrics-modal');
        }

 async function saveNewLyrics() {
        const title = document.getElementById('new-lyrics-title').value;
        const content = document.getElementById('new-lyrics-content').value;
        if (!title || !content) return alert("标题和内容不能是空的哦！");

        const entry = {
            id: Date.now(),
            title: title,
            text: content.split('\n'),
            timestamp: Date.now()
        };

        lyricsData.unshift(entry);
        localStorage.setItem('fuwako_local_lyrics', JSON.stringify(lyricsData));
        
        renderLyricsList();
        toggleModal('lyrics-modal');
        
        // 执行同步
        await pushToGitHub(lyricsData);
    }

        function renderLyricsList() {
            const container = document.getElementById('lyrics-container');
            container.innerHTML = lyricsData.length ? '' : '<p class="text-center opacity-50 py-10">这里空空如也，快去添加吧~</p>';
            
            lyricsData.forEach(item => {
                const card = document.createElement('div');
                card.className = "glass p-6 cursor-pointer hover:bg-white/60 transition-all flex justify-between items-center";
                card.onclick = () => openLyricsDetail(item);
                card.innerHTML = `
                    <div>
                        <div class="font-bold text-lg">${item.title}</div>
                        <div class="text-xs text-gray-400 mt-1">${new Date(item.timestamp).toLocaleString()}</div>
                    </div>
                    <span class="text-xl">🎶</span>
                `;
                container.appendChild(card);
            });
        }
/**
 * 魔法渲染：将 AI 解析结果展示在右侧详情栏
 */
function displayAIAnalysis(data, originalJpLines) {
    const aside = document.getElementById('aside-content');
    if (!aside) return;

    // 清空当前内容并添加标题
    aside.innerHTML = `<h4 class="font-black text-purple-500 mb-4 flex items-center">
                        <span class="mr-2">✨</span> AI 语法结界
                      </h4>`;
    
    // 遍历 AI 返回的数据进行展示
    data.forEach((item, index) => {
        const section = document.createElement('div');
        section.className = "mb-4 p-4 glass bg-white/60 rounded-2xl border-l-4 border-pink-400 animate-fadeIn";
        
        // 这里的 originalJpLines[index] 对应原文，item.t 对应翻译，item.e 对应解析
        section.innerHTML = `
            <div class="text-xs font-bold text-gray-400 mb-1">原文：${originalJpLines[index] || '---'}</div>
            <div class="text-sm font-black text-pink-500 mb-1">译：${item.t}</div>
            <div class="text-xs text-gray-600 leading-relaxed italic">析：${item.e}</div>
        `;
        aside.appendChild(section);
    });
}
        function openLyricsDetail(item) {
            currentLyrics = item;
            document.getElementById('lyrics-list-view').classList.add('hidden');
            document.getElementById('lyrics-detail-view').classList.remove('hidden');
            renderLyricsTokens(item.text);
        }

        function backToList() {
            document.getElementById('lyrics-list-view').classList.remove('hidden');
            document.getElementById('lyrics-detail-view').classList.add('hidden');
        }

        function renderLyricsTokens(lines) {
            const area = document.getElementById('lyrics-render-area');
            area.innerHTML = '';
            lines.forEach(line => {
                const row = document.createElement('div');
                row.className = "flex flex-wrap items-center gap-x-1 pb-2 border-b border-white/20";
                
                if (/[ぁ-んァ-ヶ]/.test(line) && tokenizer) {
                    tokenizer.tokenize(line).forEach(t => {
                        const s = document.createElement('span');
                        s.innerText = t.surface_form;
                        s.className = `cursor-pointer hover:bg-white/50 px-0.5 rounded ${getPosClass(t.pos)}`;
                        s.onclick = () => lookup(t.surface_form);
                        row.appendChild(s);
                    });
                } else {
                    row.innerText = line;
                    row.className += " text-sm text-gray-500 italic font-sans";
                }
                area.appendChild(row);
            });
        }

        function getPosClass(pos) {
            if (pos === "助詞") return "token-particle";
            if (pos === "動詞") return "token-verb";
            if (pos === "名詞") return "token-noun";
            return "";
        }

        function lookup(word) {
            const aside = document.getElementById('aside-content');
            aside.innerHTML = `<div class="text-2xl font-black text-pink-500 mb-2">${word}</div>
                               <div class="p-3 bg-white/40 rounded-xl">魔法检索中... (请确保根目录有 dict.json)</div>`;
            // 这里 fetch 你的 dict.json
        }

        // --- 设置与 AI 校验 ---

        function toggleSettings() {
            document.getElementById('gh-token').value = localStorage.getItem('fuwako_gh_token') || '';
            toggleModal('settings-modal');
        }

        function saveSettings() {
            localStorage.setItem('fuwako_gh_token', document.getElementById('gh-token').value);
            toggleModal('settings-modal');
            alert("同步配置已保存！⭐");
        }

// --- 状态存储 ---

/**
 * 1. 整体触发：点击右上角 AI 按钮
 */
async function analyzeWithAI() {
    let apiKey = localStorage.getItem('fuwako_or_key');
    if (!apiKey) {
        const key = prompt("✨ 魔法中转站：请输入 OpenRouter API Key：");
        if (key) { localStorage.setItem('fuwako_or_key', key); apiKey = key; } 
        else return;
    }

    if (!currentLyrics) return;

    const btn = document.getElementById('ai-analyze-btn');
    const progContainer = document.getElementById('ai-progress-container');
    const bar = document.getElementById('ai-progress-bar');
    
    // 进度条与状态初始化
    btn.disabled = true;
    btn.innerText = "全篇咏唱中...";
    progContainer.classList.remove('hidden');
    bar.style.width = "20%";

    // 筛选出所有日语行
    const jpLines = currentLyrics.text.filter(line => /[ぁ-んァ-ヶ]/.test(line));
    const promptText = `请解析以下日语歌词，严格返回一个 JSON 数组 [{"t": "翻译", "e": "语法点"}]。语法点包含每个单词的性质和翻译/是否有变形/连接词作用/句式/谁修饰谁，严禁包含任何额外引入语等说明文字、Markdown 格式或换行符。（特别要求：必须使用双引号包裹属性和字符串。但双引号包含的解析内容中如果需要使用引号，请务必使用单引号 ' 代替双引号 "，以防 JSON 解析错误）内容：\n${jpLines.join('\n')}`;

    try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'HTTP-Referer': 'https://github.com/Ancenchan/fuwako',
                'X-Title': 'Fuwako App',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "z-ai/glm-4.5-air:free",
                messages: [
                    { role: "system", content: "你是一个只输出标准 JSON 数组的日语助手。" },
                    { role: "user", content: promptText }
                ],
                temperature: 0.1 
            })
        });

        const result = await response.json();
        let rawContent = result.choices[0].message.content;

        // 清洗并解析 JSON
        let cleanText = rawContent.replace(/```json|```/g, '').trim();
        const start = cleanText.indexOf('[');
        const end = cleanText.lastIndexOf(']');
        currentAnalysisResult = JSON.parse(cleanText.substring(start, end + 1));
        
        bar.style.width = "100%";
        btn.innerText = "✨ 解析已就绪";
        
        // 解析完成后，重新渲染歌词行，让“讲解”按钮出现
        renderLyricsTokens(currentLyrics.text);

    } catch (error) {
        console.error("AI 魔法失效：", error);
        alert("解析失败，请检查网络或 Key");
    } finally {
        btn.disabled = false;
        setTimeout(() => progContainer.classList.add('hidden'), 2000);
    }
}

/**
 * 2. 渲染歌词行：增加“讲解”按钮的判断
 */
function renderLyricsTokens(lines) {
    const area = document.getElementById('lyrics-render-area');
    area.innerHTML = '';
    
    // 记录日语行的索引（用于匹配 AI 结果数组）
    let jpLineCounter = 0;

    lines.forEach((line) => {
        const row = document.createElement('div');
        row.className = "flex flex-wrap items-center gap-x-1 pb-2 border-b border-white/20 group";
        
        const isJapanese = /[ぁ-んァ-ヶ]/.test(line);

        if (isJapanese && tokenizer) {
            // 分词显示
            tokenizer.tokenize(line).forEach(t => {
                const s = document.createElement('span');
                s.innerText = t.surface_form;
                s.className = `cursor-pointer hover:bg-white/50 px-0.5 rounded ${getPosClass(t.pos)}`;
                s.onclick = () => lookup(t.surface_form);
                row.appendChild(s);
            });

            // --- 二次触发逻辑：如果已有 AI 结果，显示“讲解”按钮 ---
            if (currentAnalysisResult.length > 0) {
                const indexToFetch = jpLineCounter; // 闭包捕获当前索引
                const infoBtn = document.createElement('button');
                infoBtn.innerText = "解析";
                infoBtn.className = "ml-auto text-[10px] bg-pink-200/50 text-pink-600 px-2 py-0.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity";
                infoBtn.onclick = () => showSingleLineDetail(indexToFetch, line);
                row.appendChild(infoBtn);
            }
            jpLineCounter++; // 只有日语行计数
        } else {
            row.innerText = line;
            row.className += " text-sm text-gray-500 italic font-sans";
        }
        area.appendChild(row);
    });
}

/**
 * 3. 点击“讲解”：在右侧栏位显示对应数据
 */
function showSingleLineDetail(index, originalText) {
    const aside = document.getElementById('aside-content');
    const data = currentAnalysisResult[index];

    if (!data) return;

    aside.innerHTML = `
        <div class="animate-fadeIn">
            <h4 class="font-black text-pink-500 mb-2 flex items-center">
                <span>🏮</span> <span class="ml-2">单句详解</span>
            </h4>
            <div class="p-3 bg-white/60 rounded-2xl border-2 border-pink-100 shadow-sm">
                <div class="text-xs text-gray-400 mb-2">原文：${originalText}</div>
                <div class="text-sm font-bold text-gray-700 mb-2">译：${data.t}</div>
                <hr class="border-pink-100 mb-2">
                <div class="text-xs text-gray-600 leading-loose">
                    <span class="font-bold text-purple-400">解析：</span><br>${data.e}
                </div>
            </div>
        </div>
    `;
}
async function fetchGrammar() {
        const list = document.getElementById('grammar-list');
        try {
            // 注意：请确保 grammar.json 在 index.html 同级目录
            const res = await fetch('grammar.json');
            if (!res.ok) throw new Error('File not found');
            const data = await res.json();
            
            list.innerHTML = '';
            data.forEach(g => {
                const item = document.createElement('div');
                item.className = "p-5 glass grammar-card group";
                // 对应你提供的 JSON 格式：t(标题), c(内容), l(例句)
                item.innerHTML = `
                    <h4 class="font-black text-pink-400 text-lg group-hover:text-pink-500">${g.t}</h4>
                    <p class="text-sm mt-2 text-gray-500 leading-relaxed">${g.c}</p>
                    <div class="mt-3 p-2 bg-pink-50/50 rounded-lg text-xs italic text-gray-400">
                        ${g.l}
                    </div>
                `;
                list.appendChild(item);
            });
        } catch(e) {
            console.error("Grammar Load Error:", e);
            list.innerHTML = `
                <div class="col-span-full py-10 text-center opacity-40">
                    <p>尚未发现魔导书 (grammar.json)</p>
                    <p class="text-xs mt-2">请确认文件编码为 UTF-8 且格式正确</p>
                </div>`;
        }
    }
        async function pushToGitHub(updatedData) {
        const token = localStorage.getItem('fuwako_gh_token');
        const username = "Ancenchan"; // 【需修改】
        const repo = "fuwako"; // 【需修改】
        const path = "lyrics_data.json";

        if (!token) return console.warn("未配置 Token，仅本地保存");

        try {
            // 获取当前文件 SHA (更新文件必须)
            const getUrl = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
            const fileRes = await fetch(getUrl, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            let sha = "";
            if (fileRes.ok) {
                const fileData = await fileRes.json();
                sha = fileData.sha;
            }

            // 上传新内容
            await fetch(getUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: "Magic update: sync lyrics",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedData, null, 2)))),
                    sha: sha
                })
            });
            console.log("云端同步完成！⭐");
        } catch (err) {
            console.error("GitHub Sync Failed:", err);
        }
    }
